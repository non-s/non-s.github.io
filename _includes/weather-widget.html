{% if site.openweather_api_key %}
<div id="weather-widget" class="weather-widget" style="display:none" aria-label="Local weather"></div>
<script>
(function(){
  if (!navigator.geolocation) { return; }
  var CACHE_KEY = 'gb_weather_data';
  var CACHE_TS_KEY = 'gb_weather_ts';
  var CACHE_TTL = 600000; // 10 minutes

  function renderWeather(d) {
    var w = document.getElementById('weather-widget');
    if (!w || !d || !d.main) { return; }
    var icon = d.weather && d.weather[0] ? d.weather[0].icon : '';
    var desc = d.weather && d.weather[0] ? d.weather[0].description : '';
    w.innerHTML =
      (icon ? '<img src="https://openweathermap.org/img/wn/' + icon + '.png" alt="' + desc + '" width="24" height="24" style="vertical-align:middle;margin-right:.2rem;">' : '') +
      '<span class="weather-city">' + d.name + '</span>' +
      ' <span class="weather-temp">' + Math.round(d.main.temp) + '°C</span>' +
      ' <span class="weather-desc">' + desc + '</span>';
    w.style.display = 'inline-flex';
  }

  try {
    var cached = sessionStorage.getItem(CACHE_KEY);
    var ts = sessionStorage.getItem(CACHE_TS_KEY);
    if (cached && ts && (Date.now() - parseInt(ts)) < CACHE_TTL) {
      renderWeather(JSON.parse(cached));
      return;
    }
  } catch(e) {}

  navigator.geolocation.getCurrentPosition(function(pos) {
    var lat = pos.coords.latitude;
    var lon = pos.coords.longitude;
    fetch('https://api.openweathermap.org/data/2.5/weather?lat=' + lat + '&lon=' + lon + '&units=metric&appid={{ site.openweather_api_key }}')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        try {
          sessionStorage.setItem(CACHE_KEY, JSON.stringify(d));
          sessionStorage.setItem(CACHE_TS_KEY, String(Date.now()));
        } catch(e) {}
        renderWeather(d);
      })
      .catch(function() {});
  }, function() {});
})();
</script>
{% endif %}
