---
layout: default
title: "Reading List"
permalink: /reading-list/
---
<div class="container" style="padding:3rem 0;">
  <h1 style="font-size:2rem;font-weight:800;margin-bottom:.5rem;">Reading List</h1>
  <p style="color:var(--c-muted);margin-bottom:2rem;">Articles you saved for later.</p>
  <div id="reading-list-container">
    <p style="color:var(--c-muted);">Loading...</p>
  </div>
</div>
<script>
(function(){
  var container = document.getElementById('reading-list-container');
  var saved;
  try { saved = JSON.parse(localStorage.getItem('gb-saved') || '[]'); } catch(e) { saved = []; }
  if (saved.length === 0) {
    container.innerHTML = '<p style="color:var(--c-muted);">No saved articles yet. Click the <i class="bi bi-bookmark"></i> Save button on any article.</p>';
    return;
  }
  var html = '<div class="row g-4">' + saved.map(function(item) {
    var safeUrl = String(item.url || '').replace(/'/g, '%27');
    return '<div class="col-md-6 col-lg-4"><div class="news-card h-100" style="cursor:default;">' +
      (item.image ? '<div class="card-img-wrap"><img src="' + item.image + '" alt="" loading="lazy" class="card-img"></div>' : '') +
      '<div class="card-body-inner"><div class="card-meta"><time>' + (item.date||'') + '</time></div>' +
      '<h2 class="card-headline"><a href="' + item.url + '" style="color:inherit;text-decoration:none;">' + item.title + '</a></h2>' +
      '<button onclick="removeSaved(\'' + safeUrl + '\',this.closest(\'.col-md-6\'))" style="background:none;border:none;color:var(--c-muted);font-size:.8rem;cursor:pointer;padding:0;margin-top:.5rem;"><i class="bi bi-trash"></i> Remove</button>' +
      '</div></div></div>';
  }).join('') + '</div>';
  container.innerHTML = html;
  window.removeSaved = function(url, el) {
    var arr = JSON.parse(localStorage.getItem('gb-saved')||'[]').filter(function(x){return x.url!==url;});
    localStorage.setItem('gb-saved', JSON.stringify(arr));
    if(el) el.remove();
  };
})();
</script>
