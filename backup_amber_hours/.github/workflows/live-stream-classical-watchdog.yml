name: "24/7 live stream watchdog - Classical"

# Same reasoning as live-stream-watchdog.yml's identical setup, just
# watching live-stream-classical.yml instead: that relay has a hard 6h
# GitHub Actions timeout and relies on a 6h cron to relaunch itself, and
# GitHub schedule events are best-effort and can be delayed/dropped. This
# watchdog relaunches it whenever no run is currently active or queued.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-stream-classical-watchdog
  cancel-in-progress: true

jobs:
  ensure-live:
    name: "Relaunch the classical live stream relay if it is not running"
    if: ${{ vars.CLASSICAL_LIVE_ENABLED == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
      contents: read
    steps:
      - name: "Check for an active relay run and relaunch if missing"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          active="$(gh run list --repo "${{ github.repository }}" --workflow=live-stream-classical.yml --status=in_progress --json databaseId --jq 'length')"
          queued="$(gh run list --repo "${{ github.repository }}" --workflow=live-stream-classical.yml --status=queued --json databaseId --jq 'length')"
          if [ "${active:-0}" -gt 0 ] || [ "${queued:-0}" -gt 0 ]; then
            echo "Classical live stream relay already running (active=${active}, queued=${queued}). Nothing to do."
            exit 0
          fi
          echo "No live-stream-classical.yml run in progress or queued. Dispatching a new one."
          gh workflow run live-stream-classical.yml --repo "${{ github.repository }}"
