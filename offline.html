<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — GlobalBR News</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080c17;
      color: #dde4f0;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 3rem 1.25rem;
    }
    .wrap { max-width: 640px; width: 100%; }
    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .logo-text {
      font-size: 1.1rem;
      font-weight: 800;
      color: #f97316;
      letter-spacing: -.5px;
    }
    .icon { font-size: 4rem; margin-bottom: 1.25rem; text-align: center; line-height: 1; }
    h1 {
      font-size: 1.9rem;
      font-weight: 800;
      margin-bottom: .5rem;
      text-align: center;
      letter-spacing: -.5px;
    }
    .subtitle {
      color: #7e8fa8;
      line-height: 1.6;
      margin-bottom: .75rem;
      text-align: center;
      font-size: .95rem;
    }
    .last-online {
      font-size: .8rem;
      color: #4a5568;
      text-align: center;
      margin-bottom: 2rem;
    }
    .last-online strong { color: #7e8fa8; }
    .btn-wrap { text-align: center; margin-bottom: 2.5rem; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      background: #f97316;
      color: #fff;
      padding: .65rem 1.6rem;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      transition: background .2s, transform .1s;
    }
    .btn:hover { background: #ea6c10; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    /* Category sections */
    .cat-section { margin-bottom: 1.5rem; }
    .cat-heading {
      font-size: .7rem;
      font-weight: 800;
      color: #f97316;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: rgba(249,115,22,.08);
      border: 1px solid rgba(249,115,22,.2);
      border-radius: 50px;
      padding: .2rem .7rem;
      display: inline-block;
      margin-bottom: .75rem;
    }
    .article-list { list-style: none; padding: 0; margin: 0; }
    .article-list li {
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .article-list li:last-child { border-bottom: none; }
    .article-list li a {
      color: #dde4f0;
      text-decoration: none;
      font-size: .9rem;
      line-height: 1.45;
      display: flex;
      align-items: flex-start;
      gap: .5rem;
      padding: .65rem 0;
      transition: color .15s;
    }
    .article-list li a::before {
      content: '→';
      color: #f97316;
      flex-shrink: 0;
      font-size: .8rem;
      margin-top: .1rem;
    }
    .article-list li a:hover { color: #f97316; }

    .cached-section {
      margin-top: .5rem;
      background: rgba(255,255,255,.025);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
    }
    .cached-section > h2 {
      font-size: .95rem;
      font-weight: 700;
      color: #94a3b8;
      margin-bottom: 1.1rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    #cached-content .empty {
      color: #4a5568;
      font-size: .875rem;
      text-align: center;
      padding: 1.5rem 0;
    }
    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,.06);
      margin: .75rem 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <span class="logo-text">GlobalBR News</span>
    </div>

    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p class="subtitle">
      No internet connection detected. Here are the articles you've already read — available without a connection.
    </p>
    <p class="last-online" id="last-online-msg">Checking last online time…</p>

    <div class="btn-wrap">
      <button class="btn" onclick="window.location.reload()">
        ↺ Try again
      </button>
    </div>

    <div class="cached-section">
      <h2>
        <span>&#128214;</span> Cached Articles
      </h2>
      <div id="cached-content">
        <p class="empty">Loading cached articles…</p>
      </div>
    </div>
  </div>

  <script>
  (function() {
    // ── Last online timestamp ─────────────────────────────────
    var lastOnlineEl = document.getElementById('last-online-msg');
    var stored = localStorage.getItem('gb-last-online');
    if (stored) {
      var d = new Date(parseInt(stored, 10));
      var now = Date.now();
      var diff = Math.round((now - d) / 60000); // minutes
      var label;
      if (diff < 2)        label = 'just now';
      else if (diff < 60)  label = diff + ' minutes ago';
      else if (diff < 1440) label = Math.round(diff / 60) + ' hours ago';
      else                  label = Math.round(diff / 1440) + ' days ago';
      lastOnlineEl.innerHTML = 'Last online: <strong>' + label + '</strong> (' + d.toLocaleString() + ')';
    } else {
      lastOnlineEl.textContent = 'Last online time unavailable.';
    }

    // Update last-online timestamp when we ARE online
    if (navigator.onLine) {
      localStorage.setItem('gb-last-online', Date.now().toString());
    }

    // ── Load cached articles grouped by category ──────────────
    var contentEl = document.getElementById('cached-content');

    async function loadCachedArticles() {
      if (!('caches' in window)) {
        contentEl.innerHTML = '<p class="empty">Your browser does not support offline caching.</p>';
        return;
      }

      try {
        // Must match ARTICLE_CACHE in sw.js. When you bump the SW
        // version, bump this string too — otherwise offline.html reads
        // from the previous cache and shows nothing.
        var cacheName = 'globalbr-articles-v5';
        var cache = await caches.open(cacheName);
        var keys = await cache.keys();

        // Filter to article URLs only (contain date pattern)
        var articleKeys = keys.filter(function(r) {
          return /\/\d{4}\/\d{2}\/\d{2}\//.test(r.url);
        });

        if (articleKeys.length === 0) {
          contentEl.innerHTML = '<p class="empty">No articles cached yet. Visit some articles while online and they\'ll be available here.</p>';
          return;
        }

        // Group by category (first path segment before the date)
        var byCategory = {};
        articleKeys.forEach(function(req) {
          var url = req.url;
          var match = url.match(/\/([a-z-]+)\/\d{4}\/\d{2}\/\d{2}\//);
          var cat = match ? match[1] : 'other';
          if (!byCategory[cat]) byCategory[cat] = [];
          // Build a readable title from the slug
          var slugMatch = url.replace(/\/$/, '').match(/\/([^/]+)$/);
          var slug = slugMatch ? slugMatch[1] : '';
          var title = decodeURIComponent(slug).replace(/-/g, ' ');
          title = title.charAt(0).toUpperCase() + title.slice(1);
          byCategory[cat].push({ url: url, title: title });
        });

        var categories = Object.keys(byCategory).sort();
        var html = '';
        categories.forEach(function(cat) {
          var articles = byCategory[cat];
          html += '<div class="cat-section">';
          html += '<span class="cat-heading">' + cat.charAt(0).toUpperCase() + cat.slice(1) + ' (' + articles.length + ')</span>';
          html += '<ul class="article-list">';
          articles.forEach(function(art) {
            html += '<li><a href="' + art.url + '">' + art.title + '</a></li>';
          });
          html += '</ul></div>';
        });

        contentEl.innerHTML = html;
      } catch (err) {
        contentEl.innerHTML = '<p class="empty">Could not load cached articles.</p>';
      }
    }

    loadCachedArticles();
  })();
  </script>
</body>
</html>
