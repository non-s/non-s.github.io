# ============================================================
# GlobalBR News — Configuração Jekyll para GitHub Pages
# Repositório: https://github.com/non-s/non-s.github.io
# ============================================================

# --- Informações básicas do site ---
title: "GlobalBR News"
tagline: "World news: politics, war, science, food, sports & more"
description: "GlobalBR News brings you the latest news from around the world — politics, war & conflict, science, health, food, sports, entertainment, business and technology."
author:
  name: "Julio"
  email: ""
  github: "non-s"

# --- URL e baseurl ---
url: "https://non-s.github.io"
baseurl: ""

# --- Tema ---
# No remote theme: we ship our own layouts + Bootstrap via CDN. The
# previous `theme: minima` shipped a conflicting stylesheet at build time.

# --- Idioma e timezone ---
lang: "en"
timezone: "America/New_York"
locale: "en_US"

# --- Plugins ---
# NB: jekyll-sitemap was tried briefly but removed — we ship
# hand-written sitemap.xml / sitemap-news.xml with
# news+image annotations the plugin can't emit. Letting jekyll-sitemap
# also walk the 14 500+ tag pages slowed builds past the CI timeout.
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-paginate

# --- Paginação ---
paginate: 10
paginate_path: "/page/:num/"

# --- Feed RSS ---
feed:
  title: "GlobalBR News — World News & More"
  subtitle: "World news: politics, war, science, food, sports & more"
  path: "feed.xml"
  categories:
    - world
    - politics
    - war
    - business
    - science
    - health
    - food
    - sports
    - entertainment
    - environment
    - travel
    - technology
    - gadgets
    - ai
    - startups
    - security
    - mobile

# --- SEO Tags (jekyll-seo-tag) ---

social:
  name: "GlobalBR News"
  links:
    - https://github.com/non-s

logo: "/assets/images/logo.png"
image: "/assets/images/og-default.jpg"

# --- Sitemap ---
# We ship a hand-written /sitemap.xml with news+image annotations,
# plus /sitemap-news.xml (48h window).

# --- Posts ---
permalink: /:categories/:year/:month/:day/:title/

show_excerpts: true
excerpt_separator: "<!--more-->"

# --- Markdown ---
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: true

# --- Defaults ---
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      # Match the byline emitted by fetch_news.py for all auto-curated
      # posts. The legacy "Julio" / "TechBR News" values get migrated
      # away in scripts/migrate_authors.py.
      author: "GlobalBR News"
      image: "/assets/images/og-default.jpg"
      lang: "en"
      comments: true
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# --- Categorias padrão ---
categories_label: "Categorias"
tags_label: "Tags"

# --- Exclusões do build ---
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - "*.py"
  - "*.log"
  - requirements.txt
  - README.md
  - COMO_PUBLICAR.md
  - CONTRIBUTING.md
  - SECURITY.md
  - LICENSE
  - .env
  - .env.example
  - .github
  - _videos
  - tests

# --- Sass ---
sass:
  style: compressed
  sass_dir: assets/css

editorial_policy_url: /editorial-policy/
corrections_url: /corrections/

# --- Google Analytics ---
# Replace with your GA4 measurement ID, or comment out to disable analytics.
google_analytics: "G-ZSQXRQJ6WC"

# --- Microsoft Clarity (adicione o Project ID do dashboard Clarity) ---
# clarity_project_id: "XXXXXXXXXX"

# --- Amazon Afiliados (adicione sua tag) ---
# amazon_affiliate_tag: "globalbrnews-20"

# --- Giscus comments (https://giscus.app) ---
# giscus_repo: "non-s/non-s.github.io"
# giscus_repo_id: ""
# giscus_category: "General"
# giscus_category_id: ""

# --- Ko-fi donation button ---
# kofi_id: "globalbrnews"

# --- HTML compression ---
# Disabled. The Liquid-based compress.html template was the bottleneck
# pushing Jekyll past the CI build timeout on this 14 500+ page corpus.
# compress_html:
#   clippings: all
#   comments: all
#   endings: all
#   ignore:
#     envs: development

