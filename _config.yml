# ============================================================
# GlobalBR News — Configuração Jekyll para GitHub Pages
# Repositório: https://github.com/non-s/non-s.github.io
# ============================================================

# --- Informações básicas do site ---
title: "GlobalBR News"
tagline: "World news: politics, war, science, food, sports & more"
description: "GlobalBR News brings you the latest news from around the world — politics, war & conflict, science, health, food, sports, entertainment, business and technology."
author:
  name: "Julio"
  email: ""
  github: "non-s"

# --- URL e baseurl ---
url: "https://non-s.github.io"
baseurl: ""

# --- Tema ---
theme: minima

# --- Idioma e timezone ---
lang: "en"
timezone: "America/New_York"
locale: "en_US"

# --- Plugins ---
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-paginate

# --- Paginação ---
paginate: 10
paginate_path: "/page/:num/"

# --- Feed RSS ---
feed:
  title: "GlobalBR News — World News & More"
  subtitle: "World news: politics, war, science, food, sports & more"
  path: "feed.xml"
  categories:
    - world
    - politics
    - war
    - business
    - science
    - health
    - food
    - sports
    - entertainment
    - environment
    - travel
    - technology
    - gadgets
    - ai
    - startups
    - security
    - mobile

# --- SEO Tags (jekyll-seo-tag) ---

social:
  name: "GlobalBR News"
  links:
    - https://github.com/non-s

logo: "/assets/images/logo.png"
image: "/assets/images/og-default.jpg"

# --- Sitemap ---
sitemap:
  file: "/sitemap.xml"
  exclude:
    - "/404.html"

# --- Posts ---
permalink: /:categories/:year/:month/:day/:title/
show_excerpts: true
excerpt_separator: "<!--more-->"

# --- Markdown ---
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: true

# --- Defaults ---
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Julio"
      image: "/assets/images/default-post.jpg"
      comments: true
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# --- Categorias padrão ---
categories_label: "Categorias"
tags_label: "Tags"

# --- Exclusões do build ---
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - fetch_news.py
  - fetch_news.log
  - README.md
  - COMO_PUBLICAR.md
  - .github
  - requirements.txt
  - _videos

# --- Sass ---
sass:
  style: compressed
  sass_dir: assets/css

# --- Google Analytics (descomente e adicione seu ID) ---
google_analytics: "G-ZSQXRQJ6WC"

# --- Google AdSense (adicione seu publisher ID após aprovação) ---
# adsense_publisher_id: "ca-pub-XXXXXXXXXXXXXXXXX"
# Quando ativo, Auto Ads aparecem automaticamente + 1 unidade manual no post

# --- Microsoft Clarity (adicione o Project ID do dashboard Clarity) ---
# clarity_project_id: "XXXXXXXXXX"

# --- Amazon Afiliados (adicione sua tag) ---
# amazon_affiliate_tag: "techbrnews-20"

# --- Giscus comments (https://giscus.app) ---
# giscus_repo: "non-s/non-s.github.io"
# giscus_repo_id: ""
