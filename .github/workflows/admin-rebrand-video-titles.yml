name: "Admin: rebrand published video titles"

# One-time (re-runnable/idempotent) batch: applies the fixed video_id -> title
# map in scripts/rebrand_video_titles.py -- the rainy-night/cozy anime
# sub-niche title pass agreed with the channel owner on 2026-07-18.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply the rebrand to YouTube"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: admin-rebrand-video-titles
  cancel-in-progress: false

jobs:
  rebrand:
    name: "Rebrand published video titles"
    if: ${{ vars.YOUTUBE_PUBLISHING_ENABLED == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      YOUTUBE_DAILY_QUOTA_BUDGET: ${{ vars.YOUTUBE_DAILY_QUOTA_BUDGET || '10000' }}
      QUOTA_GUARD_MODE: ${{ vars.QUOTA_GUARD_MODE || 'block' }}
      QUOTA_GUARD_MAX_DAILY_RATIO: ${{ vars.QUOTA_GUARD_MAX_DAILY_RATIO || '0.95' }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: "Python 3.11"
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"
          cache: "pip"
      - name: "Install dependencies"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: "Plan rebrand"
        id: plan
        run: |
          python scripts/rebrand_video_titles.py --json | tee rebrand-plan.json
          planned="$(python - <<'PY'
          import json

          with open("rebrand-plan.json", encoding="utf-8") as fh:
              payload = json.load(fh)
          print(int(payload.get("planned") or 0))
          PY
          )"
          echo "planned=$planned" >> "$GITHUB_OUTPUT"
      - name: "Restore YouTube token"
        if: ${{ inputs.apply == 'true' && steps.plan.outputs.planned != '0' }}
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          if [ -z "$YOUTUBE_TOKEN" ]; then
            echo "YOUTUBE_TOKEN is required to apply the rebrand." >&2
            exit 1
          fi
          umask 077
          printf '%s' "$YOUTUBE_TOKEN" > youtube_token.json
          chmod 600 youtube_token.json
      - name: "Quota preflight"
        if: ${{ inputs.apply == 'true' && steps.plan.outputs.planned != '0' }}
        run: |
          quota="$(
          python - <<'PY'
          import json
          from utils.api_quota_budget import estimate_metadata_repair_cost, write_quota_ledger_row

          row = write_quota_ledger_row(estimate_metadata_repair_cost(updates=${{ steps.plan.outputs.planned }}))
          print(json.dumps(row, sort_keys=True))
          PY
          )"
          echo "$quota"
          blocked="$(QUOTA_JSON="$quota" python - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["QUOTA_JSON"])
          print("1" if (payload.get("guard") or {}).get("block") else "0")
          PY
          )"
          if [ "$blocked" = "1" ]; then
            echo "Quota guard blocked the rebrand." >&2
            exit 3
          fi
      - name: "Apply rebrand"
        if: ${{ inputs.apply == 'true' && steps.plan.outputs.planned != '0' }}
        run: |
          set -o pipefail
          python scripts/rebrand_video_titles.py --json --apply | tee rebrand-applied.json
      - name: "Commit rebrand state"
        if: ${{ inputs.apply == 'true' && steps.plan.outputs.planned != '0' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # The quota ledger is written by every workflow that spends quota,
          # including the hourly bot running concurrently with this one --
          # committing it here is a guaranteed rebase conflict sooner or
          # later. Discard it; the marker files are the only state this
          # workflow needs to land.
          git checkout -- _data/analytics/api_quota_ledger.jsonl _data/analytics/api_quota_latest.json 2>/dev/null || true
          git add _videos/*.done
          if git diff --cached --quiet; then
            echo "No rebrand state to commit."
            exit 0
          fi
          git commit -m "Rebrand published video titles to rainy-night anime lofi identity"
          for attempt in 1 2 3; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          echo "Failed to push rebrand state." >&2
          exit 1
      - name: "Remove YouTube token"
        if: always()
        run: rm -f youtube_token.json
