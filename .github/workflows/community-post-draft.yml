name: "Community: draft weekly post"

# The YouTube Data API has no public endpoint for the Community tab (see
# SECURITY.md: "When Studio-only features are needed, generate
# operator-assist artifacts instead of automating them"), so this doesn't
# post anything -- it commits one ready-to-paste suggestion per week to
# _data/community/suggested_post.json via scripts/draft_community_post.py.
# A human still has to paste it into YouTube Studio -> Community. Shares
# COMMUNITY_ENGAGEMENT_ENABLED with community-comment-replies.yml. See
# SETUP.md.

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  draft:
    name: "Draft this week's Community post"
    if: ${{ vars.COMMUNITY_ENGAGEMENT_ENABLED == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: "Draft suggested Community post"
        run: python scripts/draft_community_post.py | tee -a "$GITHUB_STEP_SUMMARY"
      - name: "Persist suggested post"
        run: |
          git config user.name "Amber Hours Bot"
          git config user.email "bot@noreply.amberhours.invalid"
          git add _data/community/suggested_post.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new Community post draft to persist."
            exit 0
          fi
          git commit -m "community: draft weekly Community post"
          for attempt in 1 2 3; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          echo "Failed to push Community post draft." >&2
          exit 1
