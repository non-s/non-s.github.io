name: "📅 Monthly Roundup"

on:
  schedule:
    - cron: "0 10 1 * *"  # 1st of each month at 10h UTC
  workflow_dispatch:

concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  roundup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: "📅 Generate monthly roundup"
        run: python create_monthly_roundup.py
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

      - name: "💾 Commit roundup"
        run: |
          git config user.name "GlobalBR News Bot"
          git config user.email "bot@globalbrnews.com"
          git add _posts/
          git diff --cached --quiet || git commit -m "📅 Monthly roundup — $(date -u +'%B %Y')"
          git push origin HEAD

      - name: "🔔 IndexNow após roundup"
        continue-on-error: true
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -z "$INDEXNOW_KEY" ]; then
            echo "ℹ️ INDEXNOW_KEY not set — skipping."
            exit 0
          fi
          curl -fsS -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{\"host\":\"non-s.github.io\",\"key\":\"$INDEXNOW_KEY\",\"keyLocation\":\"https://non-s.github.io/$INDEXNOW_KEY.txt\",\"urlList\":[\"https://non-s.github.io/sitemap.xml\"]}" \
            || echo "⚠️ IndexNow returned non-zero."
