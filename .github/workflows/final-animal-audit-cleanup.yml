name: "Apply final animal-only audit cleanup"

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/final-animal-audit-cleanup.yml"
  workflow_dispatch:

concurrency:
  group: main-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  apply-cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1
      - name: Download validated text payload
        run: curl -L --fail --silent --show-error https://paste.c-net.org/BitterCapisce -o /tmp/final-cleanup.b64
      - name: Validate text payload
        run: echo "80f7382610f8689e0485307f30659fae4e2570afdd2e4eef5f39b22057c66b11  /tmp/final-cleanup.b64" | sha256sum --check
      - name: Decode ZIP payload
        run: base64 --decode /tmp/final-cleanup.b64 > /tmp/final-cleanup.zip
      - name: Validate ZIP payload
        run: echo "33ca8b23ac98b22ebff8462de731c6dc2e1fe80c265042fa6a9b118529b30629  /tmp/final-cleanup.zip" | sha256sum --check
      - name: Extract audited files
        run: |
          unzip -oq /tmp/final-cleanup.zip -d .
          rm -f _data/feed_cache.json _data/feed_health.json .cleanup-diagnostic.txt
      - name: Commit audited files
        run: |
          git config user.name "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          git add -A
          git commit -m "audit: remove remaining non-animal legacy"
      - name: Push audited files
        run: |
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase --autostash origin main
            sleep $((attempt * 3))
          done
          exit 1
