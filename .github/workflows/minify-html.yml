name: "⚡ Minify HTML Output"
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"  # Sundays 3h UTC (after weekly digest)
jobs:
  minify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install minify-html
      - name: "⚡ Verify Jekyll HTML compression config"
        run: |
          if [ -f "_layouts/compress.html" ]; then
            echo "compress.html already exists"
          else
            echo "ERROR: _layouts/compress.html is missing from the repository" && exit 1
          fi
      - name: "💾 Commit compress layout"
        run: |
          git config user.name "GlobalBR News Bot"
          git config user.email "bot@globalbrnews.com"
          git add _layouts/compress.html || true
          git diff --cached --quiet || git commit -m "⚡ Add Jekyll HTML compress layout"
          git push origin HEAD || true
