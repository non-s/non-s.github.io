name: Apply animal quality migration

on:
  push:
    paths:
      - '.github/workflows/animal-quality-migration.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify write permission
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          echo ok > .animal-quality-patch/write-check.txt
          git add .animal-quality-patch/write-check.txt
          git commit -m 'chore: verify actions write permission'
          git push
