name: "📊 TikTok Analytics nightly"

# Pull the previous 24h of performance data once a day. Lands a CSV
# snapshot under _data/analytics/YYYY-MM-DD.csv plus a `latest.json`
# summary. Both are committed back to the repo so trends are visible
# in `git log` without any external analytics service.
#
# Runs at 03:00 UTC — after all 5 daily Shorts have shipped and
# TikTok's view/like counters have a few hours to settle.
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  pull-analytics:
    name: "Pull TikTok Analytics"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4.2.2

      - name: "Python 3.11"
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "Install deps"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Restore tiktok_token.json"
        env:
          TIKTOK_TOKEN: ${{ secrets.TIKTOK_TOKEN }}
        run: |
          if [ -z "$TIKTOK_TOKEN" ]; then
            echo "❌ TIKTOK_TOKEN secret is not set."
            exit 1
          fi
          umask 077
          printf '%s' "$TIKTOK_TOKEN" > tiktok_token.json
          chmod 600 tiktok_token.json
          if ! python -m json.tool < tiktok_token.json > /dev/null 2>&1; then
            echo "❌ TIKTOK_TOKEN is not valid JSON."
            rm -f tiktok_token.json
            exit 1
          fi

      - name: "Pull analytics"
        run: python tiktok_analytics.py
        env:
          PYTHONIOENCODING:     utf-8
          PYTHONUNBUFFERED:     "1"
          TIKTOK_CLIENT_KEY:    ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}

      - name: "Snapshot early-window velocities"
        run: |
          python - <<'PY'
          from utils.velocity import snapshot_velocities
          n = snapshot_velocities()
          print(f"📈 Recorded {n} velocity snapshots")
          PY
        env:
          TIKTOK_CLIENT_KEY:    ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}

      - name: "Commit CSV snapshot"
        run: |
          git config user.name  "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          git add _data/analytics/ _data/velocity.jsonl _data/tiktok_quota_log.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "ℹ️ No analytics changes."
            exit 0
          fi
          git commit -m "📊 analytics snapshot — $(date -u +'%Y-%m-%d')"
          for attempt in 1 2 3; do
            if git push origin HEAD; then exit 0; fi
            git pull --rebase --autostash origin main || git rebase --abort
            sleep $((attempt * 5))
          done
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "🧹 Shred token"
        if: always()
        run: |
          if [ -f tiktok_token.json ]; then
            shred -u tiktok_token.json 2>/dev/null || rm -f tiktok_token.json
          fi
