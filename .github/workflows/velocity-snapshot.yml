name: "📈 Velocity snapshots"

# Snapshot Shorts view counts at +2h / +6h / +24h post-upload to
# capture the early-window velocity signal — the strongest predictor
# of whether TikTok's For You algorithm will distribute a video. Runs
# every 2 hours so each target offset is sampled with ±1 h tolerance.
#
# TikTok's video/query endpoint is rate-limited but not formally
# quoted; 12 runs/day × ~5 calls = negligible. We still log to the
# quota ledger so anomalies surface.

on:
  schedule:
    - cron: "0 */2 * * *"     # every 2 h
  workflow_dispatch:

# Reads from .done sidecars and appends to _data/velocity.jsonl; needs
# write access so the commit step can push the ledger update.
concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: "Restore token"
        env:
          TIKTOK_TOKEN: ${{ secrets.TIKTOK_TOKEN }}
        run: |
          if [ -z "$TIKTOK_TOKEN" ]; then
            echo "❌ TIKTOK_TOKEN secret is not set."
            exit 1
          fi
          umask 077
          printf '%s' "$TIKTOK_TOKEN" > tiktok_token.json
          chmod 600 tiktok_token.json
          if ! python -m json.tool < tiktok_token.json > /dev/null 2>&1; then
            echo "❌ TIKTOK_TOKEN is not valid JSON."
            rm -f tiktok_token.json; exit 1
          fi

      - name: "Snapshot"
        run: |
          python - <<'PY'
          from utils.velocity import snapshot_velocities
          n = snapshot_velocities()
          print(f"📈 Recorded {n} velocity snapshots")
          PY
        env:
          TIKTOK_CLIENT_KEY:    ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}

      - name: "Commit ledger"
        run: |
          git config user.name  "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          git add _data/velocity.jsonl _data/tiktok_quota_log.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "✅ No snapshots taken this run."
          else
            git commit -m "📈 velocity snapshots — $(date -u +'%Y-%m-%d %H:%M UTC')"
            for attempt in 1 2 3; do
              git push origin HEAD && exit 0
              git pull --rebase --autostash origin main || git rebase --abort
              sleep $((attempt * 5))
            done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Shred token"
        if: always()
        run: |
          if [ -f tiktok_token.json ]; then
            shred -u tiktok_token.json 2>/dev/null || rm -f tiktok_token.json
          fi
