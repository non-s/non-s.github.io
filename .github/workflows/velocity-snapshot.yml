name: "📈 Velocity snapshots"

# Snapshot Shorts view counts at +2h / +6h / +24h post-upload to
# capture the early-window velocity signal — the strongest predictor
# of whether the Shorts algorithm will distribute a video. Runs every
# 2 hours so each target offset is sampled with ±1 h tolerance.
#
# Each snapshot costs 1 unit (videos.list, batched). 12 runs/day × 1
# unit = 12 units/day — negligible against the 10 000 daily cap.

on:
  schedule:
    - cron: "0 */2 * * *"     # every 2 h
  workflow_dispatch:

# Reads from .done sidecars and appends to _data/velocity.jsonl; needs
# write access so the commit step can push the ledger update.
concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: "Restore token"
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          if [ -z "$YOUTUBE_TOKEN" ]; then
            echo "❌ YOUTUBE_TOKEN secret is not set."
            exit 1
          fi
          umask 077
          printf '%s' "$YOUTUBE_TOKEN" > token.json
          chmod 600 token.json
          if ! python -m json.tool < token.json > /dev/null 2>&1; then
            echo "❌ YOUTUBE_TOKEN is not valid JSON."
            rm -f token.json; exit 1
          fi

      - name: "Snapshot"
        run: |
          python - <<'PY'
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build
          from utils.velocity import snapshot_velocities

          creds = Credentials.from_authorized_user_file("token.json")
          if creds.expired and creds.refresh_token:
              creds.refresh(Request())
          youtube = build("youtube", "v3", credentials=creds, cache_discovery=False)
          n = snapshot_velocities(youtube)
          print(f"📈 Recorded {n} velocity snapshots")
          PY

      - name: "Commit ledger"
        run: |
          git config user.name  "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          git add _data/velocity.jsonl _data/quota_log.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "✅ No snapshots taken this run."
          else
            git commit -m "📈 velocity snapshots — $(date -u +'%Y-%m-%d %H:%M UTC')"
            for attempt in 1 2 3; do
              git push origin HEAD && exit 0
              git pull --rebase --autostash origin main || git rebase --abort
              sleep $((attempt * 5))
            done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Shred token"
        if: always()
        run: |
          if [ -f token.json ]; then
            shred -u token.json 2>/dev/null || rm -f token.json
          fi
