name: Generate Long Video

on:
  schedule:
    # Runs once a day at 23:00 UTC
    - cron: '0 23 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl
          pip install -r requirements.txt

      - name: Generate Long Video
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || secrets.CEREBRAS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.GEMINI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || secrets.GROQ }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY || secrets.PEXELS }}
        run: python generate_long_video.py

      - name: Locate Generated Video
        id: locate_video
        run: |
          latest="$(ls -t _videos/long_video_*.mp4 2>/dev/null | head -n1 || true)"
          echo "path=$latest" >> "$GITHUB_OUTPUT"
          if [ -n "$latest" ]; then
            echo "Generated video: $latest"
          else
            echo "No video was generated this run."
          fi

      - name: Upload Generated Video as Artifact
        if: steps.locate_video.outputs.path != ''
        uses: actions/upload-artifact@v7
        with:
          name: long-video-${{ github.run_id }}
          path: ${{ steps.locate_video.outputs.path }}
          retention-days: 14
