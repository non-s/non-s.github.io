name: "One-time visual quality migration"

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/visual-quality-migration.yml"

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Apply audited visual patch
        run: |
          cat .visual-quality-patch/chunk*.txt | base64 -d | gzip -d > /tmp/visual-quality.patch
          git apply /tmp/visual-quality.patch
          rm -rf .visual-quality-patch
      - name: Commit repository state
        run: |
          git config user.name "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          git add -A
          git commit -m "Refine YouTube Shorts thumbnails and opening hooks"
          git push origin HEAD:main
