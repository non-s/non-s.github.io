name: "CI - Pata Jazz"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: "Testes de sintaxe e unidade"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: "Python 3.11"
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: "pip"
      - name: "Instalar dependencias"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: "Compile check"
        run: python -m compileall -q .
      - name: "Pytest + coverage"
        run: pytest -q --cov=utils --cov-report=term-missing
