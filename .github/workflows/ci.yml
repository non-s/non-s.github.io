name: "🔍 CI — lint + tests"

# Every push to main + every PR. Catches the class of breakage that
# previously only surfaced when a cron-scheduled bot run failed in
# production (broken imports, failing tests, malformed JSON/YAML, bad
# workflow syntax).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Don't waste minutes running the old SHA when a new push lands.
concurrency:
  group: "ci-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: "Python ${{ matrix.python }} — lint + tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4.2.2

      - name: "Set up Python ${{ matrix.python }}"
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pyflakes

      - name: "Syntax check (compileall)"
        run: python -m compileall -q .

      - name: "Lint (pyflakes)"
        run: python -m pyflakes utils/ tests/ ./*.py

      - name: "Tests (pytest)"
        run: python -m pytest tests/ -v --tb=short

  data-files:
    name: "JSON / YAML validation"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: "Validate JSON files"
        run: |
          set -e
          # NUL-delimited find | read loop tolerates whitespace in paths
          # (which shouldn't appear here, but shellcheck-clean is policy).
          while IFS= read -r -d '' f; do
            python -c "import json; json.load(open('$f'))" \
              || { echo "❌ invalid JSON: $f"; exit 1; }
          done < <(find . -name '*.json' -not -path './.git/*' -print0)
          echo "✅ all JSON files parse"

      - name: "Validate YAML files"
        run: |
          set -e
          pip install --quiet PyYAML
          while IFS= read -r -d '' f; do
            python -c "import yaml; yaml.safe_load(open('$f'))" \
              || { echo "❌ invalid YAML: $f"; exit 1; }
          done < <(find .github -name '*.yml' -print0)
          echo "✅ all YAML files parse"

  actions:
    name: "Workflow lint (actionlint)"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4.2.2

      - name: "Install actionlint"
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -version

      - name: "Lint workflows"
        run: ./actionlint -color
