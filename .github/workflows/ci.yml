name: "CI - Pata Jazz"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: "Testes de sintaxe e unidade"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: "Instalar dependencias"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: "Pytest"
        run: pytest -q
