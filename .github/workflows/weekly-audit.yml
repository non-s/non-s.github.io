name: "🔍 Weekly Site Audit"

on:
  schedule:
    - cron: "0 8 * * 1"  # Monday 8h UTC
  workflow_dispatch:

concurrency:
  group: weekly-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: "🔍 Run site audit"
        run: python audit_site.py

      - name: "💾 Commit audit report"
        run: |
          git config user.name "GlobalBR News Bot"
          git config user.email "bot@globalbrnews.com"
          git add _data/audit_report.json
          git diff --cached --quiet || git commit -m "📊 Weekly audit report — $(date -u +'%Y-%m-%d')"
          git push origin HEAD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "🔔 IndexNow após auditoria"
        continue-on-error: true
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -z "$INDEXNOW_KEY" ]; then
            echo "ℹ️ INDEXNOW_KEY not set — skipping."
            exit 0
          fi
          curl -fsS -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{\"host\":\"non-s.github.io\",\"key\":\"$INDEXNOW_KEY\",\"keyLocation\":\"https://non-s.github.io/$INDEXNOW_KEY.txt\",\"urlList\":[\"https://non-s.github.io/sitemap.xml\"]}" \
            || echo "⚠️ IndexNow returned non-zero (sometimes expected)."
