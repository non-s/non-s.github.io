name: "🗺️ Sitemap Ping"

# Google deprecated their /ping endpoint in 2023 and Bing followed soon
# after — sitemap submission now happens via Search Console, Bing
# Webmaster Tools, or IndexNow. This workflow notifies IndexNow whenever
# the Pages deploy succeeds.

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: [completed]
  workflow_dispatch:

jobs:
  ping:
    name: "Notify IndexNow"
    runs-on: ubuntu-latest
    timeout-minutes: 2
    # No write permissions needed — pure outbound curl.
    permissions: {}
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: "🔔 IndexNow"
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
        run: |
          KEY="${INDEXNOW_KEY:-$BING_API_KEY}"
          if [ -z "$KEY" ]; then
            echo "ℹ️ INDEXNOW_KEY not set — skipping."
            exit 0
          fi
          curl -fsS -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{\"host\":\"non-s.github.io\",\"key\":\"$KEY\",\"keyLocation\":\"https://non-s.github.io/$KEY.txt\",\"urlList\":[\"https://non-s.github.io/\",\"https://non-s.github.io/sitemap.xml\",\"https://non-s.github.io/sitemap-news.xml\"]}" \
            || echo "⚠️ IndexNow ping returned non-zero (sometimes expected)."
