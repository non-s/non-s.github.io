name: "Admin: check media library size"

# Manual-only, read-only diagnostic: restores the same actions/cache the
# live relay and Shorts publisher use (key prefix lofi-media-) into a
# throwaway job and counts what's in it, so "how many songs/clips are in
# the library right now" has a real answer instead of a guess -- doesn't
# touch the running live-stream job or its cache entry.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout"
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: "Restore lofi media libraries from cache"
        uses: actions/cache@v4
        with:
          path: |
            _assets/audio/bgm
            _assets/video/lofi_broll
          key: lofi-media-${{ github.run_id }}
          restore-keys: |
            lofi-media-

      - name: "Count tracks and clips"
        run: |
          bgm_count=$(find _assets/audio/bgm -name 'jamendo_*.mp3' 2>/dev/null | wc -l)
          broll_count=$(find _assets/video/lofi_broll -name 'pixabay_*.mp4' 2>/dev/null | wc -l)
          echo "bgm tracks: $bgm_count"
          echo "broll clips: $broll_count"
          {
            echo "## Lofi media library"
            echo "- bgm tracks: $bgm_count"
            echo "- broll clips: $broll_count"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "List b-roll clip metadata"
        run: |
          for meta in _assets/video/lofi_broll/pixabay_*.json; do
            [ -e "$meta" ] || continue
            echo "--- $(basename "$meta") ---"
            cat "$meta"
            echo
          done
