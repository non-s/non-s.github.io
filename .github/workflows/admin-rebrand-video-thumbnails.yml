name: "Admin: rebrand published video thumbnails"

# One-time (re-runnable/idempotent) batch: brands the thumbnail and
# refreshes tags for every video published before the generators started
# branding thumbnails themselves (426a5fb7f) -- agreed with the channel
# owner on 2026-07-19 as a follow-up once titles were confirmed
# consistent. scripts/rebrand_video_thumbnails.py's own timestamp check
# skips anything the pipeline already branded at upload time.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply the rebrand to YouTube"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: admin-rebrand-video-thumbnails
  cancel-in-progress: false

jobs:
  rebrand:
    name: "Rebrand published video thumbnails"
    if: ${{ vars.YOUTUBE_PUBLISHING_ENABLED == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      YOUTUBE_DAILY_QUOTA_BUDGET: ${{ vars.YOUTUBE_DAILY_QUOTA_BUDGET || '10000' }}
      QUOTA_GUARD_MODE: ${{ vars.QUOTA_GUARD_MODE || 'block' }}
      QUOTA_GUARD_MAX_DAILY_RATIO: ${{ vars.QUOTA_GUARD_MAX_DAILY_RATIO || '0.95' }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: "Python 3.11"
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"
          cache: "pip"
      - name: "Install dependencies"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: "Plan rebrand"
        id: plan
        run: |
          python scripts/rebrand_video_thumbnails.py --json | tee thumb-rebrand-plan.json
          planned="$(python - <<'PY'
          import json

          with open("thumb-rebrand-plan.json", encoding="utf-8") as fh:
              payload = json.load(fh)
          print(int(payload.get("planned") or 0))
          PY
          )"
          echo "planned=$planned" >> "$GITHUB_OUTPUT"
      - name: "Restore YouTube token"
        if: ${{ inputs.apply == 'true' && steps.plan.outputs.planned != '0' }}
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          if [ -z "$YOUTUBE_TOKEN" ]; then
            echo "YOUTUBE_TOKEN is required to apply the rebrand." >&2
            exit 1
          fi
          umask 077
          printf '%s' "$YOUTUBE_TOKEN" > youtube_token.json
          chmod 600 youtube_token.json
      - name: "Quota preflight"
        if: ${{ inputs.apply == 'true' && steps.plan.outputs.planned != '0' }}
        run: |
          quota="$(
          python - <<'PY'
          import json
          from utils.api_quota_budget import estimate_cost, write_quota_ledger_row

          planned = ${{ steps.plan.outputs.planned }}
          calls = {"youtube.thumbnails.set": planned, "youtube.videos.update": planned}
          row = write_quota_ledger_row(
              {"workflow": "admin-rebrand-video-thumbnails", "calls": calls, "estimated_units": estimate_cost(calls)}
          )
          print(json.dumps(row, sort_keys=True))
          PY
          )"
          echo "$quota"
          blocked="$(QUOTA_JSON="$quota" python - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["QUOTA_JSON"])
          print("1" if (payload.get("guard") or {}).get("block") else "0")
          PY
          )"
          if [ "$blocked" = "1" ]; then
            echo "Quota guard blocked the rebrand." >&2
            exit 3
          fi
      - name: "Apply rebrand"
        if: ${{ inputs.apply == 'true' && steps.plan.outputs.planned != '0' }}
        run: |
          set -o pipefail
          python scripts/rebrand_video_thumbnails.py --json --apply | tee thumb-rebrand-applied.json
      - name: "Commit rebrand state"
        if: ${{ inputs.apply == 'true' && steps.plan.outputs.planned != '0' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # See admin-rebrand-video-titles.yml's comment: the quota ledger
          # is written by every quota-spending workflow, discard it here
          # rather than risk a rebase conflict against the hourly bot.
          git checkout -- _data/analytics/api_quota_ledger.jsonl _data/analytics/api_quota_latest.json 2>/dev/null || true
          git add _videos/*.done
          if git diff --cached --quiet; then
            echo "No rebrand state to commit."
            exit 0
          fi
          git commit -m "Rebrand published video thumbnails and tags to the Amber Hours identity"
          for attempt in 1 2 3; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          echo "Failed to push rebrand state." >&2
          exit 1
      - name: "Remove YouTube token"
        if: always()
        run: rm -f youtube_token.json
