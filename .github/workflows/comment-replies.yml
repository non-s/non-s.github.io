name: "💬 Auto-reply to viewer comments"

# Comments-per-view is one of the top three documented Shorts ranking
# signals. Beyond the single pinned first-comment we post on upload,
# we periodically reply to top-level viewer comments on recently-
# published Shorts. Replies count as comments → lift the parent's
# visibility → YouTube reads the channel as "creator is active here".
#
# Runs 6 hours apart so each Short gets a few replies during its
# critical 24-h algorithm window.
#
# Quota: 5 replies per video × 3 videos per check × ~750 units/run = 6 %
# of the 10k daily cap per run, well under safe limits.

on:
  schedule:
    - cron: "0 */6 * * *"     # every 6h
  workflow_dispatch:

concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  reply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: "Restore token"
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          if [ -z "$YOUTUBE_TOKEN" ]; then
            echo "❌ YOUTUBE_TOKEN secret is not set."
            exit 1
          fi
          umask 077
          printf '%s' "$YOUTUBE_TOKEN" > token.json
          chmod 600 token.json
          if ! python -m json.tool < token.json > /dev/null 2>&1; then
            echo "❌ YOUTUBE_TOKEN is not valid JSON."
            rm -f token.json; exit 1
          fi

      - name: "Auto-reply"
        run: |
          python - <<'PY'
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build
          from utils.comment_replies import reply_to_recent

          creds = Credentials.from_authorized_user_file("token.json")
          if creds.expired and creds.refresh_token:
              creds.refresh(Request())
          youtube = build("youtube", "v3", credentials=creds, cache_discovery=False)

          # Get our own channel id so we don't reply to our own comments.
          mine = youtube.channels().list(part="id", mine=True).execute()
          my_id = mine["items"][0]["id"] if mine.get("items") else None

          posted = reply_to_recent(youtube, my_channel_id=my_id)
          print(f"💬 Posted {posted} replies")
          PY

      - name: "Commit reply log + quota ledger"
        run: |
          git config user.name  "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          git add _data/comment_replies.jsonl _data/quota_log.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "✅ No new replies to commit."
          else
            git commit -m "💬 comment auto-replies — $(date -u +'%Y-%m-%d %H:%M UTC')"
            for attempt in 1 2 3; do
              git push origin HEAD && exit 0
              git pull --rebase --autostash origin main || git rebase --abort
              sleep $((attempt * 5))
            done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Shred token"
        if: always()
        run: |
          if [ -f token.json ]; then
            shred -u token.json 2>/dev/null || rm -f token.json
          fi
