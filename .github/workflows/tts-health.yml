name: "TTS fallback health"

on:
  workflow_dispatch:
  schedule:
    - cron: "10 5 * * 1"

permissions:
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
      - name: "Check optional Coqui fallback"
        run: python scripts/tts_healthcheck.py --no-synth --json
