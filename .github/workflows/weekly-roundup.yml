name: "📰 Weekly long-form roundup"

# Long-form is the algorithmic foundation Shorts-only channels lack.
# Per the case-study research, channels that grew past ~100k subs all
# had at least one long-form upload per week — total watch time
# (long-form wins) outranks average view % (Shorts wins) on YouTube's
# overall ranking layer.
#
# This workflow runs every Sunday at 21:00 UTC (= 18:00 BRT, prime
# evening viewing) and builds a 9-11 minute "Top 7 of the week"
# vertical video from the highest-scoring Shorts of the prior 7 days.
#
# Same primitives as the daily Shorts pipeline (b-roll, captions,
# zoompan, Whisper) so cost stays at zero.

on:
  schedule:
    - cron: "0 21 * * 0"   # Sundays 21:00 UTC
  workflow_dispatch:

concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  roundup:
    runs-on: ubuntu-latest
    timeout-minutes: 45    # 10-min audio + b-roll downloads + ffmpeg = ~20 min real
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "Instalar FFmpeg, libass e fontes"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg libass9 \
            fonts-dejavu-core fonts-liberation fonts-noto-core \
            fonts-noto-mono fonts-open-sans fontconfig
          sudo fc-cache -f -v

      - name: "Instalar dependencias Python"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install --no-deps "faster-whisper>=1.0,<2.0" "ctranslate2>=4.0,<5.0" || true

      - name: "Restaurar token do YouTube"
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          if [ -z "$YOUTUBE_TOKEN" ]; then
            echo "❌ YOUTUBE_TOKEN não configurado."
            exit 1
          fi
          umask 077
          printf '%s' "$YOUTUBE_TOKEN" > token.json
          chmod 600 token.json
          if ! python -m json.tool < token.json > /dev/null 2>&1; then
            echo "❌ YOUTUBE_TOKEN não é JSON válido."
            rm -f token.json; exit 1
          fi

      - name: "🎬 Generate roundup"
        run: python generate_roundup.py
        env:
          PYTHONIOENCODING:  utf-8
          PYTHONUNBUFFERED:  "1"
          MISTRAL_API_KEY:   ${{ secrets.MISTRAL_API_KEY }}
          CEREBRAS_API_KEY:  ${{ secrets.CEREBRAS_API_KEY || secrets.CEREBRAS }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY   || secrets.GEMINI   }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY     || secrets.GROQ     }}
          PEXELS_API_KEY:    ${{ secrets.PEXELS_API_KEY   || secrets.PEXELS   }}

      - name: "📤 Upload roundup"
        run: python upload_youtube.py
        env:
          PYTHONIOENCODING:      utf-8
          PYTHONUNBUFFERED:      "1"
          BLUESKY_HANDLE:        ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD:  ${{ secrets.BLUESKY_APP_PASSWORD }}
          REDDIT_USER_AGENT:     ${{ secrets.REDDIT_USER_AGENT }}
          REDDIT_USERNAME:       ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD:       ${{ secrets.REDDIT_PASSWORD }}
          REDDIT_CLIENT_ID:      ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET:  ${{ secrets.REDDIT_CLIENT_SECRET }}

      - name: "💾 Commit done markers"
        run: |
          git config user.name  "GlobalBR News Bot"
          git config user.email "bot@globalbrnews.com"
          git add _videos/roundup-*.done 2>/dev/null || true
          git add _videos/roundup-*.json 2>/dev/null || true
          git add _data/quota_log.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "✅ Nothing to commit."
          else
            git commit -m "🎬 weekly roundup — $(date -u +'%Y-%m-%d')"
            git push origin HEAD
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Logs"
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: "roundup-log-${{ github.run_number }}"
          path: generate_roundup.log
          retention-days: 14
          if-no-files-found: ignore

      - name: "🧹 Shred token"
        if: always()
        run: |
          if [ -f token.json ]; then
            shred -u token.json 2>/dev/null || rm -f token.json
          fi
