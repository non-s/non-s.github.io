name: "One-time normalize audited paths"

on:
  push:
    paths:
      - ".github/workflows/normalize-audit-paths.yml"

permissions:
  contents: write

concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  normalize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
      - name: "Normalize Windows archive paths"
        run: |
          python - <<'PY'
          from pathlib import Path
          moves = {
              r'.github\workflows\daily-digest.yml': '.github/workflows/daily-digest.yml',
              r'.github\workflows\youtube-bot.yml': '.github/workflows/youtube-bot.yml',
              r'tests\test_broll.py': 'tests/test_broll.py',
              r'tests\test_fetch_animals.py': 'tests/test_fetch_animals.py',
              r'tests\test_youtube_focus_audit.py': 'tests/test_youtube_focus_audit.py',
              r'utils\broll.py': 'utils/broll.py',
          }
          for raw_source, raw_target in moves.items():
              source, target = Path(raw_source), Path(raw_target)
              assert source.exists(), f'missing malformed source path: {raw_source}'
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(source.read_bytes())
              source.unlink()
          for raw in (
              r'_data\ai_cache.jsonl',
              r'_data\stories_queue.json',
              '_videos_pt-BR/short-test-slug-ptbr-2026-05-18_thumb.jpg',
              '.github/workflows/normalize-audit-paths.yml',
          ):
              Path(raw).unlink(missing_ok=True)
          PY
      - name: "Install audit dependencies"
        run: pip install -r requirements.txt pytest
      - name: "Validate normalized production tree"
        run: |
          python -m compileall -q .
          python -m pytest -q
          python - <<'PY'
          import json
          from pathlib import Path
          import fetch_animals
          assert not any('\\' in path.as_posix() for path in Path('.').rglob('*'))
          queue = json.loads(Path('_data/stories_queue.json').read_text(encoding='utf-8'))
          stories = queue.get('stories', [])
          assert stories, 'production queue is empty'
          scripts = set()
          for story in stories:
              clip = type('Clip', (), {'url': story.get('url', ''), 'title': story.get('title', '')})()
              subject = fetch_animals._subject_from_clip(clip, story.get('category', ''))
              assert fetch_animals._topic_accepts_subject(fetch_animals.ANIMAL_TOPICS[story['category']], subject), subject
              assert fetch_animals._script_matches_visible_subject(subject, story.get('script', '')), subject
              key = fetch_animals._script_key(story.get('script', ''))
              assert key and key not in scripts, f'duplicate script: {subject}'
              scripts.add(key)
          print(f'normalized queue audit passed: {len(stories)} unique aligned stories')
          PY
      - name: "Commit normalized production tree"
        run: |
          git config user.name "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          git add -A
          git commit -m "audit: normalize repaired production tree"
          git push origin HEAD
