name: "Admin: check live broadcast status"

# Manual-only, read-only diagnostic: prints the current active/ready/
# testing broadcast's real title/description straight from the YouTube
# Data API, so a manual edit in YouTube Studio can be checked before the
# relay's rebrand-if-stale logic silently reverts it back to the hardcoded
# BROADCAST_TITLE/BROADCAST_DESCRIPTION constants.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-status:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout"
        uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false

      - name: "Python 3.11"
        uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "Instalar dependencias Python"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Restaurar tokens do YouTube"
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          umask 077
          if [ -n "$YOUTUBE_TOKEN" ]; then
            printf '%s' "$YOUTUBE_TOKEN" > youtube_token.json
            chmod 600 youtube_token.json
          fi

      - name: "Checar status do broadcast ao vivo"
        run: python scripts/check_live_broadcast_status.py

      - name: "Apagar tokens do YouTube no final"
        if: always()
        run: |
          for path in youtube_token.json; do
            if [ -f "$path" ]; then
              shred -u "$path" 2>/dev/null || rm -f "$path"
            fi
          done
