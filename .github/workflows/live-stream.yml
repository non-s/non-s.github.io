name: 24/7 Live Stream Relay

on:
  schedule:
    # Runs every 5 hours and 50 minutes. We use a Cron that triggers hourly, 
    # but the script will handle running for 5.8 hours before exiting.
    # Actually, a simpler approach is repository_dispatch or workflow_dispatch,
    # but to loop automatically we can use a cron that runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 hours max

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl
          pip install -r requirements.txt
      - name: Restore YouTube Token
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          if [ -n "$YOUTUBE_TOKEN" ]; then
            printf '%s' "$YOUTUBE_TOKEN" > youtube_token.json
            chmod 600 youtube_token.json
            echo "Token restored."
          else
            echo "No YouTube token configured."
          fi

      - name: Sync bgm library
        # _assets/audio/bgm/*.mp3 is gitignored -- it only exists on a
        # machine after this has run there. Without this step the relay
        # starts with an empty bgm library and streams silently (no audio
        # track at all), which stops YouTube from ever transitioning the
        # broadcast out of "waiting for stream data".
        run: python scripts/sync_lofi_youtube_music.py

      - name: Run Live Stream
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # We run this in a while loop so if ffmpeg crashes it restarts instantly.
        # GitHub will forcibly kill the runner at 6 hours, and the cron will start a new one.
        run: |
          mkdir -p _videos
          while true; do
            git pull origin main || true
            run_id=$(gh run list --workflow="Generate Long Video" --status=success --limit 1 --json databaseId --jq '.[0].databaseId' 2>/dev/null || true)
            if [ -n "$run_id" ]; then
              echo "Downloading latest horizontal video (run $run_id)..."
              gh run download "$run_id" --name "long-video-$run_id" --dir _videos || true
            else
              echo "No successful long video run found."
            fi
            python scripts/live_stream_dynamic.py
            sleep 5
          done
