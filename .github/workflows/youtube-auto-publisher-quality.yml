name: YouTube Auto Publisher Quality

on:
  push:
    paths:
      - 'youtube-auto-publisher/**'
  pull_request:
    paths:
      - 'youtube-auto-publisher/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-youtube-auto-publisher-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ./youtube-auto-publisher

jobs:
  python-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Compile Python modules
        run: python -m compileall -q .

      - name: Validate workflow contracts
        run: python scripts/check_workflows.py

      - name: Validate repository contracts
        run: python scripts/check_repo_contracts.py

      - name: Validate production contracts
        run: python scripts/check_production_contracts.py

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run unit tests (pytest)
        run: pytest --verbose
