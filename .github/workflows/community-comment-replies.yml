name: "Community: reply to comments"

# Closes a real gap flagged by the 2026-07-21 channel audit: zero community
# engagement signal (no comment replies, no Community-tab activity) on an
# otherwise fully-automated channel. scripts/reply_to_comments.py replies to
# fresh top-level comments across the channel via the official
# commentThreads/comments API (see that script's docstring for the full
# rationale and guardrails: local ledger dedup, spam/link skip, per-run cap).
# Gated by its own COMMUNITY_ENGAGEMENT_ENABLED variable rather than
# YOUTUBE_PUBLISHING_ENABLED -- posting a reply under the channel's identity
# is a distinct trust boundary from publishing a video, so it can be turned
# on independently. See SETUP.md.

on:
  schedule:
    - cron: "15 1,5,9,13,17,21 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log what would be replied without posting"
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: community-comment-replies
  cancel-in-progress: false

jobs:
  reply:
    name: "Reply to fresh comments"
    if: ${{ vars.COMMUNITY_ENGAGEMENT_ENABLED == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.11"
          cache: "pip"
      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: "Restore YouTube token"
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          umask 077
          if [ -n "$YOUTUBE_TOKEN" ]; then
            printf '%s' "$YOUTUBE_TOKEN" > youtube_token.json
            chmod 600 youtube_token.json
          fi
      - name: "Reply to comments"
        if: hashFiles('youtube_token.json') != ''
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          COMMENT_REPLY_MAX_PER_RUN: ${{ vars.COMMENT_REPLY_MAX_PER_RUN || '15' }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scripts/reply_to_comments.py --dry-run
          else
            python scripts/reply_to_comments.py
          fi
      - name: "Persist reply ledger"
        if: always() && hashFiles('youtube_token.json') != ''
        run: |
          git config user.name "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          git add _data/community/replied_comments.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new replies to persist."
            exit 0
          fi
          git commit -m "community: comment reply ledger - $(date -u +'%Y-%m-%d')"
          for attempt in 1 2 3; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          echo "Failed to push reply ledger." >&2
          exit 1
      - name: "Delete YouTube token"
        if: always()
        run: |
          for path in youtube_token.json; do
            if [ -f "$path" ]; then
              shred -u "$path" 2>/dev/null || rm -f "$path"
            fi
          done
