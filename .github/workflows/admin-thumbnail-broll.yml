name: "Admin: thumbnail b-roll clips"

# Manual-only, read-only diagnostic: extracts one frame per cached b-roll
# clip and uploads them as a downloadable artifact, so a clip can be
# visually identified/verified without needing raw Pixabay page access
# (checked live: Pixabay's own pages are behind bot-detection that
# blocks both WebFetch and curl from this environment).
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  thumbnail:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "Checkout"
        uses: actions/checkout@v7.0.0

      - name: "Install ffmpeg"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: "Restore lofi media libraries from cache"
        uses: actions/cache@v4
        with:
          path: |
            _assets/audio/bgm
            _assets/video/lofi_broll
          key: lofi-media-${{ github.run_id }}
          restore-keys: |
            lofi-media-

      - name: "Extract one frame per clip"
        run: |
          mkdir -p _thumbs
          for f in _assets/video/lofi_broll/pixabay_*.mp4; do
            [ -e "$f" ] || continue
            id=$(basename "$f" .mp4)
            ffmpeg -y -ss 1 -i "$f" -frames:v 1 -vf scale=480:-1 "_thumbs/${id}.jpg" || true
          done
          ls -la _thumbs

      - name: "Upload thumbnails artifact"
        uses: actions/upload-artifact@v7
        with:
          name: "broll-thumbnails-${{ github.run_number }}"
          path: _thumbs
          retention-days: 1
          if-no-files-found: warn
