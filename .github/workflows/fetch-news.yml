# ============================================================
# .github/workflows/fetch-news.yml
# Refresh the RSS stories queue (_data/stories_queue.json).
# generate_shorts.py reads from that queue on the next youtube-bot run.
# ============================================================

name: "📰 Refresh stories queue"

on:
  schedule:
    # Every 3h — the queue is consumed once a day by youtube-bot, so
    # this keeps it warm with the latest 100-ish stories from each
    # ~3-hour news cycle.
    - cron: "0 */3 * * *"

  workflow_dispatch:

# Serialise with youtube-bot to avoid two workflows pushing the
# stories_queue.json at the same time.
concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  refresh-queue:
    name: "Pull RSS and update the queue"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: "🐍 Set up Python 3.11"
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "✅ Validate Python syntax"
        run: |
          python -m compileall -q fetch_news.py utils/

      - name: "📡 Run fetch_news.py"
        timeout-minutes: 25
        run: python fetch_news.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

      - name: "💾 Commit queue + state files"
        run: |
          git config user.name  "GlobalBR News Bot"
          git config user.email "bot@globalbrnews.com"
          git add _data/stories_queue.json _data/feed_cache.json _data/feed_health.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "✨ No new stories — nothing to commit."
            exit 0
          fi
          PENDING=$(python -c "import json; d=json.load(open('_data/stories_queue.json')); print(sum(1 for s in d.get('stories',[]) if not s.get('consumed')))")
          git commit -m "🤖 queue refresh — ${PENDING} pending — $(date -u +'%Y-%m-%d %H:%M UTC')

          Workflow: ${GH_WORKFLOW} #${GH_RUN_NUMBER}"

          for attempt in 1 2 3; do
            if git push origin HEAD; then
              exit 0
            fi
            echo "⚠️ Push rejected (attempt $attempt) — rebasing"
            if ! git pull --rebase --autostash origin main; then
              git rebase --abort 2>/dev/null || true
              [ "$attempt" = "3" ] && exit 1
            fi
            sleep $((attempt * 5))
          done
        env:
          GH_WORKFLOW: ${{ github.workflow }}
          GH_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "📋 Save execution log"
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: "fetch-news-log-${{ github.run_number }}"
          path: fetch_news.log
          retention-days: 7
          if-no-files-found: ignore
