# ============================================================
# .github/workflows/fetch-news.yml
# GitHub Actions — Coleta automática de notícias
#
# Executa às 8h, 12h e 18h (horário de Brasília = UTC-3)
# → No cron do GitHub Actions (UTC): 11h, 15h e 21h
#
# Não precisa configurar nenhum secret adicional —
# o GITHUB_TOKEN é fornecido automaticamente.
# ============================================================

name: "📰 Fetch News RSS"

on:
  # Agendamento automático (horário UTC — BRT = UTC-3)
  schedule:
    - cron: "0 11 * * *"   # 08:00 BRT
    - cron: "0 15 * * *"   # 12:00 BRT
    - cron: "0 21 * * *"   # 18:00 BRT

  # Permite executar manualmente pelo GitHub UI
  workflow_dispatch:
    inputs:
      debug:
        description: "Ativar log de debug?"
        required: false
        default: "false"
        type: boolean

jobs:
  fetch-and-publish:
    name: "Coletar notícias e publicar"
    runs-on: ubuntu-latest

    # Permissões necessárias para commit e push
    permissions:
      contents: write

    steps:

      # ── 1. Checkout do repositório ──────────────────────────────
      - name: "📥 Checkout do repositório"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0   # Histórico completo (necessário para o push)

      # ── 2. Configura Python ─────────────────────────────────────
      - name: "🐍 Configurar Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Instala dependências Python ──────────────────────────
      - name: "📦 Instalar dependências"
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests

      # ── 4. Executa o script de coleta ───────────────────────────
      - name: "📡 Executar fetch_news.py"
        run: |
          python fetch_news.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"

      # ── 5. Verifica se há novos posts ───────────────────────────
      - name: "🔍 Verificar novos posts"
        id: check_changes
        run: |
          git status --porcelain _posts/
          CHANGED=$(git status --porcelain _posts/ | wc -l | tr -d ' ')
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "Posts novos encontrados: $CHANGED"

      # ── 6. Commit e push (só se houver novidades) ───────────────
      - name: "💾 Commit e push dos novos posts"
        if: steps.check_changes.outputs.changed != '0'
        run: |
          # Configura identidade do bot
          git config user.name  "TechBR News Bot"
          git config user.email "bot@non-s.github.io"

          # Adiciona apenas arquivos de posts e log
          git add _posts/
          git add fetch_news.log || true

          # Conta posts adicionados
          ADDED=$(git diff --cached --name-only | grep "_posts/" | wc -l | tr -d ' ')

          # Commit com mensagem descritiva
          TIMESTAMP=$(TZ="America/Sao_Paulo" date +"%d/%m/%Y %H:%M")
          git commit -m "🤖 Auto: +${ADDED} post(s) — ${TIMESTAMP} BRT

          Coletado automaticamente via fetch_news.py
          Feeds: G1 Tecnologia, TecMundo, TechTudo, Olhar Digital
          Workflow: ${{ github.workflow }} #${{ github.run_number }}"

          # Push para a branch principal
          git push origin HEAD

          echo "✅ $ADDED post(s) publicado(s) com sucesso!"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 7. Nenhuma novidade (informativo) ──────────────────────
      - name: "ℹ️ Nenhuma novidade"
        if: steps.check_changes.outputs.changed == '0'
        run: |
          echo "✨ Nenhum post novo nesta execução."

      # ── 8. Upload do log como artefato ─────────────────────────
      - name: "📋 Salvar log de execução"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "fetch-news-log-${{ github.run_number }}"
          path: fetch_news.log
          retention-days: 7
          if-no-files-found: ignore
