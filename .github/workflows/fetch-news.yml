# ============================================================
# .github/workflows/fetch-news.yml
# GitHub Actions — Auto news fetcher
#
# Runs 5x per day (6h, 10h, 14h, 18h, 22h UTC). Only commits if there are new posts.
# Duplicate detection is handled by fetch_news.py itself
# (checks existing filenames before creating new ones).
# ============================================================

name: "📰 Fetch News RSS"

on:
  schedule:
    - cron: "0 6,10,14,18,22 * * *"    # 5x per day — stays within GitHub free tier (2000 min/month)

  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug log?"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch-and-publish:
    name: "Fetch & publish news"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:

      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: "🐍 Set up Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "✅ Validate Python syntax"
        run: |
          python -m py_compile fetch_news.py
          python -m py_compile utils/text.py utils/dedup.py utils/ai_helper.py utils/retry.py
          python -m py_compile submit_urls.py generate_search_index.py post_bluesky.py post_audit_bluesky.py
          echo "✅ Syntax OK"

      - name: "📡 Run fetch_news.py"
        run: python fetch_news.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: "🔍 Check for new posts"
        id: check_changes
        run: |
          CHANGED=$(git status --porcelain _posts/ | wc -l | tr -d ' ')
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "New posts found: $CHANGED"
          if [ "$CHANGED" -gt "0" ]; then
            echo "New posts:"
            git status --porcelain _posts/ | head -20
          fi

      - name: "💾 Commit & push new posts"
        if: steps.check_changes.outputs.changed != '0'
        run: |
          git config user.name  "GlobalBR News Bot"
          git config user.email "bot@globalbrnews.com"

          git add _posts/
          git add _tags/ || true
          git add assets/images/posts/ || true
          git add fetch_news.log || true
          git add search-index.json || true

          ADDED=$(git diff --cached --name-only | grep "_posts/" | wc -l | tr -d ' ')
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          CATEGORIES=$(git diff --cached --name-only | grep "_posts/" | head -5 | xargs -I{} grep -m1 "^categories:" {} 2>/dev/null | sed 's/categories: \[//;s/\].*//' | tr -d ' ' | cut -d',' -f1 | sort -u | head -3 | tr '\n' ',' | sed 's/,$//')

          if [ -n "$CATEGORIES" ]; then
            MSG="🤖 +${ADDED} post(s) [${CATEGORIES}] — ${TIMESTAMP}"
          else
            MSG="🤖 +${ADDED} post(s) — ${TIMESTAMP}"
          fi

          git commit -m "$MSG

          Auto-fetched via fetch_news.py
          Workflow: ${{ github.workflow }} #${{ github.run_number }}"

          git push origin HEAD
          echo "✅ $ADDED post(s) published!"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "🔎 Google Search Console — indexar URLs novas"
        if: steps.check_changes.outputs.changed != '0'
        continue-on-error: true
        run: python google_index.py
        env:
          GOOGLE_INDEXING_CREDENTIALS: ${{ secrets.GOOGLE_INDEXING_CREDENTIALS }}

      - name: Generate tag pages
        if: steps.check_changes.outputs.changed != '0'
        run: python generate_tag_pages.py

      - name: Generate search index
        if: steps.check_changes.outputs.changed != '0'
        run: python generate_search_index.py

      - name: "🦋 Bluesky — compartilhar posts novos"
        if: steps.check_changes.outputs.changed != '0'
        continue-on-error: true
        run: python post_bluesky.py
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}

      - name: "🔵 Bing & IndexNow — submeter URLs novas"
        if: steps.check_changes.outputs.changed != '0'
        continue-on-error: true
        run: python submit_urls.py
        env:
          BING_API_KEY:  ${{ secrets.BING_API_KEY }}
          INDEXNOW_KEY:  ${{ secrets.INDEXNOW_KEY }}
          SITE_URL:      "https://non-s.github.io"

      - name: "💚 Health check — post stats to Bluesky (weekly)"
        if: steps.check_changes.outputs.changed != '0'
        continue-on-error: true
        run: |
          # Only post health stats on Mondays
          DOW=$(date -u +%u)
          if [ "$DOW" = "1" ]; then
            python post_audit_bluesky.py
          else
            echo "ℹ️ Not Monday — skipping weekly health post"
          fi
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}

      - name: "ℹ️ No new posts"
        if: steps.check_changes.outputs.changed == '0'
        run: echo "✨ No new posts this run — skipping commit."

      - name: "📋 Save execution log"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "fetch-news-log-${{ github.run_number }}"
          path: fetch_news.log
          retention-days: 7
          if-no-files-found: ignore

      - name: "🚨 Notify failure on Bluesky"
        if: failure()
        env:
          BLUESKY_HANDLE:       ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: |
          if [ -z "$BLUESKY_HANDLE" ] || [ -z "$BLUESKY_APP_PASSWORD" ]; then exit 0; fi
          TOKEN=$(curl -s -X POST "https://bsky.social/xrpc/com.atproto.server.createSession" \
            -H "Content-Type: application/json" \
            -d "{\"identifier\":\"$BLUESKY_HANDLE\",\"password\":\"$BLUESKY_APP_PASSWORD\"}" \
            | python3 -c "import sys,json;print(json.load(sys.stdin).get('accessJwt',''))" 2>/dev/null || echo "")
          if [ -z "$TOKEN" ]; then exit 0; fi
          DID=$(curl -s "https://bsky.social/xrpc/com.atproto.identity.resolveHandle?handle=$BLUESKY_HANDLE" \
            | python3 -c "import sys,json;print(json.load(sys.stdin).get('did',''))" 2>/dev/null || echo "")
          curl -s -X POST "https://bsky.social/xrpc/com.atproto.repo.createRecord" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"$DID\",\"collection\":\"app.bsky.feed.post\",\"record\":{\"text\":\"⚠️ GlobalBR News fetch-news workflow #${{ github.run_number }} failed. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"createdAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"\$type\":\"app.bsky.feed.post\"}}" || true
