# ============================================================
# .github/workflows/fetch-news.yml
# GitHub Actions — Auto news fetcher
#
# Runs every hour. Only commits if there are new posts.
# Duplicate detection is handled by fetch_news.py itself
# (checks existing filenames before creating new ones).
# ============================================================

name: "📰 Fetch News RSS"

on:
  schedule:
    - cron: "*/5 * * * *"    # Every 5 minutes (GitHub Actions minimum — real-time)

  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug log?"
        required: false
        default: "false"
        type: boolean

jobs:
  fetch-and-publish:
    name: "Fetch & publish news"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: "🐍 Set up Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests google-auth Pillow

      - name: "📡 Run fetch_news.py"
        run: python fetch_news.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: "🔍 Check for new posts"
        id: check_changes
        run: |
          CHANGED=$(git status --porcelain _posts/ | wc -l | tr -d ' ')
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "New posts found: $CHANGED"
          if [ "$CHANGED" -gt "0" ]; then
            echo "New posts:"
            git status --porcelain _posts/ | head -20
          fi

      - name: "💾 Commit & push new posts"
        if: steps.check_changes.outputs.changed != '0'
        run: |
          git config user.name  "GlobalBR News Bot"
          git config user.email "bot@globalbrnews.com"

          git add _posts/
          git add assets/images/posts/ || true
          git add fetch_news.log || true

          ADDED=$(git diff --cached --name-only | grep "_posts/" | wc -l | tr -d ' ')
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")

          git commit -m "🤖 +${ADDED} post(s) — ${TIMESTAMP}

          Auto-fetched via fetch_news.py
          Workflow: ${{ github.workflow }} #${{ github.run_number }}"

          git push origin HEAD
          echo "✅ $ADDED post(s) published!"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "🔔 Ping Google & Bing to re-crawl sitemap"
        if: steps.check_changes.outputs.changed != '0'
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://non-s.github.io/sitemap.xml" || true
          curl -s "https://www.bing.com/ping?sitemap=https://non-s.github.io/sitemap.xml" || true
          echo "✅ Search engines notified"

      - name: "🔎 Google Search Console — indexar URLs novas"
        if: steps.check_changes.outputs.changed != '0'
        continue-on-error: true
        run: python google_index.py
        env:
          GOOGLE_INDEXING_CREDENTIALS: ${{ secrets.GOOGLE_INDEXING_CREDENTIALS }}

      - name: "🦋 Bluesky — compartilhar posts novos"
        if: steps.check_changes.outputs.changed != '0'
        continue-on-error: true
        run: python post_bluesky.py
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}

      - name: "📱 Telegram — compartilhar posts novos"
        if: steps.check_changes.outputs.changed != '0'
        continue-on-error: true
        run: python post_telegram.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}

      - name: "🎮 Discord — compartilhar posts novos"
        if: steps.check_changes.outputs.changed != '0'
        continue-on-error: true
        run: python post_discord.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: "📌 Pinterest — compartilhar posts novos"
        if: steps.check_changes.outputs.changed != '0'
        continue-on-error: true
        run: python post_pinterest.py
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}

      - name: "🔵 Bing — submeter URLs novas para indexação"
        if: steps.check_changes.outputs.changed != '0'
        continue-on-error: true
        run: |
          # Submete as últimas URLs ao Bing Webmaster Indexing API
          URLS=$(git diff HEAD~1 --name-only 2>/dev/null | grep "^_posts/" | head -10 | while read f; do
            stem=$(basename "$f" .md)
            IFS='-' read -r year month day slug <<< "$(echo "$stem" | sed 's/\(.*\)-\(.*\)-\(.*\)-\(.*\)/\1 \2 \3 \4/')"
            grep -m1 "^categories:" "$f" 2>/dev/null | sed 's/categories: \[//;s/\]//' | tr -d ' ' | cut -d',' -f1 | \
              xargs -I{} echo "https://non-s.github.io/{}/$(echo $stem | cut -d'-' -f1-3 | tr '-' '/')/$( echo $stem | cut -d'-' -f4-)/"
          done | jq -R . | jq -cs .)
          if [ -n "$URLS" ] && [ "$URLS" != "[]" ] && [ -n "${{ secrets.BING_API_KEY }}" ]; then
            curl -s -X POST "https://ssl.bing.com/webmaster/api.svc/json/SubmitUrlbatch" \
              -H "Content-Type: application/json; charset=utf-8" \
              -H "Ocp-Apim-Subscription-Key: ${{ secrets.BING_API_KEY }}" \
              -d "{\"siteUrl\":\"https://non-s.github.io\",\"urlList\":$URLS}" || true
            echo "✅ Bing URLs submetidas"
          else
            echo "ℹ️ BING_API_KEY não configurada ou sem URLs — pulando"
          fi

      - name: "⚡ IndexNow — notify Bing & Yandex instantly"
        if: steps.check_changes.outputs.changed != '0'
        continue-on-error: true
        run: |
          if [ -z "${{ secrets.INDEXNOW_KEY }}" ]; then
            echo "ℹ️ INDEXNOW_KEY não configurada — pulando"
            exit 0
          fi
          URLS=$(git diff HEAD~1 --name-only 2>/dev/null | grep "^_posts/" | head -10 | while read f; do
            stem=$(basename "$f" .md)
            # extract category from frontmatter
            cat=$(grep -m1 "^categories:" "$f" 2>/dev/null | sed 's/categories: \[//;s/\].*//' | tr -d ' ' | cut -d',' -f1)
            # build URL: /category/YYYY/MM/DD/slug/
            year=$(echo $stem | cut -c1-4)
            month=$(echo $stem | cut -c6-7)
            day=$(echo $stem | cut -c9-10)
            slug=$(echo $stem | cut -c12-)
            echo "https://non-s.github.io/${cat}/${year}/${month}/${day}/${slug}/"
          done | jq -R . | jq -cs .)
          if [ -n "$URLS" ] && [ "$URLS" != "[]" ]; then
            # Submit to Bing IndexNow
            curl -s -X POST "https://api.indexnow.org/indexnow" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "{\"host\":\"non-s.github.io\",\"key\":\"${{ secrets.INDEXNOW_KEY }}\",\"keyLocation\":\"https://non-s.github.io/${{ secrets.INDEXNOW_KEY }}.txt\",\"urlList\":$URLS}" || true
            # Submit to Yandex IndexNow
            curl -s -X POST "https://yandex.com/indexnow" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "{\"host\":\"non-s.github.io\",\"key\":\"${{ secrets.INDEXNOW_KEY }}\",\"keyLocation\":\"https://non-s.github.io/${{ secrets.INDEXNOW_KEY }}.txt\",\"urlList\":$URLS}" || true
            echo "✅ IndexNow notificado: $URLS"
          fi

      - name: "ℹ️ No new posts"
        if: steps.check_changes.outputs.changed == '0'
        run: echo "✨ No new posts this run — skipping commit."

      - name: "📋 Save execution log"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "fetch-news-log-${{ github.run_number }}"
          path: fetch_news.log
          retention-days: 7
          if-no-files-found: ignore
