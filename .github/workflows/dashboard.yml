name: "Build + deploy dashboard"

# Builds the static channel dashboard and publishes legal pages.
on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
      - name: "Build dashboard HTML"
        run: python scripts/build_dashboard.py
      - name: "Copy static pages"
        run: |
          mkdir -p _site
          cp -f terms.html _site/ 2>/dev/null || true
          cp -f privacy.html _site/ 2>/dev/null || true
          ls -la _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
