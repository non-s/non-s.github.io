name: "Build + deploy dashboard"

# Builds the static channel dashboard and publishes legal pages.
on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
      - name: "Install dashboard dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: "Refresh YouTube analytics snapshot"
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          if [ -z "$YOUTUBE_TOKEN" ]; then
            echo "YOUTUBE_TOKEN is not configured; building dashboard from committed analytics."
            exit 0
          fi
          umask 077
          printf '%s' "$YOUTUBE_TOKEN" > youtube_token.json
          python scripts/analyze_channel.py || true
          rm -f youtube_token.json
      - name: "Build dashboard HTML"
        run: python scripts/build_dashboard.py
      - name: "Copy static pages"
        run: |
          mkdir -p _site
          cp -f terms.html _site/ 2>/dev/null || true
          cp -f privacy.html _site/ 2>/dev/null || true
          ls -la _site/
      - uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5.0.0
