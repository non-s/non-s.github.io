name: "Build + deploy dashboard"

# Builds the static channel dashboard and publishes legal pages.
on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
      - name: "Install dashboard dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: "Refresh YouTube analytics snapshot"
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          if [ -z "$YOUTUBE_TOKEN" ]; then
            echo "YOUTUBE_TOKEN is not configured; building dashboard from committed analytics."
            exit 0
          fi
          umask 077
          printf '%s' "$YOUTUBE_TOKEN" > youtube_token.json
          python scripts/analyze_channel.py || true
          python scripts/analyze_comments.py || true
          python scripts/trend_radar.py || true
          python scripts/audit_automation.py || true
          python scripts/ops_guardian.py || true
          python scripts/remake_engine.py || true
          python scripts/remake_factory.py || true
          python scripts/backfill_legacy_analytics.py || true
          python scripts/visual_qa_report.py || true
          python scripts/narrator_report.py || true
          python scripts/agency_plan.py || true
          python scripts/retention_rewrite_queue.py || true
          python scripts/retention_rewriter.py || true
          python scripts/retention_rewrite_queue.py || true
          python scripts/category_recovery.py || true
          python scripts/agency_gate_report.py || true
          python scripts/daily_brief.py || true
          python scripts/weekly_report.py || true
          rm -f youtube_token.json
      - name: "Audit local automation health"
        run: |
          python scripts/audit_automation.py
          python scripts/trend_radar.py
          python scripts/ops_guardian.py
          python scripts/remake_engine.py
          python scripts/remake_factory.py
          python scripts/backfill_legacy_analytics.py
          python scripts/visual_qa_report.py
          python scripts/narrator_report.py
          python scripts/agency_plan.py
          python scripts/retention_rewrite_queue.py
          python scripts/retention_rewriter.py
          python scripts/retention_rewrite_queue.py
          python scripts/category_recovery.py
          python scripts/agency_gate_report.py
          python scripts/daily_brief.py
          python scripts/weekly_report.py
      - name: "Build dashboard HTML"
        run: python scripts/build_dashboard.py
      - name: "Persist refreshed analytics"
        run: |
          git config user.name "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          for path in _data/analytics/latest.json _data/analytics/experiments.json _data/analytics/comments.json _data/analytics/legacy_backfill.json _data/automation_health.json _data/ops_guardian.json _data/remake_backlog.json _data/remake_factory.json _data/trend_radar.json _data/visual_quality_report.json _data/narrator_report.json _data/agency_plan.json _data/retention_rewriter.json _data/retention_rewrite_queue.json _data/category_recovery.json _data/agency_gate.json _data/daily_brief.json _data/stories_queue.json; do
            [ -e "$path" ] && git add "$path"
          done
          find _data/reports -maxdepth 1 -type f -name 'weekly-*.md' -print0 2>/dev/null | xargs -0 -r git add --
          if git diff --cached --quiet; then
            echo "No analytics changes to persist."
            exit 0
          fi
          git commit -m "analytics refresh: $(date -u +'%Y-%m-%d')"
          for attempt in 1 2 3; do
            if git push origin HEAD; then
              exit 0
            fi
            git pull --rebase --autostash origin main || git rebase --abort
            sleep $((attempt * 5))
          done
          exit 1
      - name: "Copy static pages"
        run: |
          mkdir -p _site
          cp -f terms.html _site/ 2>/dev/null || true
          cp -f privacy.html _site/ 2>/dev/null || true
          ls -la _site/
      - uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5.0.0
