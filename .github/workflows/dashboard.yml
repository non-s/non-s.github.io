name: "Build + deploy dashboard"

# Builds the static channel dashboard and publishes legal pages.
on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"
          cache: "pip"
      - name: "Install dashboard dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: "Refresh YouTube analytics snapshot"
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          if [ -z "$YOUTUBE_TOKEN" ]; then
            echo "YOUTUBE_TOKEN is not configured; building dashboard from committed analytics."
            exit 0
          fi
          printf '%s' "$YOUTUBE_TOKEN" | python -m json.tool > /dev/null
      - name: "Refresh manual analytics imports"
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          trap 'rm -f youtube_token.json' EXIT
          if [ -n "$YOUTUBE_TOKEN" ] && [ ! -f youtube_token.json ]; then
            umask 077
            printf '%s' "$YOUTUBE_TOKEN" > youtube_token.json
            chmod 600 youtube_token.json
          fi
          python scripts/import_studio_reach_export.py
      - name: "Build dashboard HTML"
        run: python scripts/build_dashboard.py
      - name: "Persist refreshed analytics"
        run: |
          git config user.name "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          for path in index.html _data/analytics/latest.json _data/analytics/dashboard_history.jsonl _data/analytics/studio_reach_daily.jsonl _data/analytics/studio_reach_latest.json _data/analytics/reporting_bootstrap.json _data/analytics/reporting_pull.json _data/analytics/reporting_video_metrics.jsonl _data/analytics/api_quota_ledger.jsonl _data/analytics/api_quota_latest.json; do
            [ -e "$path" ] && git add "$path"
          done
          if git diff --cached --quiet; then
            echo "No analytics changes to persist."
            exit 0
          fi
          git commit -m "analytics refresh: $(date -u +'%Y-%m-%d')"
          for attempt in 1 2 3; do
            if git push origin HEAD; then
              exit 0
            fi
            if ! git pull --rebase --autostash origin main; then
              git rebase --abort || true
              echo "::warning::Analytics persistence skipped because live state changed during dashboard build."
              exit 0
            fi
            sleep $((attempt * 5))
          done
          echo "::warning::Analytics persistence skipped after repeated non-fast-forward pushes."
          exit 0
      - name: "Copy static pages"
        run: |
          mkdir -p _site
          cp -f terms.html _site/ 2>/dev/null || true
          cp -f privacy.html _site/ 2>/dev/null || true
          ls -la _site/
      - uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5.0.0
