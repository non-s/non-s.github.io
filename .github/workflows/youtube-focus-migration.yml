name: "One-time YouTube focus migration"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/youtube-focus-migration.yml"

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Apply audited YouTube patch
        run: |
          cat .youtube-focus/chunk*.txt | base64 -d | gzip -d > /tmp/youtube-focus.patch
          git apply --exclude=.github/workflows/fetch-content.yml /tmp/youtube-focus.patch
          rm -rf .youtube-focus
      - name: Commit clean repository state
        run: |
          git config user.name "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          git add -A
          git commit -m "Complete YouTube-only repository migration"
          git push origin HEAD:main
