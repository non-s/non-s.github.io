name: "🔗 Weekly Link Checker"
on:
  schedule:
    - cron: "0 6 * * 3"  # Wednesday 6h UTC
  workflow_dispatch:

concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: "🔗 Check source URLs"
        run: python check_links.py
        timeout-minutes: 15

      - name: "💾 Commit link report"
        run: |
          git config user.name "GlobalBR News Bot"
          git config user.email "bot@globalbrnews.com"
          # _data/link_report.json is .gitignore'd as runtime artefact.
          git add -f _data/link_report.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "ℹ️ No link-report changes — skipping commit."
            exit 0
          fi
          git commit -m "🔗 Weekly link check — $(date -u +'%Y-%m-%d')"
          # Don't swallow push failures — `|| true` was hiding pushes
          # rejected by branch protection / main-write contention, and
          # the report silently never landed for weeks.
          for attempt in 1 2 3; do
            if git push origin HEAD; then exit 0; fi
            echo "⚠️ push failed (attempt $attempt) — pulling rebase"
            git pull --rebase --autostash origin main || git rebase --abort 2>/dev/null
            sleep $((attempt * 5))
          done
          echo "❌ push failed after 3 attempts — next weekly run will retry"
          exit 1
