name: "🔗 Weekly Link Checker"
on:
  schedule:
    - cron: "0 6 * * 3"  # Wednesday 6h UTC
  workflow_dispatch:

concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: "🔗 Check source URLs"
        run: python check_links.py
        timeout-minutes: 15

      - name: "💾 Commit link report"
        run: |
          git config user.name "GlobalBR News Bot"
          git config user.email "bot@globalbrnews.com"
          # _data/link_report.json is .gitignore'd as runtime artefact.
          git add -f _data/link_report.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "🔗 Weekly link check — $(date -u +'%Y-%m-%d')"
          git push origin HEAD || true
