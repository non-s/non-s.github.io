name: "🖼️ Image Optimization"

on:
  schedule:
    - cron: "0 9 * * 2"  # Tuesday 9h UTC
  workflow_dispatch:

concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install Pillow

      - name: "🖼️ Convert images to WebP"
        run: python optimize_images.py
        env:
          IMAGE_WEBP_QUALITY: "82"

      - name: "💾 Commit optimized images"
        run: |
          git config user.name "GlobalBR News Bot"
          git config user.email "bot@globalbrnews.com"
          git add assets/images/posts/*.webp 2>/dev/null || true
          CHANGED=$(git diff --cached --name-only | wc -l | tr -d ' ')
          if [ "$CHANGED" -gt "0" ]; then
            git commit -m "🖼️ Optimize ${CHANGED} image(s) to WebP — $(date -u +'%Y-%m-%d')"
            git push origin HEAD
            echo "✅ ${CHANGED} image(s) optimized"
          else
            echo "ℹ️ No new images to optimize"
          fi
