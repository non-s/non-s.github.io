name: "YouTube hourly heartbeat"

# Lightweight backup for GitHub schedule drift. The main publisher already
# runs at :02/:22/:42 and youtube-watchdog.yml checks every 10 minutes; this
# job is a short sanity dispatcher, not a long-lived sleeping runner.
on:
  schedule:
    - cron: "13 * * * *"
  workflow_run:
    workflows: ["Refresh Pexels queue"]
    types: [completed]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this heartbeat run was started"
        required: false
        default: "manual"

concurrency:
  group: youtube-hourly-heartbeat
  cancel-in-progress: true

jobs:
  dispatch-hourly:
    name: "Dispatch hourly YouTube publisher"
    if: ${{ vars.YOUTUBE_PUBLISHING_ENABLED == '1' && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      actions: write
      contents: read
    env:
      TARGET_WORKFLOW: "youtube-bot.yml"
      HEARTBEAT_RECENT_RUN_TOLERANCE_MINUTES: ${{ vars.PUBLISH_HEARTBEAT_RECENT_RUN_TOLERANCE_MINUTES || '20' }}
      PUBLISH_SLOT_WINDOW_MINUTES: "60"
    steps:
      - name: "Checkout dispatch helper"
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: "Dispatch publisher if the current slot has no run"
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          RECOVERY_REASON_PREFIX: "heartbeat recovery for slot"
        run: python scripts/youtube_slot_dispatch.py heartbeat
