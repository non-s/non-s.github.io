name: "YouTube hourly heartbeat"

# Lightweight backup for GitHub schedule drift. The main publisher already
# runs every 10 minutes and youtube-watchdog.yml checks every 10 minutes
# too; this job is a coarser once-an-hour sanity dispatcher (did ANY
# publisher run happen this hour), not a long-lived sleeping runner.
on:
  schedule:
    - cron: "13 * * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this heartbeat run was started"
        required: false
        default: "manual"

permissions:
  contents: read

concurrency:
  group: youtube-hourly-heartbeat
  cancel-in-progress: true

jobs:
  dispatch-hourly:
    name: "Dispatch hourly YouTube publisher"
    if: ${{ vars.YOUTUBE_PUBLISHING_ENABLED == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      actions: write
      contents: read
    env:
      TARGET_WORKFLOW: "youtube-bot.yml"
      HEARTBEAT_RECENT_RUN_TOLERANCE_MINUTES: ${{ vars.PUBLISH_HEARTBEAT_RECENT_RUN_TOLERANCE_MINUTES || '20' }}
      PUBLISH_SLOT_WINDOW_MINUTES: "60"
    steps:
      - name: "Checkout dispatch helper"
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1

      - name: "Dispatch publisher if the current slot has no run"
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          RECOVERY_REASON_PREFIX: "heartbeat recovery for slot"
        run: python scripts/youtube_slot_dispatch.py heartbeat
