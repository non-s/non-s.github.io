name: "YouTube hourly heartbeat"

# Lightweight backup for GitHub schedule drift. The main publisher already
# runs at :02/:22/:42 and youtube-watchdog.yml checks every 10 minutes; this
# job is a short sanity dispatcher, not a long-lived sleeping runner.
on:
  schedule:
    - cron: "13 * * * *"
  workflow_run:
    workflows: ["Refresh Pexels queue"]
    types: [completed]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this heartbeat run was started"
        required: false
        default: "manual"

concurrency:
  group: youtube-hourly-heartbeat
  cancel-in-progress: true

jobs:
  dispatch-hourly:
    name: "Dispatch hourly YouTube publisher"
    if: ${{ vars.YOUTUBE_PUBLISHING_ENABLED == '1' && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      actions: write
      contents: read
    env:
      TARGET_WORKFLOW: "youtube-bot.yml"
      HEARTBEAT_RECENT_RUN_TOLERANCE_MINUTES: ${{ vars.PUBLISH_HEARTBEAT_RECENT_RUN_TOLERANCE_MINUTES || '20' }}
    steps:
      - name: "Dispatch publisher if the current slot has no run"
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import sys
          import urllib.error
          import urllib.request
          from datetime import datetime, timedelta, timezone

          token = os.environ["GH_TOKEN"]
          repo = os.environ["GH_REPOSITORY"]
          workflow = os.environ.get("TARGET_WORKFLOW", "youtube-bot.yml")
          tolerance = timedelta(
              minutes=max(0, int(os.environ.get("HEARTBEAT_RECENT_RUN_TOLERANCE_MINUTES", "20")))
          )
          now = datetime.now(timezone.utc)
          slot = now.replace(minute=0, second=0, microsecond=0)
          threshold = slot - tolerance

          def request_json(method: str, url: str, body: dict | None = None):
              data = None if body is None else json.dumps(body).encode("utf-8")
              req = urllib.request.Request(
                  url,
                  data=data,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "wildbrief-youtube-hourly-heartbeat",
                  },
              )
              with urllib.request.urlopen(req, timeout=30) as response:
                  raw = response.read()
                  return None if not raw else json.loads(raw.decode("utf-8"))

          runs_url = f"https://api.github.com/repos/{repo}/actions/workflows/{workflow}/runs?per_page=30"
          runs = request_json("GET", runs_url).get("workflow_runs", [])
          for run in runs:
              created_at = datetime.fromisoformat(run["created_at"].replace("Z", "+00:00"))
              if created_at < threshold:
                  continue
              status = run.get("status")
              conclusion = run.get("conclusion")
              url = run.get("html_url")
              print(f"Recent publisher run: {created_at.isoformat()} status={status} conclusion={conclusion} {url}")
              if status in {"queued", "in_progress", "waiting", "requested", "pending"}:
                  print("Publisher is already active or queued; no heartbeat dispatch needed.")
                  sys.exit(0)
              if status == "completed" and conclusion == "success":
                  print("Publisher already completed successfully near this slot.")
                  sys.exit(0)

          dispatch_url = f"https://api.github.com/repos/{repo}/actions/workflows/{workflow}/dispatches"
          reason = f"heartbeat recovery for slot {slot.isoformat()}"
          try:
              request_json("POST", dispatch_url, {"ref": "main", "inputs": {"reason": reason}})
          except urllib.error.HTTPError as exc:
              detail = exc.read().decode("utf-8", errors="replace")
              print(f"Heartbeat dispatch failed: HTTP {exc.code} {detail}", file=sys.stderr)
              raise

          print(f"Dispatched {workflow}: {reason}")
          PY
