name: "YouTube hourly heartbeat"

# Automatic `schedule:` trigger disabled (chat, 2026-07-21): this checked
# "did ANY publisher run happen this literal clock hour" via
# scripts/youtube_slot_dispatch.py's `current_hour_slot()`, which assumes
# an hourly-or-denser cadence. Since the Shorts cadence dropped to every
# 2 hours (utils/audience_expansion.py's GLOBAL_PUBLISH_WINDOWS -- see
# its docstring for why), this would have found "no run" on every
# intentionally-skipped odd hour and dispatched an extra Short there,
# quietly doubling the cadence right back up. youtube-watchdog.yml
# already covers recovery correctly (it audits against the real
# PUBLISH_SLOTS_UTC grid, not a fixed hourly assumption); kept as a
# manual-only workflow_dispatch tool instead of deleting it outright.
on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this heartbeat run was started"
        required: false
        default: "manual"

permissions:
  contents: read

concurrency:
  group: youtube-hourly-heartbeat
  cancel-in-progress: true

jobs:
  dispatch-hourly:
    name: "Dispatch hourly YouTube publisher"
    if: ${{ vars.YOUTUBE_PUBLISHING_ENABLED == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      actions: write
      contents: read
    env:
      TARGET_WORKFLOW: "youtube-bot.yml"
      HEARTBEAT_RECENT_RUN_TOLERANCE_MINUTES: ${{ vars.PUBLISH_HEARTBEAT_RECENT_RUN_TOLERANCE_MINUTES || '20' }}
      PUBLISH_SLOT_WINDOW_MINUTES: "60"
    steps:
      - name: "Checkout dispatch helper"
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1

      - name: "Dispatch publisher if the current slot has no run"
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          RECOVERY_REASON_PREFIX: "heartbeat recovery for slot"
        run: python scripts/youtube_slot_dispatch.py heartbeat
