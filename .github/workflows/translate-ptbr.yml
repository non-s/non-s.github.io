name: "Translate Posts to PT-BR"
on:
  schedule:
    - cron: "0 20 * * *"  # 20h UTC daily catch-up — fetch-news.yml runs translate
                          # inline; this is the fallback for posts that failed
                          # mid-run (translate_posts.py is idempotent).
  workflow_dispatch:

concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: "Traduzir posts para PT-BR"
        run: python translate_posts.py
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

      - name: "Commit translations"
        run: |
          git config user.name "GlobalBR News Bot"
          git config user.email "bot@globalbrnews.com"
          git add _posts/pt/ || true
          CHANGED=$(git diff --cached --name-only | wc -l | tr -d ' ')
          if [ "$CHANGED" -gt "0" ]; then
            git commit -m "PT-BR +${CHANGED} post(s) traduzido(s) — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin HEAD
            echo "${CHANGED} post(s) traduzido(s)"
          else
            echo "Sem posts novos para traduzir"
          fi
