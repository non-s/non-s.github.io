name: "Pata Jazz - Videos Horizontais"

on:
  schedule:
    # 1 video horizontal por dia - 10:00 BRT (13:00 UTC)
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo do disparo manual"
        required: false
        default: "manual"
      duration:
        description: "Duracao em segundos"
        required: false
        default: "300"

permissions:
  contents: read

concurrency:
  group: pata-jazz-horizontal
  cancel-in-progress: false

env:
  GENERATE_DURATION: ${{ github.event.inputs.duration || '300' }}

jobs:
  generate-and-upload:
    name: "Gerar e publicar video horizontal Pata Jazz"
    if: ${{ vars.PATA_JAZZ_ENABLED == '1' && vars.PATA_JAZZ_HORIZONTAL_ENABLED == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      YOUTUBE_PRIVACY: ${{ vars.YOUTUBE_PRIVACY || 'public' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      JAMENDO_CLIENT_ID: ${{ secrets.JAMENDO_CLIENT_ID }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: "Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: "Instalar FFmpeg"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
      - name: "Instalar dependencias"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: "Restaurar token YouTube"
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          umask 077
          if [ -n "$YOUTUBE_TOKEN" ]; then
            printf '%s' "$YOUTUBE_TOKEN" > youtube_token.json
            chmod 600 youtube_token.json
          fi
      - name: "Cache b-roll"
        uses: actions/cache@v4
        with:
          path: _assets/video/animal_broll
          key: animal-broll-${{ github.run_id }}
          restore-keys: animal-broll-
      - name: "Cache jazz"
        uses: actions/cache@v4
        with:
          path: _assets/audio/animal_jazz
          key: animal-jazz-${{ github.run_id }}
          restore-keys: animal-jazz-
      - name: "Sincronizar b-roll"
        run: python scripts/sync_animal_broll.py || echo "::warning::B-roll sync falhou"
      - name: "Sincronizar jazz"
        run: python scripts/sync_jazz_music.py || echo "::warning::Jazz sync falhou"
      - name: "Gerar video horizontal"
        run: python generate_pata_jazz_horizontal.py --duration "$GENERATE_DURATION"
      - name: "Upload para YouTube"
        if: hashFiles('youtube_token.json') != ''
        run: python upload_youtube.py --mode upload --language=pt --prefix pata_jazz_horizontal_
      - name: "Apagar token"
        if: always()
        run: rm -f youtube_token.json
