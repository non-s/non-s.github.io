name: "TikTok Bot — Shorts only"

# Shorts-only pipeline.
#
# Posting cadence:
# TikTok's unaudited Content Posting API caps direct posts at 30/day per
# user (and 6/min). We stay well below the cap at 5/day, BUT we time
# the runs to TikTok's documented peak-engagement windows (not the
# uniform-spacing pattern that worked on YouTube).
#
# Why 01 / 14 / 17 / 22 / 23 UTC (5/day, TikTok-tuned):
#   01 UTC = 22h BRT (Brazil prime time)  +  20h EST (US prime time)
#   14 UTC = 11h BRT (BR mid-morning swipe break) + 09h EST (commute)
#   17 UTC = 14h BRT (BR lunch break)     +  12h EST (US lunch)
#   22 UTC = 19h BRT (Brazil prime time)  +  17h EST (US after-work)
#   23 UTC = 20h BRT (Brazil prime time)  +  18h EST (US prime time)
# This pattern double-stamps the Brazil 19-22h window (the channel's
# largest target market for animal content) without ever exceeding
# the 6-min TikTok rate limit between two runs.
on:
  schedule:
    - cron: "0 1,14,17,22,23 * * *"
  workflow_dispatch:

# Serialise with every other workflow that pushes to main.
concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  generate-and-upload:
    name: "Gerar e publicar Shorts no TikTok"
    runs-on: ubuntu-latest
    # Without a timeout, a stuck FFmpeg encode can chew through the
    # whole monthly GitHub Actions quota on a single hung job.
    # 30min is generous for 1 short (~5min end-to-end).
    timeout-minutes: 30

    # Least-privilege: we don't use OIDC, only commit + push.
    permissions:
      contents: write

    env:
      # 1 short per run × 5 runs/day = 5 shorts/day. TikTok caps direct
      # posts at 30/day/user; 5/day = 17% of the ceiling, plenty of
      # headroom for retries.
      MAX_SHORTS_PER_RUN: "1"

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: "Python 3.11"
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "Instalar FFmpeg, libass e fontes"
        run: |
          sudo apt-get update -qq
          # libass is required for the ASS subtitle burn-in step. It's
          # already a dep of the ffmpeg binary on ubuntu-latest, but
          # we install explicitly to fail loudly if Ubuntu ever splits
          # ffmpeg-extras out of the default package.
          sudo apt-get install -y \
            ffmpeg \
            libass9 \
            fonts-dejavu-core \
            fonts-liberation \
            fonts-noto-core \
            fonts-noto-mono \
            fonts-open-sans \
            fontconfig
          sudo fc-cache -f -v

      - name: "Instalar dependencias Python"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # Optional: faster-whisper for local caption fallback if Groq
          # Whisper isn't configured. Keeps captions working with zero
          # network deps. ~200 MB download, runs CPU-only.
          if [ "${INSTALL_FASTER_WHISPER:-1}" = "1" ]; then
            pip install --no-deps "faster-whisper>=1.0,<2.0" "ctranslate2>=4.0,<5.0" || true
          fi

      - name: "Restaurar token do TikTok"
        env:
          TIKTOK_TOKEN: ${{ secrets.TIKTOK_TOKEN }}
        run: |
          if [ -z "$TIKTOK_TOKEN" ]; then
            echo "❌ TIKTOK_TOKEN secret não está configurado."
            echo "   Rode auth_tiktok.py localmente e cole o conteúdo de"
            echo "   tiktok_token.json em Settings → Secrets → Actions →"
            echo "   TIKTOK_TOKEN"
            exit 1
          fi
          # Write the token under restrictive perms.
          umask 077
          printf '%s' "$TIKTOK_TOKEN" > tiktok_token.json
          chmod 600 tiktok_token.json
          # Sanity check: confirm it parses as JSON.
          if ! python -m json.tool < tiktok_token.json > /dev/null 2>&1; then
            echo "❌ TIKTOK_TOKEN secret não é JSON válido."
            rm -f tiktok_token.json
            exit 1
          fi
          echo "✅ tiktok_token.json restaurado"

      - name: "Restaurar marcadores de videos processados"
        run: |
          mkdir -p _videos
          # Os arquivos .done e .roundup ficam no git para rastrear o que já foi feito
          echo "📂 Marcadores existentes:"
          ls _videos/*.done 2>/dev/null | wc -l || echo "0 .done"
          ls _videos/*.roundup 2>/dev/null | wc -l || echo "0 .roundup"

      - name: "📱 Gerar Shorts (até 3 por run)"
        # This is the primary content step — surface failures so we
        # don't silently produce zero shorts for the day.
        run: python generate_shorts.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          MISTRAL_API_KEY:   ${{ secrets.MISTRAL_API_KEY }}
          # Same free fallback chain as fetch-news. We accept the short
          # secret names too (CEREBRAS / GEMINI / GROQ / PEXELS) so
          # legacy setups don't have to rename.
          CEREBRAS_API_KEY:  ${{ secrets.CEREBRAS_API_KEY || secrets.CEREBRAS }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY   || secrets.GEMINI   }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY     || secrets.GROQ     }}
          # B-roll: Pexels needs a free key (20k req/mo, no card).
          # Without it the pipeline falls back to NASA + Internet Archive
          # (both keyless) which still beats static frames.
          PEXELS_API_KEY:    ${{ secrets.PEXELS_API_KEY   || secrets.PEXELS   }}
          MAX_SHORTS_PER_RUN: ${{ env.MAX_SHORTS_PER_RUN }}

      - name: "📤 Upload Shorts para TikTok"
        run: python upload_tiktok.py
        env:
          PYTHONIOENCODING:      utf-8
          PYTHONUNBUFFERED:      "1"
          TIKTOK_CLIENT_KEY:     ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET:  ${{ secrets.TIKTOK_CLIENT_SECRET }}
          # Optional knobs (default direct-post / public). Override here
          # if the app is awaiting publish-scope approval — then the bot
          # drops drafts in the user's inbox instead.
          TIKTOK_PUBLISH_MODE:   ${{ vars.TIKTOK_PUBLISH_MODE || 'direct' }}
          TIKTOK_PRIVACY:        ${{ vars.TIKTOK_PRIVACY || 'PUBLIC_TO_EVERYONE' }}

      - name: "📊 Write run summary"
        if: always()
        run: |
          {
            echo "## TikTok Shorts run"
            echo ""
            # Count what we actually shipped this run.
            UPLOADED=$(ls _videos/*.done 2>/dev/null | wc -l)
            META_LEFT=$(ls _videos/*.json 2>/dev/null | wc -l)
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Done markers (lifetime) | ${UPLOADED} |"
            echo "| Pending metadata (this run) | ${META_LEFT} |"
            # TikTok posting count for the day.
            python -c "from utils.tiktok_quota import summary; s=summary(); print(f'| TikTok posts today | **{s[\"used\"]}/{s[\"budget\"]}** ({s[\"pct_used\"]}%) |')"
            # Most recent uploaded titles.
            echo ""
            echo "### Last 5 published"
            ls -t _videos/*.done 2>/dev/null | head -5 | while read f; do
              TITLE=$(python -c "import json; print(json.load(open('$f')).get('title','?'))" 2>/dev/null || echo "?")
              URL=$(python -c "import json; print(json.load(open('$f')).get('url',''))" 2>/dev/null || echo "")
              echo "- [${TITLE}](${URL})"
            done
            # Quota warning (only emits if >80 % used)
            WARN=$(python -c "from utils.tiktok_quota import warn_if_near_cap; print(warn_if_near_cap())")
            if [ -n "$WARN" ]; then
              echo ""
              echo "$WARN"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "💾 Salvar marcadores no git"
        run: |
          git config user.name  "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"

          # Done markers keep the pipeline idempotent across runs: a
          # fresh checkout otherwise re-publishes the same Shorts.
          git add _videos/*.done    2>/dev/null || true
          git add _videos/*.roundup 2>/dev/null || true
          git add _videos/*.json    2>/dev/null || true
          # The stories queue gets stories marked as consumed by
          # generate_shorts.py — commit that back too.
          git add _data/stories_queue.json 2>/dev/null || true
          # Quota ledger — tracks per-upload TikTok API spend so the
          # workflow summary can surface "we're at 85 % of cap".
          git add _data/tiktok_quota_log.jsonl 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "✅ Nenhum arquivo novo para salvar."
          else
            git commit -m "📱 Shorts — $(date -u +'%Y-%m-%d')"
            git push origin HEAD
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Note: we don't try to push tiktok_token.json back to the
      # TIKTOK_TOKEN secret here — the default GITHUB_TOKEN can't modify
      # repository secrets. TikTok's refresh_token rotates on every
      # refresh; the runtime saves the rolled token locally for the
      # duration of the run, but the secret keeps the original. After
      # ~365 days the original refresh token expires — when that
      # happens, re-run `auth_tiktok.py` and update the secret.

      - name: "Log de execucao"
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: "tiktok-log-${{ github.run_number }}"
          path: |
            generate_shorts.log
            upload_tiktok.log
          retention-days: 7
          if-no-files-found: ignore

      # Defence in depth: shred the OAuth token on EVERY exit path
      # (success, failure, cancellation). The runner is ephemeral, but
      # leaving credentials in artifacts/logs is a real risk if any
      # earlier step accidentally tar's the workspace.
      - name: "🧹 Apagar tiktok_token.json no final"
        if: always()
        run: |
          if [ -f tiktok_token.json ]; then
            shred -u tiktok_token.json 2>/dev/null || rm -f tiktok_token.json
            echo "🧹 tiktok_token.json shredded"
          fi
