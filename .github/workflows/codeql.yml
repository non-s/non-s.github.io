name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "41 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: "CodeQL Python"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@adfda868f108ac4222129de456ea554034a27db7
        with:
          languages: python
      - uses: github/codeql-action/analyze@adfda868f108ac4222129de456ea554034a27db7
        with:
          category: "/language:python"
