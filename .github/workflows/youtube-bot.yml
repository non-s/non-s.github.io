name: "YouTube Bot - Shorts only"

# Shorts-only pipeline for YouTube.
# Cadence: 3 Shorts/day, prioritising quality and channel variety.
on:
  schedule:
    - cron: "0 14,19,23 * * *"
  workflow_dispatch:

concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  generate-and-upload:
    name: "Gerar e publicar Shorts no YouTube"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      MAX_SHORTS_PER_RUN: "1"
      # Spoken narration + captions only by default. This avoids
      # third-party Content ID surprises while keeping the pipeline free.
      MUSIC_BED_ENABLED: "0"
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - name: "Python 3.11"
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"
      - name: "Instalar FFmpeg, libass e fontes"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg libass9 fonts-dejavu-core fonts-liberation fonts-noto-core fonts-noto-mono fonts-open-sans fontconfig
          sudo fc-cache -f -v
      - name: "Instalar dependencias Python"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          if [ "${INSTALL_FASTER_WHISPER:-1}" = "1" ]; then
            pip install --no-deps "faster-whisper>=1.0,<2.0" "ctranslate2>=4.0,<5.0" || true
          fi
      - name: "Restaurar token do YouTube"
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          if [ -z "$YOUTUBE_TOKEN" ]; then
            echo "YOUTUBE_TOKEN secret nao esta configurado."
            echo "Rode auth_youtube.py e cole o JSON em Settings -> Secrets -> Actions -> YOUTUBE_TOKEN"
            exit 1
          fi
          umask 077
          printf '%s' "$YOUTUBE_TOKEN" > youtube_token.json
          chmod 600 youtube_token.json
          python -m json.tool < youtube_token.json > /dev/null
      - name: "Gerar Shorts"
        run: python generate_shorts.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || secrets.CEREBRAS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.GEMINI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || secrets.GROQ }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY || secrets.PEXELS }}
          MAX_SHORTS_PER_RUN: ${{ env.MAX_SHORTS_PER_RUN }}
      - name: "Upload Shorts para YouTube"
        run: python upload_youtube.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          YOUTUBE_PRIVACY: ${{ vars.YOUTUBE_PRIVACY || 'public' }}
      - name: "Salvar marcadores no git"
        run: |
          git config user.name "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          git add _videos/*.done _videos/*.roundup _videos/*.json _data/stories_queue.json _data/published_clips.json _data/channel_memory.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nenhum arquivo novo para salvar."
          else
            git commit -m "YouTube Shorts - $(date -u +'%Y-%m-%d')"
            git push origin HEAD
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: "Log de execucao"
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: "youtube-log-${{ github.run_number }}"
          path: |
            generate_shorts.log
            upload_youtube.log
          retention-days: 7
          if-no-files-found: ignore
      - name: "Apagar youtube_token.json no final"
        if: always()
        run: |
          if [ -f youtube_token.json ]; then
            shred -u youtube_token.json 2>/dev/null || rm -f youtube_token.json
          fi
