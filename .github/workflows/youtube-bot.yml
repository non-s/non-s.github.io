name: "YouTube Bot"

on:
  schedule:
    - cron: "0 9 * * *"
    - cron: "0 13 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  generate-and-upload:
    name: "Gerar videos e publicar"
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: "Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "Instalar FFmpeg"
        run: sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: "Instalar dependencias Python"
        run: |
          pip install --upgrade pip
          pip install feedparser requests google-auth google-auth-oauthlib google-api-python-client edge-tts Pillow

      - name: "Restaurar token do YouTube"
        run: |
          echo '${{ secrets.YOUTUBE_TOKEN }}' > token.json

      - name: "Gerar videos"
        run: python generate_video.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"

      - name: "Upload para YouTube"
        run: python upload_youtube.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"

      - name: "Atualizar YOUTUBE_TOKEN secret"
        if: always()
        continue-on-error: true
        run: |
          if [ -f token.json ]; then
            gh secret set YOUTUBE_TOKEN < token.json
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Log de execucao"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "youtube-log-${{ github.run_number }}"
          path: |
            generate_video.log
            upload_youtube.log
          retention-days: 7
          if-no-files-found: ignore
