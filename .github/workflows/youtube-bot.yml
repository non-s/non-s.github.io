name: "YouTube Bot — Shorts only"

# Shorts-only pipeline. Long-form videos were dropped 2026-05 — every
# short already covers one story, which is what we want on the channel.
#
# Quota math: YouTube allows 10,000 units/day; each upload costs ~1,650
# (videos.insert 1,600 + thumbnails.set 50). 3 runs/day × 1 short =
# 4,950 units — half the daily cap, plenty of headroom.
#
# Why three staggered runs (not one batch of 3): the algorithm grants
# each Short its own seed-audience test window. Batching all 3 at the
# same hour wastes 2/3 of the "explore" cycles. 08:00 / 14:00 / 20:00
# UTC hits Europe-morning, US-lunch, US-evening — three distinct
# audience pools. Source: Buffer + Hopper Shorts timing studies, 2026.
on:
  schedule:
    - cron: "0 8,14,20 * * *"
  workflow_dispatch:

# Serialise with every other workflow that pushes to main.
concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  generate-and-upload:
    name: "Gerar e publicar Shorts"
    runs-on: ubuntu-latest
    # Without a timeout, a stuck FFmpeg encode can chew through the
    # whole monthly GitHub Actions quota on a single hung job.
    # 30min is generous for 3 shorts (~5min each end-to-end).
    timeout-minutes: 30

    # Least-privilege: we don't use OIDC, only commit + push.
    permissions:
      contents: write

    env:
      # 1 short per run × 3 runs/day = 3 shorts/day, spaced for the
      # algorithm's separate test windows. Bump to 2 if you ever want
      # ~6/day; do NOT exceed the daily 10k YouTube API quota:
      # 6 uploads × 1,650 = 9,900 units, no margin.
      MAX_SHORTS_PER_RUN: "1"

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: "Python 3.11"
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "Instalar FFmpeg e fontes"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            fonts-dejavu-core \
            fonts-liberation \
            fonts-noto-core \
            fonts-noto-mono \
            fonts-open-sans \
            fontconfig
          sudo fc-cache -f -v

      - name: "Instalar dependencias Python"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Restaurar token do YouTube"
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          if [ -z "$YOUTUBE_TOKEN" ]; then
            echo "❌ YOUTUBE_TOKEN secret não está configurado."
            echo "   Rode auth_youtube.py localmente e cole o conteúdo de token.json"
            echo "   em Settings → Secrets → Actions → YOUTUBE_TOKEN"
            exit 1
          fi
          # Write the token under restrictive perms (umask covers the
          # implicit mode of `printf > file`). 0600 keeps it readable
          # only by the runner user.
          umask 077
          printf '%s' "$YOUTUBE_TOKEN" > token.json
          chmod 600 token.json
          # Sanity check: confirm it parses as JSON. `python -m json.tool`
          # reads stdin, closes the file properly, and exits non-zero on
          # invalid JSON — simpler than embedding a multi-line script
          # that has to round-trip through YAML.
          if ! python -m json.tool < token.json > /dev/null 2>&1; then
            echo "❌ YOUTUBE_TOKEN secret não é JSON válido."
            rm -f token.json
            exit 1
          fi
          echo "✅ token.json restaurado"

      - name: "Restaurar marcadores de videos processados"
        run: |
          mkdir -p _videos
          # Os arquivos .done e .roundup ficam no git para rastrear o que já foi feito
          echo "📂 Marcadores existentes:"
          ls _videos/*.done 2>/dev/null | wc -l || echo "0 .done"
          ls _videos/*.roundup 2>/dev/null | wc -l || echo "0 .roundup"

      # Long-form roundup video generation was removed 2026-05. The
      # channel is shorts-only now. generate_video.py / upload_youtube.py
      # for long-form remain in the repo — re-enable here if needed.

      - name: "📱 Gerar YouTube Shorts (até 3 por run)"
        # This is now the primary content step — drop the
        # continue-on-error so a failure surfaces instead of silently
        # producing zero shorts for the day.
        run: python generate_shorts.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MAX_SHORTS_PER_RUN: ${{ env.MAX_SHORTS_PER_RUN }}

      - name: "📤 Upload Shorts para YouTube"
        run: python upload_youtube.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"

      - name: "💾 Salvar marcadores no git"
        run: |
          git config user.name  "GlobalBR News Bot"
          git config user.email "bot@globalbrnews.com"

          # Done markers keep the pipeline idempotent across runs: a
          # fresh checkout otherwise re-publishes the same Shorts.
          git add _videos/*.done    2>/dev/null || true
          git add _videos/*.roundup 2>/dev/null || true
          git add _videos/*.json    2>/dev/null || true
          # The stories queue gets stories marked as consumed by
          # generate_shorts.py — commit that back too.
          git add _data/stories_queue.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "✅ Nenhum arquivo novo para salvar."
          else
            git commit -m "📱 Shorts — $(date -u +'%Y-%m-%d')"
            git push origin HEAD
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Note: we don't try to push token.json back to the YOUTUBE_TOKEN
      # secret here — the default GITHUB_TOKEN can't modify repository
      # secrets, so the previous `gh secret set` step always failed
      # silently. Google's refresh_token doesn't normally expire, so a
      # one-time setup of the secret is enough. If you ever need to
      # rotate it: run `python auth_youtube.py` locally and paste the
      # contents of token.json into the YOUTUBE_TOKEN repo secret.

      - name: "Log de execucao"
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: "youtube-log-${{ github.run_number }}"
          path: |
            generate_shorts.log
            upload_youtube.log
          retention-days: 7
          if-no-files-found: ignore

      # Defence in depth: shred the OAuth token on EVERY exit path
      # (success, failure, cancellation). The runner is ephemeral, but
      # leaving credentials in artifacts/logs is a real risk if any
      # earlier step accidentally tar's the workspace.
      - name: "🧹 Apagar token.json no final"
        if: always()
        run: |
          if [ -f token.json ]; then
            shred -u token.json 2>/dev/null || rm -f token.json
            echo "🧹 token.json shredded"
          fi
