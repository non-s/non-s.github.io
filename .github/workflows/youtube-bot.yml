name: "YouTube Bot - Shorts only"

# Shorts-only pipeline for YouTube.
# Primary cadence: 4 global Shorts/day, with a watchdog workflow that backfills
# missed GitHub schedule events after a grace window.
on:
  schedule:
    - cron: "23 5,14,19,23 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this publishing run was started"
        required: false
        default: "manual"

concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  generate-and-upload:
    name: "Gerar e publicar Shorts no YouTube"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      MAX_SHORTS_PER_RUN: "1"
      # Spoken narration + captions only by default. This avoids
      # third-party Content ID surprises while keeping the pipeline free.
      MUSIC_BED_ENABLED: "0"
      # Open immediately on the animal and hook in the Shorts feed.
      BRAND_CARDS_ENABLED: "0"
      # Monetization-first mode: skip a candidate instead of shipping a
      # weak static video or a Short without retention-critical captions.
      QUALITY_REQUIRE_MOTION_BROLL: "1"
      QUALITY_REQUIRE_CAPTIONS: "1"
      QUALITY_MIN_VISUAL_QA_SCORE: "6"
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: "Python 3.11"
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
      - name: "Instalar FFmpeg, libass e fontes"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg libass9 fonts-dejavu-core fonts-liberation fonts-noto-core fonts-noto-mono fonts-open-sans fontconfig
          sudo fc-cache -f -v
      - name: "Instalar dependencias Python"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          if [ "${INSTALL_FASTER_WHISPER:-1}" = "1" ]; then
            pip install --no-deps "faster-whisper>=1.0,<2.0" "ctranslate2>=4.0,<5.0" || true
          fi
      - name: "Restaurar token do YouTube"
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          if [ -z "$YOUTUBE_TOKEN" ]; then
            echo "YOUTUBE_TOKEN secret nao esta configurado."
            echo "Rode auth_youtube.py e cole o JSON em Settings -> Secrets -> Actions -> YOUTUBE_TOKEN"
            exit 1
          fi
          umask 077
          printf '%s' "$YOUTUBE_TOKEN" > youtube_token.json
          chmod 600 youtube_token.json
          python -m json.tool < youtube_token.json > /dev/null
      - name: "Validar autenticacao do YouTube"
        run: python upload_youtube.py --check-auth
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
      - name: "Gerar Shorts"
        run: |
          python scripts/run_intelligence_suite.py pre_generate
          python scripts/publish_window.py
          python generate_shorts.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || secrets.CEREBRAS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.GEMINI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || secrets.GROQ }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY || secrets.PEXELS }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY || secrets.PIXABAY }}
          MAX_SHORTS_PER_RUN: ${{ env.MAX_SHORTS_PER_RUN }}
      - name: "Upload Shorts para YouTube"
        run: python upload_youtube.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          YOUTUBE_PRIVACY: ${{ vars.YOUTUBE_PRIVACY || 'public' }}
      - name: "Atualizar aprendizado editorial gratuito"
        run: |
          python scripts/run_intelligence_suite.py post_publish
      - name: "Engajar comentarios"
        run: |
          python scripts/reply_comments.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          YOUTUBE_AUTO_REPLY_COMMENTS: ${{ vars.YOUTUBE_AUTO_REPLY_COMMENTS || '1' }}
          YOUTUBE_COMMENT_REPLY_LIMIT: ${{ vars.YOUTUBE_COMMENT_REPLY_LIMIT || '30' }}
      - name: "Salvar marcadores no git"
        run: |
          git config user.name "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          state_dir="$(mktemp -d)"
          state_paths=(
            _data/stories_queue.json
            _data/published_clips.json
            _data/channel_memory.jsonl
            _data/analytics/latest.json
            _data/analytics/experiments.json
            _data/analytics/comments.json
            _data/comment_replies.json
            _data/ai_provider_report.json
            _data/packaging_report.json
            _data/youtube_brain_report.json
            _data/youtube_intelligence.json
            _data/autonomous_director.json
            _data/autonomous_growth_plan.json
            _data/channel_success.json
            _data/success_rewriter.json
            _data/winner_sequel_factory.json
            _data/automation_health.json
            _data/ops_guardian.json
            _data/remake_backlog.json
            _data/trend_radar.json
            _data/category_recovery.json
            _data/category_recovery_rewriter.json
            _data/fact_ledger.json
            _data/format_memory.json
            _data/fan_growth.json
            _data/audience_memory.json
            _data/agency_gate.json
            _data/post24_review.json
            _data/sequence_plan.json
            _data/publish_schedule.json
            _data/queue_prune_report.json
            _data/repair_queue.jsonl
          )
          for path in "${state_paths[@]}"; do
            if [ -e "$path" ]; then
              mkdir -p "$state_dir/$(dirname "$path")"
              cp "$path" "$state_dir/$path"
            fi
          done
          find _data/reports -maxdepth 1 -type f -name 'weekly-*.md' -print0 2>/dev/null | while IFS= read -r -d '' path; do
            mkdir -p "$state_dir/$(dirname "$path")"
            cp "$path" "$state_dir/$path"
          done
          find _videos -maxdepth 1 -type f \( -name '*.done' -o -name '*.roundup' \) -print0 | while IFS= read -r -d '' path; do
            mkdir -p "$state_dir/$(dirname "$path")"
            cp "$path" "$state_dir/$path"
          done
          for path in _videos/shorts_done.json _videos_pt-BR/shorts_done.json; do
            if [ -e "$path" ]; then
              mkdir -p "$state_dir/$(dirname "$path")"
              cp "$path" "$state_dir/$path"
            fi
          done
          git fetch origin main
          git reset --hard origin/main
          cp -R "$state_dir"/. .
          rm -rf "$state_dir"
          # Stage the queue first: unmatched optional globs must never
          # prevent consumed stories from being persisted. The rejected queue
          # is diagnostic-only and is omitted here to avoid append-log conflicts
          # after a successful upload.
          git add _data/stories_queue.json
          for path in "${state_paths[@]}"; do
            [ -e "$path" ] && git add "$path"
          done
          find _data/reports -maxdepth 1 -type f -name 'weekly-*.md' -print0 2>/dev/null | xargs -0 -r git add --
          find _videos -maxdepth 1 -type f \
            \( -name '*.done' -o -name '*.roundup' \) \
            -print0 | xargs -0 -r git add --
          for path in _videos/shorts_done.json _videos_pt-BR/shorts_done.json; do
            [ -e "$path" ] && git add -f "$path"
          done
          if git diff --cached --quiet; then
            echo "Nenhum arquivo novo para salvar."
            exit 0
          fi
          git commit -m "YouTube Shorts - $(date -u +'%Y-%m-%d')"
          for attempt in 1 2 3; do
            if git push origin HEAD; then
              exit 0
            fi
            echo "Push rejected on attempt ${attempt}; rebasing before retry."
            git pull --rebase --autostash origin main
            sleep $((attempt * 5))
          done
          echo "Push failed after retries."
          exit 1
      - name: "Log de execucao"
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: "youtube-log-${{ github.run_number }}"
          path: |
            generate_shorts.log
            upload_youtube.log
          retention-days: 7
          if-no-files-found: ignore
      - name: "Apagar youtube_token.json no final"
        if: always()
        run: |
          if [ -f youtube_token.json ]; then
            shred -u youtube_token.json 2>/dev/null || rm -f youtube_token.json
          fi
