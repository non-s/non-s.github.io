name: "YouTube Bot - Shorts only"

# Lofi Shorts pipeline for YouTube: no narration, no story queue -- every
# run fetches/refreshes a small b-roll+bgm library and generates one fresh
# Short on demand. upload_youtube.py's own per-canonical-slot dedup (see
# duplicate_slot_uploaded() in scripts/upload_intent.py) keeps a slot from
# publishing twice. Publish cadence is one Short every 10 minutes -- the
# 10-minute grid in utils/audience_expansion.py's GLOBAL_PUBLISH_WINDOWS
# defines the canonical slots this cron polls.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this publishing run was started"
        required: false
        default: "manual"

permissions:
  contents: read

concurrency:
  # Publishing must not wait behind long queue refreshes. State commits are
  # replayed on latest main with retry in the final save step.
  group: youtube-publisher
  cancel-in-progress: false

jobs:
  generate-and-upload:
    name: "Gerar e publicar Lofi Shorts no YouTube"
    # Set YOUTUBE_PUBLISHING_ENABLED=1 to keep the hourly YouTube publisher
    # active. Pixabay (anime/illustrated b-roll) is the visual source.
    if: ${{ vars.YOUTUBE_PUBLISHING_ENABLED == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      UPLOAD_IDEMPOTENCY_MODE: ${{ vars.UPLOAD_IDEMPOTENCY_MODE || 'block' }}
      UPLOAD_SLOT_IDEMPOTENCY_MODE: ${{ vars.UPLOAD_SLOT_IDEMPOTENCY_MODE || 'block' }}
      MEDIA_LIFECYCLE_CLEANUP: ${{ vars.MEDIA_LIFECYCLE_CLEANUP || '1' }}
      QUOTA_GUARD_MODE: ${{ vars.QUOTA_GUARD_MODE || 'block' }}
      QUOTA_GUARD_MAX_DAILY_RATIO: ${{ vars.QUOTA_GUARD_MAX_DAILY_RATIO || '0.95' }}
      # Raised to cover the 10-minute Shorts cadence (~144 uploads/day) plus
      # the hourly mix (~24/day) -- see utils/audience_expansion.py's
      # GLOBAL_PUBLISH_WINDOWS and lofi-mix-daily.yml. This only relaxes
      # this repo's own internal guard; it does not raise the underlying
      # Google Cloud project's real YouTube Data API quota.
      YOUTUBE_DAILY_QUOTA_BUDGET: "60000"
      YOUTUBE_DAILY_UPLOAD_BUDGET: "200"
      YOUTUBE_DESCRIPTION_MODE: ${{ vars.YOUTUBE_DESCRIPTION_MODE || 'full' }}
      CHANNEL_PLAYLIST_PREFIX: ${{ vars.CHANNEL_PLAYLIST_PREFIX || '' }}
      # "#chillbeats" was a generic head-term hashtag that doesn't say
      # anything about this channel's sub-niche; "#animelofi"/"#rainynightlofi"
      # match the branding utils/lofi_branding.py already leads titles with
      # (see its module docstring for why head terms are unwinnable here).
      # upload_youtube.py's _youtube_description() shows only the first 3
      # hashtags above the title -- #Shorts/#lofi/#animelofi for a Short
      # (long-form drops #Shorts, so it's #lofi/#animelofi/#rainynightlofi).
      CHANNEL_DEFAULT_HASHTAGS: ${{ vars.CHANNEL_DEFAULT_HASHTAGS || '#Shorts,#lofi,#animelofi,#rainynightlofi' }}
      CHANNEL_PLAYLIST_DESCRIPTION: ${{ vars.CHANNEL_PLAYLIST_DESCRIPTION || 'Lofi Shorts grouped for easier binge watching.' }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: "Sincronizar main remoto antes da decisao"
        run: |
          git fetch origin main
          git checkout -B main origin/main
          echo "Publishing checkout is synced to $(git rev-parse --short HEAD)."
      - name: "Python 3.11"
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"
          cache: "pip"
      - name: "Instalar FFmpeg"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
      - name: "Instalar dependencias Python"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: "Quota preflight"
        run: |
          set +e
          quota="$(python scripts/quota_preflight.py youtube-bot --json --check-only)"
          code="$?"
          set -e
          echo "$quota"
          blocked="$(QUOTA_JSON="$quota" python - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["QUOTA_JSON"])
          print("1" if (payload.get("guard") or {}).get("block") else "0")
          PY
          )"
          echo "PUBLISH_QUOTA_BLOCKED=$blocked" >> "$GITHUB_ENV"
          QUOTA_JSON="$quota" python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os

          payload = json.loads(os.environ["QUOTA_JSON"])
          guard = payload.get("guard") or {}
          print("### API quota preflight")
          print(f"- Estimated units: `{payload.get('estimated_units')}`")
          print(f"- Projected ratio: `{guard.get('projected_ratio')}`")
          print(f"- Guard mode: `{guard.get('mode')}`")
          print(f"- Blocked: `{guard.get('block')}`")
          PY
          if [ "$code" = "3" ]; then
            echo "Quota guard requested a safe skip."
          fi
      - name: "Restaurar tokens do YouTube"
        if: env.PUBLISH_QUOTA_BLOCKED != '1'
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          umask 077
          if [ -n "$YOUTUBE_TOKEN" ]; then
            printf '%s' "$YOUTUBE_TOKEN" > youtube_token.json
            chmod 600 youtube_token.json
          fi
      - name: "Validar autenticacao do YouTube"
        if: env.PUBLISH_QUOTA_BLOCKED != '1'
        run: |
          if [ -f youtube_token.json ]; then
            python upload_youtube.py --check-auth --language=en
          fi
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
      - name: "Restaurar bibliotecas de midia lofi do cache"
        # Ambos os diretorios sao gitignored/nao versionados -- um runner
        # novo sempre comeca vazio. O cache de Actions (nao o git) e o que
        # faz a biblioteca crescer rumo a ~150 faixas ao longo do tempo em
        # vez de reiniciar a cada execucao: a chave e unica por execucao
        # entao sempre salva no final, e restore-keys traz a biblioteca
        # mais recente para comecar.
        if: env.PUBLISH_QUOTA_BLOCKED != '1'
        uses: actions/cache@v4
        with:
          path: |
            _assets/audio/bgm
            _assets/video/lofi_broll
          key: lofi-media-${{ github.run_id }}
          restore-keys: |
            lofi-media-
      - name: "Sincronizar bibliotecas de b-roll e musica lofi"
        if: env.PUBLISH_QUOTA_BLOCKED != '1'
        run: |
          python scripts/sync_lofi_broll.py
          python scripts/sync_jamendo_music.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
      - name: "Gerar Short lofi"
        if: env.PUBLISH_QUOTA_BLOCKED != '1'
        # A fresh checkout always starts with an empty local bgm/b-roll
        # library (both are gitignored) and depends on this run's sync step
        # finding at least one new usable clip/track -- Jamendo's
        # commercial-safe (CC BY) share of results is a minority, so an
        # empty-supply cycle happens by chance sometimes. That is a skip,
        # not a bug: the recovery cron retries in ~20 minutes, so this step
        # warns and lets the job continue (nothing to upload) instead of
        # failing the whole run.
        run: python generate_lofi_short.py || echo "::warning::No Short generated this cycle (b-roll/bgm supply not ready)."
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
      - name: "Upload Shorts para YouTube"
        if: env.PUBLISH_QUOTA_BLOCKED != '1' && hashFiles('youtube_token.json') != ''
        run: python upload_youtube.py --language=en
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          YOUTUBE_PRIVACY: ${{ vars.YOUTUBE_PRIVACY || 'public' }}
          MEDIA_LIFECYCLE_CLEANUP: 0
      - name: "Aplicar ciclo de vida da midia"
        if: env.PUBLISH_QUOTA_BLOCKED != '1'
        run: python scripts/media_lifecycle.py --cleanup --audit-tracked --json
      - name: "Salvar marcadores no git"
        if: always() && env.PUBLISH_QUOTA_BLOCKED != '1'
        run: |
          git config user.name "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          state_paths=(
            _data/published_clips.json
            _data/provider_stats.jsonl
            _data/analytics/latest.json
            _data/analytics/api_quota_ledger.jsonl
            _data/analytics/api_quota_latest.json
            _data/upload_intents.jsonl
            _data/media_lifecycle_report.json
          )
          jsonl_merge_paths=(
            _data/analytics/api_quota_ledger.jsonl
            _data/provider_stats.jsonl
            _data/upload_intents.jsonl
          )
          # Only markers THIS run itself just created (still untracked in
          # git) -- never the full `_videos/*.done` glob. A marker that's
          # already committed and locally unmodified must not be snapshotted
          # and blindly restored below: `git reset --hard origin/main` is
          # the single source of truth for those, since another concurrent
          # run (or an admin script) may have deleted that exact marker
          # upstream in the meantime. Restoring the pre-reset glob
          # unconditionally resurrected markers that were correctly deleted
          # upstream, 3 times in one session -- .done files are write-once
          # (upload_youtube.py never edits an existing one, only creates new
          # ones), so "untracked" and "created by this run" are the same
          # thing here, and `git status` already knows the difference
          # between that and "unchanged since the base commit" without
          # needing a manual pre/post-reset snapshot at all.
          #
          # Computed ONCE, before the first reset/commit below, and reused
          # as a fixed list for every retry: once this run's markers get
          # `git commit`ed locally (even before a successful push), they're
          # no longer "untracked" -- re-running this same git-status check
          # inside the retry loop would find nothing left to preserve and
          # lose them to the next `git reset --hard`. The files themselves
          # stay on disk across attempts (a commit doesn't remove them), so
          # the filename list captured up front is all every attempt needs.
          mapfile -t new_marker_paths < <(
            git status --porcelain=v1 --untracked-files=normal -- _videos 2>/dev/null \
              | grep -E '^\?\? .*\.(done|roundup)$' \
              | cut -c4-
          )
          state_dir="$(mktemp -d)"
          for path in "${state_paths[@]}"; do
            if [ -e "$path" ]; then
              mkdir -p "$state_dir/$(dirname "$path")"
              cp "$path" "$state_dir/$path"
            fi
          done
          for path in "${new_marker_paths[@]}"; do
            [ -e "$path" ] || continue
            mkdir -p "$state_dir/$(dirname "$path")"
            cp "$path" "$state_dir/$path"
          done
          git fetch origin main
          git reset --hard origin/main
          python scripts/merge_jsonl_state.py "$state_dir" "${jsonl_merge_paths[@]}"
          cp -R "$state_dir"/. .
          rm -rf "$state_dir"
          for path in "${state_paths[@]}"; do
            [ -e "$path" ] && git add "$path"
          done
          for path in "${new_marker_paths[@]}"; do
            [ -e "$path" ] && git add "$path"
          done
          if git diff --cached --quiet; then
            echo "Nenhum arquivo novo para salvar."
            exit 0
          fi
          git commit -m "YouTube automation state - $(date -u +'%Y-%m-%d')"
          for attempt in 1 2 3; do
            if git push origin HEAD; then
              exit 0
            fi
            echo "Push rejected on attempt ${attempt}; replaying generated state on latest main."
            retry_dir="$(mktemp -d)"
            for path in "${state_paths[@]}"; do
              if [ -e "$path" ]; then
                mkdir -p "$retry_dir/$(dirname "$path")"
                cp "$path" "$retry_dir/$path"
              fi
            done
            for path in "${new_marker_paths[@]}"; do
              [ -e "$path" ] || continue
              mkdir -p "$retry_dir/$(dirname "$path")"
              cp "$path" "$retry_dir/$path"
            done
            git fetch origin main
            git reset --hard origin/main
            python scripts/merge_jsonl_state.py "$retry_dir" "${jsonl_merge_paths[@]}"
            cp -R "$retry_dir"/. .
            rm -rf "$retry_dir"
            for path in "${state_paths[@]}"; do
              [ -e "$path" ] && git add "$path"
            done
            for path in "${new_marker_paths[@]}"; do
              [ -e "$path" ] && git add "$path"
            done
            if git diff --cached --quiet; then
              echo "Latest main already contains generated state."
              exit 0
            fi
            git commit -m "YouTube automation state - $(date -u +'%Y-%m-%d')"
            sleep $((attempt * 5))
          done
          echo "Push failed after retries."
          exit 1
      - name: "Log de execucao"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: "youtube-log-${{ github.run_number }}"
          path: |
            upload_youtube.log
          retention-days: 7
          if-no-files-found: ignore
      - name: "Apagar tokens do YouTube no final"
        if: always()
        run: |
          for path in youtube_token.json; do
            if [ -f "$path" ]; then
              shred -u "$path" 2>/dev/null || rm -f "$path"
            fi
          done
