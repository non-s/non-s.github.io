name: "YouTube Bot — Shorts only"

# Shorts-only pipeline.
#
# Quota math: YouTube allows 10,000 units/day; each upload costs
# ~1,750 (videos.insert 1,600 + thumbnails.set 50 + playlistItems 50
# + commentThreads 50). 5 runs/day × 1 short = 8,750 units ≈ 87 %
# of the daily cap — the safe ceiling without requesting a quota
# increase. A 6th run on the same day would push the bot past 100 %
# and the last upload would fail with 403 quotaExceeded.
#
# Why five staggered runs (not one batch of 5): the algorithm grants
# each Short its own seed-audience test window. Batching them wastes
# explore cycles. 00 / 05 / 10 / 15 / 20 UTC = 21 / 02 / 07 / 12 / 17
# BRT — coverage across Brazil prime time, US daytime, Europe morning
# and evening. Source: Buffer + Hopper Shorts timing studies, 2026.
on:
  schedule:
    - cron: "0 0,5,10,15,20 * * *"
  workflow_dispatch:

# Serialise with every other workflow that pushes to main.
concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  generate-and-upload:
    name: "Gerar e publicar Shorts"
    runs-on: ubuntu-latest
    # Without a timeout, a stuck FFmpeg encode can chew through the
    # whole monthly GitHub Actions quota on a single hung job.
    # 30min is generous for 1 short (~5min end-to-end).
    timeout-minutes: 30

    # Least-privilege: we don't use OIDC, only commit + push.
    permissions:
      contents: write

    env:
      # 1 short per run × 5 runs/day = 5 shorts/day. DO NOT raise to 2:
      # 10 uploads/day × 1,750 = 17,500 units, 175 % of cap. To go
      # beyond 5/day, request a quota increase from Google first
      # (free, ~1-2 weeks) — see SETUP.md §4.
      MAX_SHORTS_PER_RUN: "1"

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: "Python 3.11"
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "Instalar FFmpeg, libass e fontes"
        run: |
          sudo apt-get update -qq
          # libass is required for the ASS subtitle burn-in step. It's
          # already a dep of the ffmpeg binary on ubuntu-latest, but
          # we install explicitly to fail loudly if Ubuntu ever splits
          # ffmpeg-extras out of the default package.
          sudo apt-get install -y \
            ffmpeg \
            libass9 \
            fonts-dejavu-core \
            fonts-liberation \
            fonts-noto-core \
            fonts-noto-mono \
            fonts-open-sans \
            fontconfig
          sudo fc-cache -f -v

      - name: "Instalar dependencias Python"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # Optional: faster-whisper for local caption fallback if Groq
          # Whisper isn't configured. Keeps captions working with zero
          # network deps. ~200 MB download, runs CPU-only.
          if [ "${INSTALL_FASTER_WHISPER:-1}" = "1" ]; then
            pip install --no-deps "faster-whisper>=1.0,<2.0" "ctranslate2>=4.0,<5.0" || true
          fi

      - name: "Restaurar token do YouTube"
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          if [ -z "$YOUTUBE_TOKEN" ]; then
            echo "❌ YOUTUBE_TOKEN secret não está configurado."
            echo "   Rode auth_youtube.py localmente e cole o conteúdo de token.json"
            echo "   em Settings → Secrets → Actions → YOUTUBE_TOKEN"
            exit 1
          fi
          # Write the token under restrictive perms (umask covers the
          # implicit mode of `printf > file`). 0600 keeps it readable
          # only by the runner user.
          umask 077
          printf '%s' "$YOUTUBE_TOKEN" > token.json
          chmod 600 token.json
          # Sanity check: confirm it parses as JSON. `python -m json.tool`
          # reads stdin, closes the file properly, and exits non-zero on
          # invalid JSON — simpler than embedding a multi-line script
          # that has to round-trip through YAML.
          if ! python -m json.tool < token.json > /dev/null 2>&1; then
            echo "❌ YOUTUBE_TOKEN secret não é JSON válido."
            rm -f token.json
            exit 1
          fi
          echo "✅ token.json restaurado"

      - name: "Restaurar marcadores de videos processados"
        run: |
          mkdir -p _videos
          # Os arquivos .done e .roundup ficam no git para rastrear o que já foi feito
          echo "📂 Marcadores existentes:"
          ls _videos/*.done 2>/dev/null | wc -l || echo "0 .done"
          ls _videos/*.roundup 2>/dev/null | wc -l || echo "0 .roundup"

      # Long-form roundup video generation was removed 2026-05. The
      # channel is shorts-only now. generate_video.py / upload_youtube.py
      # for long-form remain in the repo — re-enable here if needed.

      - name: "📱 Gerar YouTube Shorts (até 3 por run)"
        # This is now the primary content step — drop the
        # continue-on-error so a failure surfaces instead of silently
        # producing zero shorts for the day.
        run: python generate_shorts.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          MISTRAL_API_KEY:   ${{ secrets.MISTRAL_API_KEY }}
          # Same free fallback chain as fetch-news. We accept the short
          # secret names too (CEREBRAS / GEMINI / GROQ / PEXELS) so
          # legacy setups don't have to rename.
          CEREBRAS_API_KEY:  ${{ secrets.CEREBRAS_API_KEY || secrets.CEREBRAS }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY   || secrets.GEMINI   }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY     || secrets.GROQ     }}
          # B-roll: Pexels needs a free key (20k req/mo, no card).
          # Without it the pipeline falls back to NASA + Internet Archive
          # (both keyless) which still beats static frames.
          PEXELS_API_KEY:    ${{ secrets.PEXELS_API_KEY   || secrets.PEXELS   }}
          MAX_SHORTS_PER_RUN: ${{ env.MAX_SHORTS_PER_RUN }}

      - name: "📤 Upload Shorts para YouTube"
        run: python upload_youtube.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"

      - name: "📊 Write run summary"
        if: always()
        run: |
          {
            echo "## YouTube Shorts run"
            echo ""
            # Count what we actually shipped this run.
            UPLOADED=$(ls _videos/*.done 2>/dev/null | wc -l)
            META_LEFT=$(ls _videos/*.json 2>/dev/null | wc -l)
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Done markers (lifetime) | ${UPLOADED} |"
            echo "| Pending metadata (this run) | ${META_LEFT} |"
            # YouTube API quota snapshot (estimated from our own
            # upload log; see utils/youtube_quota.py).
            python -c "from utils.youtube_quota import summary; s=summary(); print(f'| YouTube quota today | **{s[\"used\"]}/{s[\"budget\"]}** ({s[\"pct_used\"]}%) |')"
            # Most recent uploaded titles.
            echo ""
            echo "### Last 5 published"
            ls -t _videos/*.done 2>/dev/null | head -5 | while read f; do
              TITLE=$(python -c "import json; print(json.load(open('$f')).get('title','?'))" 2>/dev/null || echo "?")
              URL=$(python -c "import json; print(json.load(open('$f')).get('url',''))" 2>/dev/null || echo "")
              echo "- [${TITLE}](${URL})"
            done
            # Quota warning (only emits if >80 % used)
            WARN=$(python -c "from utils.youtube_quota import warn_if_near_cap; print(warn_if_near_cap())")
            if [ -n "$WARN" ]; then
              echo ""
              echo "$WARN"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "💾 Salvar marcadores no git"
        run: |
          git config user.name  "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"

          # Done markers keep the pipeline idempotent across runs: a
          # fresh checkout otherwise re-publishes the same Shorts.
          git add _videos/*.done    2>/dev/null || true
          git add _videos/*.roundup 2>/dev/null || true
          git add _videos/*.json    2>/dev/null || true
          # The stories queue gets stories marked as consumed by
          # generate_shorts.py — commit that back too.
          git add _data/stories_queue.json 2>/dev/null || true
          # Quota ledger — tracks per-upload YouTube Data API spend so
          # the workflow summary can surface "we're at 85 % of cap".
          git add _data/quota_log.jsonl 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "✅ Nenhum arquivo novo para salvar."
          else
            git commit -m "📱 Shorts — $(date -u +'%Y-%m-%d')"
            git push origin HEAD
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Note: we don't try to push token.json back to the YOUTUBE_TOKEN
      # secret here — the default GITHUB_TOKEN can't modify repository
      # secrets, so the previous `gh secret set` step always failed
      # silently. Google's refresh_token doesn't normally expire, so a
      # one-time setup of the secret is enough. If you ever need to
      # rotate it: run `python auth_youtube.py` locally and paste the
      # contents of token.json into the YOUTUBE_TOKEN repo secret.

      - name: "Log de execucao"
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: "youtube-log-${{ github.run_number }}"
          path: |
            generate_shorts.log
            upload_youtube.log
          retention-days: 7
          if-no-files-found: ignore

      # Defence in depth: shred the OAuth token on EVERY exit path
      # (success, failure, cancellation). The runner is ephemeral, but
      # leaving credentials in artifacts/logs is a real risk if any
      # earlier step accidentally tar's the workspace.
      - name: "🧹 Apagar token.json no final"
        if: always()
        run: |
          if [ -f token.json ]; then
            shred -u token.json 2>/dev/null || rm -f token.json
            echo "🧹 token.json shredded"
          fi
