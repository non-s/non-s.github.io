name: "YouTube Bot"

on:
  schedule:
    # Roda uma vez por dia às 14:00 UTC
    # YouTube quota: 10.000 unidades/dia | 1 upload = 1.600 unidades
    # 1 EN + 1 PT-BR + até 3 Shorts = ~5 uploads = ~8.000 unidades (dentro da quota)
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  generate-and-upload:
    name: "Gerar videos e publicar"
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: "Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "Instalar FFmpeg e fontes"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            fonts-dejavu-core \
            fonts-liberation \
            fonts-noto-core \
            fonts-noto-mono \
            fonts-open-sans \
            fontconfig
          sudo fc-cache -f -v

      - name: "Instalar dependencias Python"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Restaurar token do YouTube"
        run: |
          echo '${{ secrets.YOUTUBE_TOKEN }}' > token.json

      - name: "Restaurar marcadores de videos processados"
        run: |
          mkdir -p _videos
          # Os arquivos .done e .roundup ficam no git para rastrear o que já foi feito
          echo "📂 Marcadores existentes:"
          ls _videos/*.done 2>/dev/null | wc -l || echo "0 .done"
          ls _videos/*.roundup 2>/dev/null | wc -l || echo "0 .roundup"

      - name: "Gerar video EN"
        run: python generate_video.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: "Upload video EN para YouTube"
        run: python upload_youtube.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"

      - name: "📱 Gerar YouTube Shorts"
        run: python generate_shorts.py
        continue-on-error: true
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: "📤 Upload Shorts para YouTube"
        run: python upload_youtube.py
        continue-on-error: true
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"

      - name: "📝 Criar posts no blog para os vídeos"
        run: python create_video_blog_post.py
        continue-on-error: true
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"

      - name: "🦋 Postar vídeos no Bluesky"
        run: python post_video_bluesky.py
        continue-on-error: true
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}

      - name: "💾 Salvar marcadores e posts no git"
        run: |
          git config user.name  "GlobalBR News Bot"
          git config user.email "bot@globalbrnews.com"

          # Marcadores de vídeo
          git add _videos/*.done   2>/dev/null || true
          git add _videos/*.roundup 2>/dev/null || true
          git add _videos/*.json   2>/dev/null || true
          # Posts do blog criados para os vídeos
          git add _posts/*-video-*.md 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "✅ Nenhum arquivo novo para salvar."
          else
            git commit -m "🎬 Vídeos + posts — $(date -u +'%Y-%m-%d')"
            git push origin HEAD
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Atualizar YOUTUBE_TOKEN secret"
        if: always()
        continue-on-error: true
        run: |
          if [ -f token.json ]; then
            gh secret set YOUTUBE_TOKEN < token.json
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Log de execucao"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "youtube-log-${{ github.run_number }}"
          path: |
            generate_video.log
            generate_shorts.log
            upload_youtube.log
          retention-days: 7
          if-no-files-found: ignore
