name: "Admin: end live broadcast"

# Manual-only: transitions any currently active/ready/testing YouTube
# broadcast to complete, so the 24/7 relay can be cleanly re-launched
# (e.g. right after a relay-code update) instead of leaving the old
# broadcast dangling until YouTube notices the feed went quiet.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  end-broadcast:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout"
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: "Python 3.11"
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "Instalar dependencias Python"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Restaurar tokens do YouTube"
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          umask 077
          if [ -n "$YOUTUBE_TOKEN" ]; then
            printf '%s' "$YOUTUBE_TOKEN" > youtube_token.json
            chmod 600 youtube_token.json
          fi

      - name: "Encerrar broadcast ao vivo"
        run: python scripts/end_live_broadcast.py

      - name: "Apagar tokens do YouTube no final"
        if: always()
        run: |
          for path in youtube_token.json; do
            if [ -f "$path" ]; then
              shred -u "$path" 2>/dev/null || rm -f "$path"
            fi
          done
