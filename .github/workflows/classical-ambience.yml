name: "Classical Ambience - Amber Hours Classical"

# Fourth content pillar (chat, 2026-07-22): one real, licensed classical/
# orchestral/piano track from Jamendo per video (not a mixed bed), looping
# under the one fixed pinned clip -- see generate_classical_ambience.py's
# module docstring for the exact spec. English copy, no Shorts companion
# for this pillar.
#
# Cadence: hourly (~24/day) -- the channel owner explicitly asked for
# this cadence for this pillar, aware that this account hit YouTube's own
# uploadLimitExceeded around ~23-24 uploads/day when multiple pillars
# were stacked earlier the same night. Every other pillar (storm/rain and
# its live, Pata Jazz, baby noise) is currently either disabled or gated
# off, so this pillar running alone at ~24/day is a reasonable, informed
# choice given that evidence -- not a default to reconsider down like the
# other pillars' conservative first cadences (those were conservative
# specifically for *stacking*, which isn't the situation here).
#
# Gated by its own CLASSICAL_AMBIENCE_ENABLED variable, independent of
# YOUTUBE_PUBLISHING_ENABLED and every other pillar's switch -- off by
# default. The channel owner asked to build this pillar completely before
# turning it on ("build first, publish after") -- see SETUP.md.

on:
  schedule:
    - cron: "35 * * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this run was started"
        required: false
        default: "manual"

permissions:
  contents: read

concurrency:
  group: classical-ambience
  cancel-in-progress: false

jobs:
  generate-and-upload:
    name: "Generate and publish classical ambience video"
    if: ${{ vars.CLASSICAL_AMBIENCE_ENABLED == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    env:
      UPLOAD_IDEMPOTENCY_MODE: ${{ vars.UPLOAD_IDEMPOTENCY_MODE || 'block' }}
      UPLOAD_SLOT_IDEMPOTENCY_MODE: ${{ vars.UPLOAD_SLOT_IDEMPOTENCY_MODE || 'block' }}
      MEDIA_LIFECYCLE_CLEANUP: ${{ vars.MEDIA_LIFECYCLE_CLEANUP || '1' }}
      QUOTA_GUARD_MODE: ${{ vars.QUOTA_GUARD_MODE || 'block' }}
      QUOTA_GUARD_MAX_DAILY_RATIO: ${{ vars.QUOTA_GUARD_MAX_DAILY_RATIO || '0.95' }}
      YOUTUBE_DAILY_QUOTA_BUDGET: "10000"
      YOUTUBE_DAILY_UPLOAD_BUDGET: "30"
      YOUTUBE_DESCRIPTION_MODE: ${{ vars.YOUTUBE_DESCRIPTION_MODE || 'full' }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: "Sync latest main before deciding anything"
        run: |
          git fetch origin main
          git checkout -B main origin/main
      - name: "Python 3.11"
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"
          cache: "pip"
      - name: "Install FFmpeg"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
      - name: "Install Python dependencies"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: "Restore YouTube token"
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          umask 077
          if [ -n "$YOUTUBE_TOKEN" ]; then
            printf '%s' "$YOUTUBE_TOKEN" > youtube_token.json
            chmod 600 youtube_token.json
          fi
      - name: "Restore classical music library from cache"
        uses: actions/cache@v4
        with:
          path: |
            _assets/audio/classical
          key: classical-music-${{ github.run_id }}
          restore-keys: |
            classical-music-
      - name: "Sync classical music library (Jamendo)"
        # Best-effort: generate_classical_ambience.py exits 1 with a clear
        # error if this library is completely empty (unlike other
        # pillars' optional music layers, this pillar's whole audio IS
        # the licensed track, so there's no silent-audio fallback here).
        run: python scripts/sync_classical_music.py || echo "::warning::Classical music sync failed this cycle."
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
      - name: "Generate classical ambience video"
        run: python generate_classical_ambience.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - name: "Upload to YouTube"
        if: hashFiles('youtube_token.json') != ''
        run: python upload_youtube.py --language=en
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          YOUTUBE_PRIVACY: ${{ vars.YOUTUBE_PRIVACY || 'public' }}
          MEDIA_LIFECYCLE_CLEANUP: 0
      - name: "Apply media lifecycle"
        run: python scripts/media_lifecycle.py --cleanup --audit-tracked --json
      - name: "Save markers to git"
        if: always()
        run: |
          git config user.name "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          state_paths=(
            _data/provider_stats.jsonl
            _data/analytics/latest.json
            _data/analytics/api_quota_ledger.jsonl
            _data/analytics/api_quota_latest.json
            _data/upload_intents.jsonl
            _data/media_lifecycle_report.json
          )
          jsonl_merge_paths=(
            _data/analytics/api_quota_ledger.jsonl
            _data/provider_stats.jsonl
            _data/upload_intents.jsonl
          )
          mapfile -t new_marker_paths < <(
            git status --porcelain=v1 --untracked-files=normal -- _videos 2>/dev/null \
              | grep -E '^\?\? .*\.done$' \
              | cut -c4-
          )
          state_dir="$(mktemp -d)"
          for path in "${state_paths[@]}"; do
            if [ -e "$path" ]; then
              mkdir -p "$state_dir/$(dirname "$path")"
              cp "$path" "$state_dir/$path"
            fi
          done
          for path in "${new_marker_paths[@]}"; do
            [ -e "$path" ] || continue
            mkdir -p "$state_dir/$(dirname "$path")"
            cp "$path" "$state_dir/$path"
          done
          git fetch origin main
          git reset --hard origin/main
          python scripts/merge_jsonl_state.py "$state_dir" "${jsonl_merge_paths[@]}"
          cp -R "$state_dir"/. .
          rm -rf "$state_dir"
          for path in "${state_paths[@]}"; do
            [ -e "$path" ] && git add "$path"
          done
          for path in "${new_marker_paths[@]}"; do
            [ -e "$path" ] && git add "$path"
          done
          if git diff --cached --quiet; then
            echo "Nothing new to save."
            exit 0
          fi
          git commit -m "Classical ambience automation state - $(date -u +'%Y-%m-%d')"
          for attempt in 1 2 3; do
            if git push origin HEAD; then
              exit 0
            fi
            echo "Push rejected on attempt ${attempt}; replaying generated state on latest main."
            retry_dir="$(mktemp -d)"
            for path in "${state_paths[@]}"; do
              if [ -e "$path" ]; then
                mkdir -p "$retry_dir/$(dirname "$path")"
                cp "$path" "$retry_dir/$path"
              fi
            done
            for path in "${new_marker_paths[@]}"; do
              [ -e "$path" ] || continue
              mkdir -p "$retry_dir/$(dirname "$path")"
              cp "$path" "$retry_dir/$path"
            done
            git fetch origin main
            git reset --hard origin/main
            python scripts/merge_jsonl_state.py "$retry_dir" "${jsonl_merge_paths[@]}"
            cp -R "$retry_dir"/. .
            rm -rf "$retry_dir"
            for path in "${state_paths[@]}"; do
              [ -e "$path" ] && git add "$path"
            done
            for path in "${new_marker_paths[@]}"; do
              [ -e "$path" ] && git add "$path"
            done
            if git diff --cached --quiet; then
              echo "Latest main already contains generated state."
              exit 0
            fi
            git commit -m "Classical ambience automation state - $(date -u +'%Y-%m-%d')"
            sleep $((attempt * 5))
          done
          echo "Push failed after retries."
          exit 1
      - name: "Execution log"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: "classical-ambience-log-${{ github.run_number }}"
          path: |
            upload_youtube.log
          retention-days: 7
          if-no-files-found: ignore
      - name: "Delete YouTube tokens at the end"
        if: always()
        run: |
          for path in youtube_token.json; do
            if [ -f "$path" ]; then
              shred -u "$path" 2>/dev/null || rm -f "$path"
            fi
          done
