name: "📧 Daily Newsletter"

on:
  schedule:
    - cron: "0 18 * * *"  # 18h UTC — end of publishing day
  workflow_dispatch:

jobs:
  send:
    name: "Send daily newsletter"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🐍 Set up Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "📦 Install dependencies"
        run: pip install -r requirements.txt

      - name: "📧 Send daily newsletter"
        run: python send_newsletter.py
        env:
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_AUDIENCE_ID: ${{ secrets.MAILCHIMP_AUDIENCE_ID }}
          MAILCHIMP_SERVER: ${{ secrets.MAILCHIMP_SERVER }}

      - name: "📋 Upload newsletter log on failure"
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-log-${{ github.run_id }}
          path: newsletter.log
          retention-days: 7
