name: "Production quality gate"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "20 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: "Compile, parse and test"
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pytest>=8,<10" "pytest-cov>=5,<8" "PyYAML>=6,<7" "bandit>=1.8,<2" "pip-audit>=2.9,<3" "ruff>=0.6,<1" "black>=26.3.1,<27" "mypy>=1.10,<2"

      - name: "Compile Python"
        run: python -m compileall -q .

      - name: "Parse structured files"
        run: |
          python - <<'PY'
          import ast
          import json
          from pathlib import Path

          import yaml

          for path in Path(".").rglob("*.py"):
              ast.parse(path.read_text(encoding="utf-8"), filename=str(path))
          for path in Path(".").rglob("*.json"):
              json.loads(path.read_text(encoding="utf-8"))
          for path in Path(".github/workflows").glob("*.yml"):
              yaml.safe_load(path.read_text(encoding="utf-8"))
          PY

      - name: "Run test suite"
        run: |
          python -m pytest -q --cov=utils --cov=scripts --cov-report=term-missing --cov-fail-under=20

      - name: "Check publish schedule contract"
        run: |
          python scripts/check_workflow_contracts.py
          python scripts/check_schedule_sync.py
          python scripts/audit_slot_contracts.py
          python scripts/check_repo_contracts.py
          python scripts/upload_intent.py --json
          python scripts/media_lifecycle.py --audit-tracked --json
          python scripts/quota_preflight.py youtube-bot --json --no-fail-on-block
          python -m pytest -q \
            tests/test_publish_schedule_adaptive.py \
            tests/test_docs_schedule_sync.py \
            tests/test_repo_contracts.py \
            tests/test_feature_flags_registry.py \
            tests/test_media_lifecycle.py \
            tests/test_production_smoke.py \
            tests/test_security_txt.py \
            tests/test_workflow_contracts.py \
            tests/test_zero_cost_hardening.py

      - name: "Type-check zero-cost critical path"
        run: |
          python -m mypy \
            utils/time_semantics.py utils/retention_warehouse.py utils/api_quota_budget.py utils/publish_schedule.py \
            utils/studio_reach_schema.py utils/analytics_schema.py \
            scripts/audit_slot_contracts.py scripts/upload_intent.py \
            --ignore-missing-imports --follow-imports=silent --check-untyped-defs

      - name: "Lint lofi pipeline modules"
        run: |
          python -m black --check --diff \
            utils/analytics_schema.py utils/publish_schedule.py utils/studio_reach_schema.py \
            utils/api_quota_budget.py utils/feature_flags.py \
            utils/media_lifecycle.py utils/time_semantics.py utils/retention_warehouse.py \
            utils/ai_helper.py utils/ai_cache.py utils/provider_stats.py utils/broll.py \
            utils/host_persona.py utils/panic.py utils/retry.py utils/audience_expansion.py \
            utils/youtube_oauth.py utils/lofi_branding.py utils/thumbnail_branding.py \
            scripts/check_schedule_sync.py scripts/check_repo_contracts.py \
            scripts/import_studio_reach_export.py scripts/reporting_bootstrap.py scripts/reporting_pull.py \
            scripts/audit_slot_contracts.py scripts/upload_intent.py \
            scripts/security_manifest.py scripts/media_lifecycle.py scripts/production_smoke.py \
            scripts/sync_lofi_broll.py scripts/sync_jamendo_music.py scripts/live_stream_dynamic.py \
            scripts/merge_jsonl_state.py scripts/quota_preflight.py scripts/youtube_slot_dispatch.py \
            scripts/build_dashboard.py scripts/rebrand_video_titles.py scripts/repair_youtube_metadata.py \
            scripts/rebrand_video_thumbnails.py \
            generate_lofi_short.py generate_lofi_mix.py upload_youtube.py auth_youtube.py
          python -m ruff check \
            utils/analytics_schema.py utils/publish_schedule.py utils/studio_reach_schema.py \
            utils/api_quota_budget.py utils/feature_flags.py \
            utils/media_lifecycle.py utils/time_semantics.py utils/retention_warehouse.py \
            utils/ai_helper.py utils/ai_cache.py utils/provider_stats.py utils/broll.py \
            utils/host_persona.py utils/panic.py utils/retry.py utils/audience_expansion.py \
            utils/youtube_oauth.py utils/lofi_branding.py utils/thumbnail_branding.py \
            scripts/check_schedule_sync.py scripts/check_repo_contracts.py \
            scripts/import_studio_reach_export.py scripts/reporting_bootstrap.py scripts/reporting_pull.py \
            scripts/audit_slot_contracts.py scripts/upload_intent.py \
            scripts/security_manifest.py scripts/media_lifecycle.py scripts/production_smoke.py \
            scripts/sync_lofi_broll.py scripts/sync_jamendo_music.py scripts/live_stream_dynamic.py \
            scripts/merge_jsonl_state.py scripts/quota_preflight.py scripts/youtube_slot_dispatch.py \
            scripts/build_dashboard.py scripts/rebrand_video_titles.py scripts/repair_youtube_metadata.py \
            scripts/rebrand_video_thumbnails.py \
            generate_lofi_short.py generate_lofi_mix.py upload_youtube.py auth_youtube.py

      - name: "Audit dependencies"
        run: python -m pip_audit -r requirements.txt

      - name: "Run high-severity security scan"
        run: python -m bandit -q -lll -r upload_youtube.py auth_youtube.py utils scripts -x tests

      - name: "Dashboard smoke build"
        run: python scripts/build_dashboard.py

      - name: "Upload failure diagnostics"
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: quality-gate-diagnostics
          path: |
            _data/*.json
            _data/analytics/*.json
            _data/analytics/*.jsonl
            _data/reports/*.md
            _site/index.html
          if-no-files-found: ignore
