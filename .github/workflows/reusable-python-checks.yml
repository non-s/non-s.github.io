name: "Reusable Python checks"

on:
  workflow_call:
    inputs:
      pytest_args:
        required: false
        type: string
        default: "-q"

jobs:
  python-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pytest>=8,<10" "ruff>=0.6,<1" "black>=24,<26"
      - run: python -m compileall -q .
      - run: python -m pytest ${{ inputs.pytest_args }}
