name: "Admin: apply channel branding"

# Manual-only: sets the channel title to "Amber Hours", uploads the
# banner, and sets the current live broadcast's thumbnail from
# _assets/branding/. The channel avatar has no public YouTube Data API
# endpoint -- that still needs a manual upload in YouTube Studio.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-branding:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout"
        uses: actions/checkout@v7.0.1

      - name: "Python 3.11"
        uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "Instalar dependencias Python"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Restaurar tokens do YouTube"
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          umask 077
          if [ -n "$YOUTUBE_TOKEN" ]; then
            printf '%s' "$YOUTUBE_TOKEN" > youtube_token.json
            chmod 600 youtube_token.json
          fi

      - name: "Aplicar branding do canal"
        run: python scripts/apply_channel_branding.py

      - name: "Apagar tokens do YouTube no final"
        if: always()
        run: |
          for path in youtube_token.json; do
            if [ -f "$path" ]; then
              shred -u "$path" 2>/dev/null || rm -f "$path"
            fi
          done
