name: "Build auth_youtube.exe (Windows)"

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-auth-helper-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
      - name: "Install PyInstaller + auth deps"
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==6.11.1 "google-auth-oauthlib>=1.2.0,<2.0"
      - name: "Build auth_youtube.exe"
        run: |
          pyinstaller --onefile --console --clean ^
                      --name auth_youtube ^
                      auth_youtube.py
        shell: cmd
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: auth_youtube-windows
          path: dist/auth_youtube.exe
          retention-days: 7
