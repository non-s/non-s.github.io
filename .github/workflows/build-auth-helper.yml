name: "Build auth_youtube.exe (Windows)"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
      - name: "Install PyInstaller + auth deps"
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==6.11.1 "google-auth-oauthlib>=1.2.0,<2.0"
      - name: "Build auth_youtube.exe"
        run: |
          pyinstaller --onefile --console --clean ^
                      --name auth_youtube ^
                      auth_youtube.py
        shell: cmd
      - uses: actions/upload-artifact@v4.4.3
        with:
          name: auth_youtube-windows
          path: dist/auth_youtube.exe
          retention-days: 7
