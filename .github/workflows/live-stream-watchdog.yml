name: "24/7 live stream watchdog"

# The live stream relay (live-stream.yml) has a hard 6h GitHub Actions
# timeout and relies on a 6h cron to relaunch itself. GitHub schedule
# events are best-effort and can be delayed or dropped, and the ffmpeg
# pipe can also die mid-run. This watchdog runs every 10 minutes and
# relaunches the relay whenever no run is currently active, so the
# stream never stays offline for long.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-stream-watchdog
  cancel-in-progress: true

jobs:
  ensure-live:
    name: "Relaunch the live stream relay if it is not running"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
      contents: read
    steps:
      - name: "Check for an active relay run and relaunch if missing"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          active="$(gh run list --repo "${{ github.repository }}" --workflow=live-stream.yml --status=in_progress --json databaseId --jq 'length')"
          queued="$(gh run list --repo "${{ github.repository }}" --workflow=live-stream.yml --status=queued --json databaseId --jq 'length')"
          if [ "${active:-0}" -gt 0 ] || [ "${queued:-0}" -gt 0 ]; then
            echo "Live stream relay already running (active=${active}, queued=${queued}). Nothing to do."
            exit 0
          fi
          echo "No live-stream.yml run in progress or queued. Dispatching a new one."
          gh workflow run live-stream.yml --repo "${{ github.repository }}"
