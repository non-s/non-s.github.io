name: "Pata Jazz YouTube Live"

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo do disparo manual"
        required: false
        default: "manual"
      duration_minutes:
        description: "Duracao da transmissao em minutos (0 = ate cancelar)"
        required: false
        default: "350"
      resolution:
        description: "Resolucao da live (720p maximo suportado no runner gratuito)"
        required: false
        default: "1280x720"
        type: choice
        options:
          - "1280x720"
  schedule:
    # 1 live por semana - Quarta-feira (Plano 7 Dias)
    # Live: 19:00 BRT (22:00 UTC) - Duração: ~6 horas (limite GitHub Actions)
    # Perfeito para engajamento noturno (trabalho/estudo/relaxamento)
    - cron: "0 22 * * 3"

permissions:
  contents: read

concurrency:
  group: pata-jazz-live
  cancel-in-progress: true

env:
  LIVE_DURATION_MINUTES: ${{ github.event.inputs.duration_minutes || '350' }}
  LIVE_RESOLUTION: ${{ github.event.inputs.resolution || '1280x720' }}

jobs:
  live-stream:
    name: "Transmitir live Pata Jazz"
    if: ${{ vars.PATA_JAZZ_ENABLED == '1' && vars.PATA_JAZZ_LIVE_ENABLED == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      YOUTUBE_PRIVACY: ${{ vars.YOUTUBE_PRIVACY || 'public' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      JAMENDO_CLIENT_ID: ${{ secrets.JAMENDO_CLIENT_ID }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: "Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: "Instalar FFmpeg"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
      - name: "Instalar dependencias"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: "Restaurar token YouTube"
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          umask 077
          if [ -n "$YOUTUBE_TOKEN" ]; then
            printf '%s' "$YOUTUBE_TOKEN" > youtube_token.json
            chmod 600 youtube_token.json
          fi
      - name: "Cache b-roll"
        uses: actions/cache@v4
        with:
          path: _assets/video/animal_broll
          key: animal-broll-${{ github.run_id }}
          restore-keys: animal-broll-
      - name: "Cache jazz"
        uses: actions/cache@v4
        with:
          path: _assets/audio/animal_jazz
          key: animal-jazz-${{ github.run_id }}
          restore-keys: animal-jazz-
      - name: "Sincronizar b-roll"
        run: python scripts/sync_animal_broll.py || echo "::warning::B-roll sync falhou"
      - name: "Sincronizar jazz"
        run: python scripts/sync_jazz_music.py || echo "::warning::Jazz sync falhou"
      - name: "Executar live Pata Jazz"
        run: |
          python -c "from generate_pata_jazz_live import _build_looping_input; print('ok')"
          python scripts/run_live.py
      - name: "Apagar token"
        if: always()
        run: rm -f youtube_token.json
