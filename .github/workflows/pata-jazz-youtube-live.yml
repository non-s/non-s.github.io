name: "Pata Jazz YouTube Live"

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo do disparo manual"
        required: false
        default: "manual"
      duration_minutes:
        description: "Duracao da transmissao em minutos (0 = ate cancelar)"
        required: false
        default: "350"
      resolution:
        description: "Resolucao da live"
        required: false
        default: "1920x1080"
  schedule:
    # Aproximacao de "loop infinito" usando runner gratuito do GitHub (~6h limite).
    # Quatro turnos de ~5h50 ao longo do dia com gaps pequenos de 20 min entre elas.
    # Turnos BRT: 00:00, 06:00, 12:00, 18:00 (UTC: 03:00, 09:00, 15:00, 21:00).
    # Com isso o canal fica ao vivo quase 24h/dia sem custo extra.
    - cron: "0 3 * * *"
    - cron: "0 9 * * *"
    - cron: "0 15 * * *"
    - cron: "0 21 * * *"

permissions:
  contents: read

concurrency:
  group: pata-jazz-live
  cancel-in-progress: true

env:
  LIVE_DURATION_MINUTES: ${{ github.event.inputs.duration_minutes || '350' }}
  LIVE_RESOLUTION: ${{ github.event.inputs.resolution || '1920x1080' }}

jobs:
  live-stream:
    name: "Transmitir live Pata Jazz"
    if: ${{ vars.PATA_JAZZ_ENABLED == '1' && vars.PATA_JAZZ_LIVE_ENABLED == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      YOUTUBE_PRIVACY: ${{ vars.YOUTUBE_PRIVACY || 'public' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      JAMENDO_CLIENT_ID: ${{ secrets.JAMENDO_CLIENT_ID }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: "Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: "Instalar FFmpeg"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
      - name: "Instalar dependencias"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: "Restaurar token YouTube"
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          umask 077
          if [ -n "$YOUTUBE_TOKEN" ]; then
            printf '%s' "$YOUTUBE_TOKEN" > youtube_token.json
            chmod 600 youtube_token.json
          fi
      - name: "Cache b-roll"
        uses: actions/cache@v4
        with:
          path: _assets/video/animal_broll
          key: animal-broll-${{ github.run_id }}
          restore-keys: animal-broll-
      - name: "Cache jazz"
        uses: actions/cache@v4
        with:
          path: _assets/audio/animal_jazz
          key: animal-jazz-${{ github.run_id }}
          restore-keys: animal-jazz-
      - name: "Sincronizar b-roll"
        run: python scripts/sync_animal_broll.py || echo "::warning::B-roll sync falhou"
      - name: "Sincronizar jazz"
        run: python scripts/sync_jazz_music.py || echo "::warning::Jazz sync falhou"
      - name: "Executar live Pata Jazz"
        run: |
          python -c "from generate_pata_jazz_live import _build_looping_input; print('ok')"
          python scripts/run_live.py
      - name: "Apagar token"
        if: always()
        run: rm -f youtube_token.json
