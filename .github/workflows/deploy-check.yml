name: "🔍 Deploy Check"

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Lint & syntax"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "📦 Install lint deps"
        run: |
          python -m pip install --upgrade pip
          pip install yamllint pytest
          # Tests import utils/ai_helper.py which requires requests.
          # We install the runtime deps too so collection doesn't ImportError.
          pip install -r requirements.txt

      - name: "🔎 Lint workflows YAML"
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" .github/workflows/

      - name: "🐍 Validate Python syntax"
        run: |
          # Compile every top-level *.py + utils/ — easier to maintain than a
          # hand-written list that drifts whenever a new script is added.
          python -m compileall -q . -x '_site|node_modules|vendor'

      - name: "🧪 Run unit tests"
        run: pytest -q

  build:
    name: "Jekyll build"
    runs-on: ubuntu-latest
    # 14 511 tag pages plus 1 600+ posts → Jekyll routinely needs
    # 10-15 min to finish. Cap at 25 to catch genuine hangs without
    # killing healthy runs.
    timeout-minutes: 25
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install PyYAML
      - name: "Regenerate search-index.json"
        run: python generate_search_index.py
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: "Build Jekyll"
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
