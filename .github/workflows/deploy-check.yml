name: "🔍 Deploy Check"

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-check-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: this workflow only reads the repo (no commits, no
# releases, no packages). Without this block the default GITHUB_TOKEN
# inherits the repo's default permissions, which on `pull_request`
# could include write access if the repo default is "read and write".
permissions:
  contents: read

jobs:
  lint:
    name: "Lint & syntax"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "📦 Install lint deps"
        run: |
          python -m pip install --upgrade pip
          pip install yamllint pytest
          # Tests import utils/ai_helper.py which requires requests.
          # We install the runtime deps too so collection doesn't ImportError.
          pip install -r requirements.txt

      - name: "🔎 Lint workflows YAML"
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" .github/workflows/

      - name: "🐍 Validate Python syntax"
        run: |
          # Compile every top-level *.py + utils/ — easier to maintain than a
          # hand-written list that drifts whenever a new script is added.
          python -m compileall -q . -x '_site|node_modules|vendor'

      - name: "🧪 Run unit tests"
        run: pytest -q

  build:
    name: "Jekyll build (smoke)"
    runs-on: ubuntu-latest
    # Smoke-build only the most recent 100 posts + all tag/category
    # indexes. Catches Liquid errors, missing layouts, bad frontmatter
    # in ~2-3 min. The real, full-corpus build runs upstream of CI
    # in GitHub Pages' own `pages-build-deployment` workflow, which
    # has no timeout cap.
    timeout-minutes: 10
    needs: lint
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install PyYAML
      - name: "Regenerate search-index.json"
        run: python generate_search_index.py
      - uses: ruby/setup-ruby@v1.308.0
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: "Build Jekyll (smoke: last 100 posts)"
        # NB: --limit_posts also limits tag/category index sizes via
        # the smaller site.posts collection, so this finishes fast.
        run: bundle exec jekyll build --limit_posts 100
        env:
          JEKYLL_ENV: production
