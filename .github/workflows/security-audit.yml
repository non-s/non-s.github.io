name: "Security, SBOM and license audit"

on:
  schedule:
    - cron: "52 6 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
      - name: "Install audit tools"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pip-audit>=2.9,<3" "pip-licenses>=5,<6"
      - name: "Dependency audit"
        run: python -m pip_audit -r requirements.txt
      - name: "SBOM and licenses"
        run: |
          python scripts/security_manifest.py --json
          pip-licenses --format=json --output-file=_data/license_report.json
      - name: "Secret pattern fallback scan"
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          patterns = [
              re.compile(r"AIza[0-9A-Za-z_-]{20,}"),
              re.compile(r"ghp_[0-9A-Za-z]{20,}"),
              re.compile(r"sk-[0-9A-Za-z]{20,}"),
              re.compile(r"(?i)(api_key|secret|token)\s*=\s*['\"][^'\"]{12,}['\"]"),
          ]
          skip = {".git", ".pytest_cache", "_site", "__pycache__"}
          hits = []
          for path in Path(".").rglob("*"):
              if any(part in skip for part in path.parts) or not path.is_file():
                  continue
              if path.suffix.lower() not in {".py", ".yml", ".yaml", ".md", ".toml", ".txt", ".json", ".example"}:
                  continue
              text = path.read_text(encoding="utf-8", errors="ignore")
              for pattern in patterns:
                  if pattern.search(text):
                      hits.append(str(path))
                      break
          if hits:
              raise SystemExit("Secret-like patterns found: " + ", ".join(hits[:20]))
          print("secret fallback scan: ok")
          PY
      - name: "Upload audit artifacts"
        uses: actions/upload-artifact@v7
        with:
          name: security-audit-artifacts
          path: |
            _data/security_manifest.json
            _data/license_report.json
          if-no-files-found: ignore
