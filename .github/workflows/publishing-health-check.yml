name: "Publishing health check"

# ops-alert.yml already catches a *failed* workflow_run. This catches the
# quieter failure mode: youtube-bot.yml/lofi-mix-daily.yml keep reporting
# success (green checkmark, exit 0) while actually uploading nothing --
# an empty/stale media library, a sustained Pixabay/Jamendo outage, or an
# unnoticed upstream contract change could all zero out uploads for hours
# without a single run ever erroring. This job fails (non-zero exit) when
# scripts/check_publishing_health.py finds the most recent real upload is
# older than the configured staleness window while publishing is enabled;
# it's on ops-alert.yml's workflow_run list below like any other monitored
# workflow, so a degraded run raises the same GitHub issue alert a hard
# failure would -- no separate alerting path to build or maintain.
on:
  schedule:
    - cron: "40 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publishing-health-check
  cancel-in-progress: true

jobs:
  check:
    name: "Check for silent publishing degradation"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      YOUTUBE_PUBLISHING_ENABLED: ${{ vars.YOUTUBE_PUBLISHING_ENABLED }}
      PUBLISHING_STALE_HOURS: ${{ vars.PUBLISHING_STALE_HOURS || '26' }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 1

      - name: "Set up Python"
        uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.11"

      - name: "Check recent upload freshness"
        run: python scripts/check_publishing_health.py
