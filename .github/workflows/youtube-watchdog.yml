name: "YouTube publishing watchdog"

# GitHub schedule events are best-effort. This watchdog checks whether the
# latest intended YouTube publishing slot produced a run and dispatches a
# recovery run after a grace window when GitHub drops the original cron.
on:
  schedule:
    # GitHub cron can be delayed or dropped. Check every 10 minutes so a
    # missed 10-minute slot gets recovered inside the configured grace window.
    # These checks are offset from both the publisher and queue refresh crons.
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: youtube-watchdog
  cancel-in-progress: true

jobs:
  recover-missed-slot:
    name: "Recover missed YouTube publishing slot"
    # Disabled while YouTube publishing is paused; otherwise the watchdog would
    # dispatch recovery runs for intentionally skipped slots.
    if: ${{ vars.YOUTUBE_PUBLISHING_ENABLED == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
      contents: read

    steps:
      - name: "Checkout dispatch helper"
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1

      - name: "Check latest planned slot"
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          TARGET_WORKFLOW: "youtube-bot.yml"
          GRACE_MINUTES: "12"
          # Shrunk from 60 to match the 10-minute canonical grid below --
          # at the old 60min window, a single run could satisfy up to 6
          # consecutive 10-minute slots, masking a truly missed one.
          PUBLISH_SLOT_WINDOW_MINUTES: "10"
          PUBLISH_SLOTS_UTC: "00:00,00:10,00:20,00:30,00:40,00:50,01:00,01:10,01:20,01:30,01:40,01:50,02:00,02:10,02:20,02:30,02:40,02:50,03:00,03:10,03:20,03:30,03:40,03:50,04:00,04:10,04:20,04:30,04:40,04:50,05:00,05:10,05:20,05:30,05:40,05:50,06:00,06:10,06:20,06:30,06:40,06:50,07:00,07:10,07:20,07:30,07:40,07:50,08:00,08:10,08:20,08:30,08:40,08:50,09:00,09:10,09:20,09:30,09:40,09:50,10:00,10:10,10:20,10:30,10:40,10:50,11:00,11:10,11:20,11:30,11:40,11:50,12:00,12:10,12:20,12:30,12:40,12:50,13:00,13:10,13:20,13:30,13:40,13:50,14:00,14:10,14:20,14:30,14:40,14:50,15:00,15:10,15:20,15:30,15:40,15:50,16:00,16:10,16:20,16:30,16:40,16:50,17:00,17:10,17:20,17:30,17:40,17:50,18:00,18:10,18:20,18:30,18:40,18:50,19:00,19:10,19:20,19:30,19:40,19:50,20:00,20:10,20:20,20:30,20:40,20:50,21:00,21:10,21:20,21:30,21:40,21:50,22:00,22:10,22:20,22:30,22:40,22:50,23:00,23:10,23:20,23:30,23:40,23:50"
          RECOVERY_REASON_PREFIX: "watchdog recovery for missed slot"
        run: python scripts/youtube_slot_dispatch.py watchdog
