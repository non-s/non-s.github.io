name: "YouTube publishing watchdog"

# GitHub schedule events are best-effort. This watchdog checks whether the
# latest intended YouTube publishing slot produced a run and dispatches a
# recovery run after a grace window when GitHub drops the original cron.
on:
  schedule:
    # GitHub cron can be delayed or dropped. Check every 10 minutes so a
    # missed hourly slot gets recovered inside the configured grace window.
    # These checks are offset from both the publisher and queue refresh crons.
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

concurrency:
  group: youtube-watchdog
  cancel-in-progress: true

jobs:
  recover-missed-slot:
    name: "Recover missed YouTube publishing slot"
    # Disabled while YouTube publishing is paused; otherwise the watchdog would
    # dispatch recovery runs for intentionally skipped slots.
    if: ${{ vars.YOUTUBE_PUBLISHING_ENABLED == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
      contents: read

    steps:
      - name: "Checkout dispatch helper"
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1

      - name: "Check latest planned slot"
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          TARGET_WORKFLOW: "youtube-bot.yml"
          GRACE_MINUTES: "12"
          PUBLISH_SLOT_WINDOW_MINUTES: "60"
          PUBLISH_SLOTS_UTC: "00:00,01:00,02:00,03:00,04:00,05:00,06:00,07:00,08:00,09:00,10:00,11:00,12:00,13:00,14:00,15:00,16:00,17:00,18:00,19:00,20:00,21:00,22:00,23:00"
          RECOVERY_REASON_PREFIX: "watchdog recovery for missed slot"
        run: python scripts/youtube_slot_dispatch.py watchdog
