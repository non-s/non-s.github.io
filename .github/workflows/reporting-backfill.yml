name: "YouTube Reporting backfill"

on:
  workflow_dispatch:
  schedule:
    - cron: "55 4 * * *"

permissions:
  contents: write

concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.11"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: "Prepare Reporting API folders"
        run: python scripts/reporting_bootstrap.py
      - name: "Normalize Reporting CSV exports"
        run: python scripts/reporting_pull.py
      - name: "Persist reporting artifacts"
        run: |
          git config user.name "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          git add _data/analytics/reporting_bootstrap.json _data/analytics/reporting_pull.json _data/analytics/reporting_video_metrics.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No Reporting backfill data to persist."
            exit 0
          fi
          git commit -m "analytics: reporting backfill"
          for attempt in 1 2 3; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          echo "Failed to push reporting backfill data." >&2
          exit 1
