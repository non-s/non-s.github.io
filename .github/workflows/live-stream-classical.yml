name: 24/7 Live Stream Relay - Classical

# The classical-ambience pillar's own 24/7 live relay (chat, 2026-07-22)
# -- fully independent from the rain pillar's "24/7 Live Stream Relay"
# (live-stream.yml): its own workflow, its own concurrency group, and
# needs its OWN stream key secret (YOUTUBE_STREAM_KEY_CLASSICAL) --
# reusing the rain pillar's YOUTUBE_STREAM_KEY would make both relays
# fight over the same RTMP ingestion point the moment both are ever
# enabled together. Create a second persistent live stream in YouTube
# Studio (Go Live -> Stream) to get this key -- see SETUP.md.
#
# Gated by CLASSICAL_LIVE_ENABLED, independent of CLASSICAL_AMBIENCE_ENABLED
# (the long-form/upload side of this pillar) -- same "each format is its
# own decision" principle every other pillar in this repo already uses.

on:
  schedule:
    - cron: "20 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Same reasoning as live-stream.yml's identical setting -- do not
  # cancel an in-progress run here; the watchdog only dispatches when it
  # sees no active/queued run, so a redundant dispatch should queue, not
  # kill a healthy stream.
  cancel-in-progress: false

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    if: ${{ vars.CLASSICAL_LIVE_ENABLED == '1' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl
          pip install -r requirements.txt

      - name: Restore YouTube Token
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          if [ -n "$YOUTUBE_TOKEN" ]; then
            printf '%s' "$YOUTUBE_TOKEN" > youtube_token.json
            chmod 600 youtube_token.json
            echo "Token restored."
          else
            echo "No YouTube token configured."
          fi

      - name: Restore classical music library from cache
        uses: actions/cache@v4
        with:
          path: |
            _assets/audio/classical
          key: classical-music-${{ github.run_id }}
          restore-keys: |
            classical-music-

      - name: Sync classical music library (Jamendo)
        run: python scripts/sync_classical_music.py || echo "::warning::Classical music sync failed this cycle."
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"

      - name: Run Classical Live Stream
        env:
          YOUTUBE_STREAM_KEY_CLASSICAL: ${{ secrets.YOUTUBE_STREAM_KEY_CLASSICAL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p _videos
          while true; do
            python scripts/live_stream_classical.py
            sleep 5
          done
      - name: "Delete YouTube token"
        if: always()
        run: |
          shred -u youtube_token.json 2>/dev/null || rm -f youtube_token.json
