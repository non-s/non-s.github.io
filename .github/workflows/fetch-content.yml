# Refresh the animal Shorts queue consumed by the YouTube publishing workflow.
name: "Refresh animal queue"

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

# Serialise queue updates with YouTube publishing commits.
concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  refresh-queue:
    name: "Refresh YouTube Shorts queue"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: "Set up Python 3.11"
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Validate Python syntax"
        run: python -m compileall -q fetch_animals.py utils/

      - name: "Refresh animal stories"
        timeout-minutes: 25
        run: python fetch_animals.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY || secrets.PEXELS }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || secrets.CEREBRAS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.GEMINI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || secrets.GROQ }}

      - name: "Write run summary"
        if: always()
        run: |
          {
            echo "## YouTube Shorts queue refresh"
            if [ -f _data/stories_queue.json ]; then
              TOTAL=$(python -c "import json; d=json.load(open('_data/stories_queue.json')); print(len(d.get('stories', [])))")
              PENDING=$(python -c "import json; d=json.load(open('_data/stories_queue.json')); print(sum(1 for s in d.get('stories', []) if not s.get('consumed')))")
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Total stories | ${TOTAL} |"
              echo "| Pending Shorts | ${PENDING} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Prune AI cache"
        if: always()
        run: python -c "from utils import ai_cache; print('kept', ai_cache.prune(), 'entries')" || true

      - name: "Commit queue state"
        run: |
          git config user.name "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          git add _data/stories_queue.json _data/ai_cache.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new animal stories to commit."
            exit 0
          fi
          PENDING=$(python -c "import json; d=json.load(open('_data/stories_queue.json')); print(sum(1 for s in d.get('stories', []) if not s.get('consumed')))")
          git commit -m "queue refresh: ${PENDING} pending YouTube Shorts"
          for attempt in 1 2 3; do
            if git push origin HEAD; then
              exit 0
            fi
            echo "Push rejected on attempt ${attempt}; rebasing."
            if ! git pull --rebase --autostash origin main; then
              git rebase --abort 2>/dev/null || true
              [ "$attempt" = "3" ] && exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: "Save execution log"
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: "fetch-animals-log-${{ github.run_number }}"
          path: fetch_animals.log
          retention-days: 7
          if-no-files-found: ignore
