# Refresh the Pexels Shorts queue consumed by the YouTube workflow.
name: "Refresh Pexels queue"

on:
  schedule:
    # Refresh early in the hour so deeper Pexels backfills do not hold the
    # main-write lock across the hourly YouTube publish attempts.
    - cron: "9,23 * * * *"
  workflow_run:
    # Replenish reserve supply after the publisher completes. Failed publisher
    # runs can be caused by queue quality exhaustion, so recovery must not wait
    # for a green upload.
    workflows: ["YouTube Bot - Shorts only"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

# Keep queue refreshes serialized with each other without blocking the
# publisher; both workflows replay generated state on latest main before push.
concurrency:
  group: queue-refresh
  cancel-in-progress: false

jobs:
  refresh-queue:
    name: "Refresh YouTube Shorts queue"
    # Set QUEUE_REFRESH_ENABLED=1 to keep the Pexels discovery loop active.
    if: ${{ vars.QUEUE_REFRESH_ENABLED == '1' && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion != 'cancelled') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1
      - name: "Sync latest main before queue refresh"
        run: |
          git fetch origin main
          git checkout -B main origin/main

      - name: "Set up Python 3.11"
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Validate Python syntax"
        run: python -m compileall -q fetch_animals.py utils/

      - name: "Quota preflight"
        env:
          QUOTA_GUARD_MAX_DAILY_RATIO: ${{ vars.QUOTA_GUARD_MAX_DAILY_RATIO || '0.95' }}
          YOUTUBE_DAILY_QUOTA_BUDGET: ${{ vars.YOUTUBE_DAILY_QUOTA_BUDGET || '10000' }}
          YOUTUBE_DAILY_UPLOAD_BUDGET: ${{ vars.YOUTUBE_DAILY_UPLOAD_BUDGET || '100' }}
        run: |
          quota="$(python scripts/quota_preflight.py fetch-content --json --no-fail-on-block)"
          echo "$quota"
          blocked="$(QUOTA_JSON="$quota" python - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["QUOTA_JSON"])
          print("1" if (payload.get("guard") or {}).get("block") else "0")
          PY
          )"
          echo "FETCH_QUOTA_BLOCKED=$blocked" >> "$GITHUB_ENV"
          QUOTA_JSON="$quota" python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os

          payload = json.loads(os.environ["QUOTA_JSON"])
          guard = payload.get("guard") or {}
          print("## API quota preflight")
          print(f"- Workflow: `{payload.get('workflow')}`")
          print(f"- Estimated units: `{payload.get('estimated_units')}`")
          print(f"- Projected ratio: `{guard.get('projected_ratio')}`")
          print(f"- Guard mode: `{guard.get('mode')}`")
          print(f"- Blocked: `{guard.get('block')}`")
          PY
          if [ "$blocked" = "1" ]; then
            echo "Quota guard requested a safe queue-refresh skip."
          fi

      - name: "Harvest free freshness signals"
        run: python scripts/free_signal_harvester.py || true

      - name: "Refresh public science trend radar"
        run: python scripts/trend_radar.py || true

      - name: "Refresh Pexels stories"
        if: env.FETCH_QUOTA_BLOCKED != '1'
        timeout-minutes: 13
        run: |
          refresh_timeout="${FETCH_REFRESH_TIMEOUT_SECONDS:-720}"
          echo "Pexels refresh timeout: ${refresh_timeout}s"
          set +e
          timeout "${refresh_timeout}s" python fetch_animals.py
          status=$?
          set -e
          if [ "$status" -eq 124 ] || [ "$status" -eq 137 ]; then
            echo "::warning::Pexels refresh timed out after ${refresh_timeout}s; leaving queue state unchanged for this run."
            echo "FETCH_REFRESH_TIMED_OUT=1" >> "$GITHUB_ENV"
            exit 0
          fi
          exit "$status"
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          BROLL_SOURCE_MODE: "pexels"
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY || secrets.PEXELS }}
          FETCH_REFRESH_TIMEOUT_SECONDS: ${{ vars.FETCH_REFRESH_TIMEOUT_SECONDS || '720' }}
          QUEUE_TARGET_PENDING: ${{ vars.QUEUE_TARGET_PENDING || '72' }}
          PEXELS_SEARCH_PER_PAGE: ${{ vars.PEXELS_SEARCH_PER_PAGE || '32' }}
          PEXELS_DISCOVERY_PAGES: ${{ vars.PEXELS_DISCOVERY_PAGES || '2' }}
          PEXELS_BACKFILL_QUERY_TAKE: ${{ vars.PEXELS_BACKFILL_QUERY_TAKE || '6' }}
          PEXELS_TOPIC_CALL_BUDGET: ${{ vars.PEXELS_TOPIC_CALL_BUDGET || '2' }}
          PEXELS_DEEP_SEARCH_GAP: ${{ vars.PEXELS_DEEP_SEARCH_GAP || '8' }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || secrets.CEREBRAS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.GEMINI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || secrets.GROQ }}

      - name: "Apply topic freshness"
        if: env.FETCH_REFRESH_TIMED_OUT != '1'
        run: python scripts/apply_topic_freshness.py

      - name: "Reconcile uploaded queue state"
        if: env.FETCH_REFRESH_TIMED_OUT != '1'
        run: python scripts/reconcile_queue_uploads.py

      - name: "Write run summary"
        if: always()
        run: |
          {
            echo "## YouTube Shorts queue refresh"
            if [ -f _data/stories_queue.json ]; then
              TOTAL=$(python -c "import json; d=json.load(open('_data/stories_queue.json')); print(len(d.get('stories', [])))")
              PENDING=$(python -c "import json; d=json.load(open('_data/stories_queue.json')); print(sum(1 for s in d.get('stories', []) if not s.get('consumed')))")
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Total stories | ${TOTAL} |"
              echo "| Pending Shorts | ${PENDING} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Prune AI cache"
        if: always()
        run: python -c "from utils import ai_cache; print('kept', ai_cache.prune(), 'entries')" || true

      - name: "Audit queue automation health"
        if: env.FETCH_REFRESH_TIMED_OUT != '1'
        run: |
          python scripts/run_intelligence_suite.py queue --strict

      - name: "Commit queue state"
        run: |
          if [ "${FETCH_QUOTA_BLOCKED:-0}" = "1" ]; then
            echo "Quota guard blocked queue refresh; leaving generated diagnostics uncommitted to avoid data-write conflicts."
            exit 0
          fi
          if [ "${FETCH_REFRESH_TIMED_OUT:-0}" = "1" ]; then
            echo "Pexels refresh timed out; leaving generated diagnostics uncommitted to avoid partial queue state."
            exit 0
          fi
          git config user.name "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          state_dir="$(mktemp -d)"
          state_paths=(
            _data/stories_queue.json
            _data/ai_cache.jsonl
            _data/provider_stats.jsonl
            _data/ai_provider_report.json
            _data/packaging_report.json
            _data/youtube_brain_report.json
            _data/youtube_intelligence.json
            _data/autonomous_director.json
            _data/autonomous_growth_plan.json
            _data/channel_success.json
            _data/scale_blueprint.json
            _data/control_plane_report.json
            _data/success_rewriter.json
            _data/winner_sequel_factory.json
            _data/automation_health.json
            _data/ops_guardian.json
            _data/remake_backlog.json
            _data/trend_radar.json
            _data/trends/topic_candidates.json
            _data/trends/trend_signals.jsonl
            _data/trends/freshness_report.json
            _data/analytics/api_quota_ledger.jsonl
            _data/analytics/api_quota_latest.json
            _data/category_recovery.json
            _data/category_recovery_rewriter.json
            _data/fact_ledger.json
            _data/format_memory.json
            _data/fan_growth.json
            _data/audience_memory.json
            _data/early_performance.json
            _data/early_warning.json
            _data/winner_patterns.json
            _data/data_quality_report.json
            _data/agency_gate.json
            _data/post24_review.json
            _data/sequence_plan.json
            _data/publish_schedule.json
            _data/next_shorts.json
            _data/queue_prune_report.json
            _data/queue_audit.json
            _data/dry_run_publish.json
            _data/reject_report.json
            _data/repair_queue.jsonl
            _data/rejected_queue.jsonl
          )
          jsonl_merge_paths=(
            _data/analytics/api_quota_ledger.jsonl
            _data/analytics/reporting_video_metrics.jsonl
            _data/analytics/studio_reach_daily.jsonl
            _data/ai_cache.jsonl
            _data/channel_memory.jsonl
            _data/fact_sources.jsonl
            _data/originality_pack.jsonl
            _data/provider_stats.jsonl
            _data/publish_slot_decisions.jsonl
            _data/repair_queue.jsonl
            _data/rejected_queue.jsonl
            _data/source_provenance.jsonl
            _data/trends/trend_signals.jsonl
            _data/upload_intents.jsonl
          )
          for path in "${state_paths[@]}"; do
            if [ -e "$path" ]; then
              mkdir -p "$state_dir/$(dirname "$path")"
              cp "$path" "$state_dir/$path"
            fi
          done
          find _data/reports -maxdepth 1 -type f -name 'weekly-*.md' -print0 2>/dev/null | while IFS= read -r -d '' path; do
            mkdir -p "$state_dir/$(dirname "$path")"
            cp "$path" "$state_dir/$path"
          done
          git fetch origin main
          git reset --hard origin/main
          python scripts/merge_jsonl_state.py "$state_dir" "${jsonl_merge_paths[@]}"
          cp -R "$state_dir"/. .
          python scripts/reconcile_queue_uploads.py
          rm -rf "$state_dir"
          # Stage the queue first: optional generated files must never
          # prevent the refreshed queue from being persisted.
          git add _data/stories_queue.json
          for path in "${state_paths[@]}"; do
            [ -e "$path" ] && git add "$path"
          done
          find _data/reports -maxdepth 1 -type f -name 'weekly-*.md' -print0 2>/dev/null | xargs -0 -r git add --
          if git diff --cached --quiet; then
            echo "No new science stories to commit."
            exit 0
          fi
          PENDING=$(python -c "import json; d=json.load(open('_data/stories_queue.json')); print(sum(1 for s in d.get('stories', []) if not s.get('consumed')))")
          git commit -m "queue refresh: ${PENDING} pending YouTube Shorts"
          for attempt in 1 2 3; do
            if git push origin HEAD; then
              exit 0
            fi
            echo "Push rejected on attempt ${attempt}; replaying queue state on latest main."
            retry_dir="$(mktemp -d)"
            for path in "${state_paths[@]}"; do
              if [ -e "$path" ]; then
                mkdir -p "$retry_dir/$(dirname "$path")"
                cp "$path" "$retry_dir/$path"
              fi
            done
            find _data/reports -maxdepth 1 -type f -name 'weekly-*.md' -print0 2>/dev/null | while IFS= read -r -d '' path; do
              mkdir -p "$retry_dir/$(dirname "$path")"
              cp "$path" "$retry_dir/$path"
            done
            git fetch origin main
            git reset --hard origin/main
            python scripts/merge_jsonl_state.py "$retry_dir" "${jsonl_merge_paths[@]}"
            cp -R "$retry_dir"/. .
            python scripts/reconcile_queue_uploads.py
            rm -rf "$retry_dir"
            git add _data/stories_queue.json
            for path in "${state_paths[@]}"; do
              [ -e "$path" ] && git add "$path"
            done
            find _data/reports -maxdepth 1 -type f -name 'weekly-*.md' -print0 2>/dev/null | xargs -0 -r git add --
            if git diff --cached --quiet; then
              echo "Latest main already contains queue state."
              exit 0
            fi
            PENDING=$(python -c "import json; d=json.load(open('_data/stories_queue.json')); print(sum(1 for s in d.get('stories', []) if not s.get('consumed')))")
            git commit -m "queue refresh: ${PENDING} pending YouTube Shorts"
            sleep $((attempt * 5))
          done

      - name: "Save execution log"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: "fetch-animals-log-${{ github.run_number }}"
          path: fetch_animals.log
          retention-days: 7
          if-no-files-found: ignore
