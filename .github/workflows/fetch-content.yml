# Refresh the animal Shorts queue consumed by the YouTube publishing workflow.
name: "Refresh animal queue"

on:
  schedule:
    - cron: "17 */3 * * *"
  workflow_dispatch:

# Serialise queue updates with YouTube publishing commits.
concurrency:
  group: main-write
  cancel-in-progress: false

jobs:
  refresh-queue:
    name: "Refresh YouTube Shorts queue"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: "Set up Python 3.11"
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Validate Python syntax"
        run: python -m compileall -q fetch_animals.py utils/

      - name: "Refresh public animal trend radar"
        run: python scripts/trend_radar.py || true

      - name: "Refresh animal stories"
        timeout-minutes: 25
        run: python fetch_animals.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY || secrets.PEXELS }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY || secrets.PIXABAY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || secrets.CEREBRAS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.GEMINI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || secrets.GROQ }}

      - name: "Write run summary"
        if: always()
        run: |
          {
            echo "## YouTube Shorts queue refresh"
            if [ -f _data/stories_queue.json ]; then
              TOTAL=$(python -c "import json; d=json.load(open('_data/stories_queue.json')); print(len(d.get('stories', [])))")
              PENDING=$(python -c "import json; d=json.load(open('_data/stories_queue.json')); print(sum(1 for s in d.get('stories', []) if not s.get('consumed')))")
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Total stories | ${TOTAL} |"
              echo "| Pending Shorts | ${PENDING} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Prune AI cache"
        if: always()
        run: python -c "from utils import ai_cache; print('kept', ai_cache.prune(), 'entries')" || true

      - name: "Audit queue automation health"
        run: |
          python scripts/run_intelligence_suite.py queue --strict

      - name: "Commit queue state"
        run: |
          git config user.name "Wild Brief Bot"
          git config user.email "bot@wildbrief.com"
          # Stage the queue first: optional generated files must never
          # prevent the refreshed queue from being persisted.
          git add _data/stories_queue.json
          for path in _data/ai_cache.jsonl _data/provider_stats.jsonl _data/ai_provider_report.json _data/packaging_report.json _data/youtube_brain_report.json _data/youtube_intelligence.json _data/autonomous_director.json _data/autonomous_growth_plan.json _data/channel_success.json _data/success_rewriter.json _data/winner_sequel_factory.json _data/automation_health.json _data/ops_guardian.json _data/remake_backlog.json _data/trend_radar.json _data/category_recovery.json _data/category_recovery_rewriter.json _data/fact_ledger.json _data/agency_gate.json _data/post24_review.json _data/publish_schedule.json _data/queue_prune_report.json _data/rejected_queue.jsonl; do
            [ -e "$path" ] && git add "$path"
          done
          find _data/reports -maxdepth 1 -type f -name 'weekly-*.md' -print0 2>/dev/null | xargs -0 -r git add --
          if git diff --cached --quiet; then
            echo "No new animal stories to commit."
            exit 0
          fi
          PENDING=$(python -c "import json; d=json.load(open('_data/stories_queue.json')); print(sum(1 for s in d.get('stories', []) if not s.get('consumed')))")
          git commit -m "queue refresh: ${PENDING} pending YouTube Shorts"
          for attempt in 1 2 3; do
            if git push origin HEAD; then
              exit 0
            fi
            echo "Push rejected on attempt ${attempt}; rebasing."
            if ! git pull --rebase --autostash origin main; then
              git rebase --abort 2>/dev/null || true
              [ "$attempt" = "3" ] && exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: "Save execution log"
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: "fetch-animals-log-${{ github.run_number }}"
          path: fetch_animals.log
          retention-days: 7
          if-no-files-found: ignore
