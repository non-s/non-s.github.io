version: 2
updates:
  # The pipeline is Python-only since the May 2026 pivot away from Jekyll.
  # The bundler block stayed in by accident; dropping it stops Dependabot
  # from opening "no Gemfile found" failure noise on every Monday run.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      gh-actions:
        patterns: ["*"]
